<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interwell Brand Resources</title>
  <link rel="stylesheet" href="brand/brand-tokens.css">
  <link rel="stylesheet" href="search-ui.css">
  <link rel="stylesheet" href="night-toggle.css">
  <style>
    :root {
      --bg: #f4f0f7;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-alt: rgba(255, 255, 255, 0.72);
      --border: rgba(33, 13, 42, 0.16);
      --text: #22122d;
      --muted: #685774;
      --primary: #210d2a;
      --shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius: 4px;
      --panel-radius: 6px;
      --app-pad: 6px;
      --control-height: 22px;
      --control-font: 11px;
      --control-px: 6px;
      --control-py: 2px;
      --field-border: #cbd5e1;
    }
    body.night-mode {
      --bg: #110b16;
      --surface: rgba(30, 20, 40, 0.92);
      --surface-alt: rgba(25, 17, 34, 0.9);
      --border: rgba(208, 191, 222, 0.22);
      --text: #f2eaf8;
      --muted: #b8a6c4;
      --primary: #f2eaf8;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
      --field-border: #30363d;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "formular-interwell", "Segoe UI", sans-serif;
      font-size: 12px;
      background: radial-gradient(1200px 420px at 15% -5%, rgba(119, 74, 160, 0.2), transparent 55%), radial-gradient(900px 360px at 88% -10%, rgba(33, 13, 42, 0.16), transparent 60%), linear-gradient(180deg, #f8f4fb 0%, var(--bg) 100%);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }
    .wrap.app-shell {
      min-height: 100vh;
      padding: var(--app-pad);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .app-header {
      display: grid;
      gap: 4px;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .app-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .app-brand {
      display: flex;
      align-items: center;
      gap: 0;
      min-width: 0;
    }
    .app-logo {
      height: 22px;
      width: auto;
      flex-shrink: 0;
      margin-right: 6px;
    }
    body.night-mode .app-logo { filter: brightness(0) invert(1) saturate(0); }
    .nav-icon-btn {
      width: 34px;
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: transparent;
      color: var(--brand-dark-purple);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .nav-icon-btn:hover {
      transform: translateY(-2px);
      background: color-mix(in srgb, var(--brand-mid-lavender) 18%, transparent);
    }
    .nav-icon-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }    body.night-mode .nav-icon-btn { color: #f2eaf8; }
    .app-brand .nav-icon-btn + .nav-icon-btn { margin-left: 6px; }
    .app-meta {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      line-height: 1.4;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 4px;
      border-top: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
    }
    .tool-main { display: grid; gap: 6px; }
    .tool-panel {
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 8px;
      display: grid;
      gap: 10px;
      width: 100%;
    }
    .sidebar-tabs {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 4px;
      margin-bottom: 2px;
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent 22%);
      border-radius: 6px;
      padding: 3px;
      box-sizing: border-box;
      width: fit-content;
      max-width: 100%;
      align-self: start;
    }
    .sidebar-tab-option { display: flex; align-items: stretch; }
    .sidebar-tab-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-tab-btn {
      min-height: 24px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 5px;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .sidebar-tab-btn.is-active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 8px 18px rgba(33, 13, 42, 0.2);
    }
    body.night-mode .sidebar-tab-btn.is-active {
      background: #d3ef54;
      color: #210d2a;
      border-color: color-mix(in srgb, #d3ef54 84%, #95ab2f 16%);
    }
    .tab-panel { display: none; }
    .tab-panel.is-active { display: block; }

    .container-items {
      display: flex;
      transform-style: preserve-3d;
      transform: perspective(1000px);
      gap: 2px;
      padding-top: 10px;
      padding-bottom: 8px;
      flex-wrap: wrap;
      align-items: center;
      align-self: flex-start;
      margin-left: 3px;
    }
    .item-color {
      position: relative;
      flex-shrink: 0;
      width: 32px;
      height: 40px;
      border: none;
      outline: none;
      transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
      cursor: pointer;
      background: transparent;
    }
    .item-color::after {
      position: absolute;
      content: "";
      inset: 0;
      width: 40px;
      height: 40px;
      background-color: var(--color);
      border-radius: 6px;
      transform: scale(1.2);
      pointer-events: none;
      transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
      border: 1px solid color-mix(in srgb, #000 16%, transparent);
    }
    .item-color::before {
      position: absolute;
      content: attr(aria-color);
      left: 65%;
      bottom: 52px;
      font-size: 9px;
      line-height: 12px;
      transform: translateX(-50%);
      padding: 2px 0.25rem;
      background-color: #ffffff;
      color: #210d2a;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: 500ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
      white-space: nowrap;
      border: 1px solid #d7d7dc;
    }
    .item-color:hover {
      transform: scale(1.5);
      z-index: 99999;
    }
    .item-color:hover::before {
      opacity: 1;
      visibility: visible;
    }
    .item-color:active::after { transform: scale(1.1); }
    .item-color.copied::before {
      content: "Copied";
      opacity: 1;
      visibility: visible;
    }
    .item-color:hover + .item-color { transform: scale(1.3); z-index: 9999; }
    .item-color:hover + .item-color + .item-color { transform: scale(1.15); z-index: 999; }
    .item-color:has(+ .item-color:hover) { transform: scale(1.3); z-index: 9999; }
    .item-color:has(+ .item-color + .item-color:hover) { transform: scale(1.15); z-index: 999; }

    .simple-note {
      color: var(--muted);
      font-size: 11px;
      margin: 0;
    }
    @media (max-width: 980px) {
      .app-header-top { align-items: flex-start; flex-direction: column; }
      .app-meta { text-align: left; white-space: normal; }
      .header-actions { justify-content: flex-start; }
      .sidebar-tabs { grid-template-columns: repeat(2, auto); }
    }
  </style>
</head>
<body>
  <div class="wrap app-shell">
    <header class="app-header">
      <div class="app-header-top">
        <div class="app-brand">
          <img class="app-logo" src="https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/assets/assets/Interwell_Logo_Symbol_Dark_Purple-2.png" alt="Interwell Logo">
          <a class="nav-icon-btn" href="index.html" aria-label="Home" title="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2L3 10.6v10.2h6.1v-6.3h5.8v6.3H21V10.6L12 3.2z"/></svg>
          </a>
          <button class="nav-icon-btn" type="button" aria-label="Back" title="Back" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = 'index.html'; }">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.2 4.4L3.6 12l7.6 7.6 1.6-1.6-4.9-4.9H20v-2.2H7.9l4.9-4.9-1.6-1.6z"/></svg>
          </button>
          <button class="nav-icon-btn" type="button" aria-label="Forward" title="Forward" onclick="if (window.history.length > 1) { window.history.forward(); } else { window.location.href = 'index.html'; }">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.8 4.4l7.6 7.6-7.6 7.6-1.6-1.6 4.9-4.9H4v-2.2h12.1l-4.9-4.9 1.6-1.6z"/></svg>
          </button>
        </div>
        <div class="app-meta">
          <div>By Darren Wilkinson</div>
          <div>Updated: 15.05.2026</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="toggle-switch" title="Night Mode">
          <label class="switch-label" for="nightMode">
            <input id="nightMode" class="checkbox" type="checkbox">
            <span class="slider"></span>
            <span class="toggle-text">Night Mode</span>
          </label>
        </div>
      </div>
    </header>

    <main class="tool-main">
      <section class="tool-panel" aria-label="Brand resources">
        <div class="sidebar-tabs" role="tablist" aria-label="Brand resources tabs">
          <div class="sidebar-tab-option">
            <input type="radio" id="brandTabColorsBtn" class="sidebar-tab-input" name="brandTab" checked onchange="setBrandTab('colors')">
            <label for="brandTabColorsBtn" id="brandTabColorsLabel" class="sidebar-tab-btn is-active" role="tab" aria-selected="true" aria-controls="brandPanelColors">Colors</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="brandTabTypographyBtn" class="sidebar-tab-input" name="brandTab" onchange="setBrandTab('typography')">
            <label for="brandTabTypographyBtn" id="brandTabTypographyLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="brandPanelTypography">Typography</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="brandTabAssetsBtn" class="sidebar-tab-input" name="brandTab" onchange="setBrandTab('assets')">
            <label for="brandTabAssetsBtn" id="brandTabAssetsLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="brandPanelAssets">Assets</label>
          </div>
        </div>

        <div id="brandPanelColors" class="tab-panel is-active" role="tabpanel" aria-labelledby="brandTabColorsLabel">
          <div class="container-items" id="brandColorPicker">
            <button class="item-color" type="button" style="--color:#210D2A" aria-color="#210D2A" data-hex="#210D2A"></button>
            <button class="item-color" type="button" style="--color:#13081A" aria-color="#13081A" data-hex="#13081A"></button>
            <button class="item-color" type="button" style="--color:#C7B2EA" aria-color="#C7B2EA" data-hex="#C7B2EA"></button>
            <button class="item-color" type="button" style="--color:#E3DFEB" aria-color="#E3DFEB" data-hex="#E3DFEB"></button>
            <button class="item-color" type="button" style="--color:#DEF359" aria-color="#DEF359" data-hex="#DEF359"></button>
            <button class="item-color" type="button" style="--color:#140906" aria-color="#140906" data-hex="#140906"></button>
            <button class="item-color" type="button" style="--color:#302711" aria-color="#302711" data-hex="#302711"></button>
            <button class="item-color" type="button" style="--color:#E8E8E8" aria-color="#E8E8E8" data-hex="#E8E8E8"></button>
          </div>
          <p class="simple-note">Click a swatch to copy hex.</p>
        </div>

        <div id="brandPanelTypography" class="tab-panel" role="tabpanel" aria-labelledby="brandTabTypographyLabel">
          <p class="simple-note">Primary typeface: Formular Interwell.</p>
        </div>

        <div id="brandPanelAssets" class="tab-panel" role="tabpanel" aria-labelledby="brandTabAssetsLabel">
          <p class="simple-note">Use the existing `brand/` files and approved logos from the suite headers.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var THEME_OVERRIDE_KEY = 'rstools-theme-override-v1';

      window.setBrandTab = function (tabName) {
        var map = {
          colors: { input: 'brandTabColorsBtn', label: 'brandTabColorsLabel', panel: 'brandPanelColors' },
          typography: { input: 'brandTabTypographyBtn', label: 'brandTabTypographyLabel', panel: 'brandPanelTypography' },
          assets: { input: 'brandTabAssetsBtn', label: 'brandTabAssetsLabel', panel: 'brandPanelAssets' }
        };
        Object.keys(map).forEach(function (key) {
          var isActive = key === tabName;
          var inputEl = document.getElementById(map[key].input);
          var labelEl = document.getElementById(map[key].label);
          var panelEl = document.getElementById(map[key].panel);
          if (inputEl) inputEl.checked = isActive;
          if (labelEl) {
            labelEl.classList.toggle('is-active', isActive);
            labelEl.setAttribute('aria-selected', isActive ? 'true' : 'false');
          }
          if (panelEl) panelEl.classList.toggle('is-active', isActive);
        });
      };

      function updateAppLogoForTheme() {
        var isNight = document.body.classList.contains('night-mode');
        document.querySelectorAll('.app-logo').forEach(function (img) {
          var day = img.dataset.dayLogo || img.getAttribute('src');
          if (!img.dataset.dayLogo) img.dataset.dayLogo = day;
          var night = img.dataset.nightLogo;
          if (night) img.src = isNight ? night : img.dataset.dayLogo;
        });
      }
      function isNightByTime() {
        var h = new Date().getHours();
        return h >= 19 || h < 6;
      }
      function getNextThemeBoundary(fromDate) {
        var now = fromDate || new Date();
        var six = new Date(now);
        six.setHours(6, 0, 0, 0);
        var nineteen = new Date(now);
        nineteen.setHours(19, 0, 0, 0);
        if (now < six) return six.getTime();
        if (now < nineteen) return nineteen.getTime();
        six.setDate(six.getDate() + 1);
        return six.getTime();
      }
      function readThemeOverride() {
        try {
          var raw = localStorage.getItem(THEME_OVERRIDE_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (typeof parsed !== 'object' || parsed === null) return null;
          if (typeof parsed.enabled !== 'boolean') return null;
          if (!Number.isFinite(parsed.expiresAt)) return null;
          return parsed;
        } catch (err) { return null; }
      }
      function clearThemeOverride() {
        try { localStorage.removeItem(THEME_OVERRIDE_KEY); } catch (err) {}
      }
      function resolveNightModePreference() {
        var override = readThemeOverride();
        var nowMs = Date.now();
        if (override && override.expiresAt > nowMs) return override.enabled;
        if (override) clearThemeOverride();
        return isNightByTime();
      }
      function setNightModeOverride(enabled) {
        try {
          localStorage.setItem(THEME_OVERRIDE_KEY, JSON.stringify({ enabled: Boolean(enabled), expiresAt: getNextThemeBoundary(new Date()) }));
        } catch (err) {}
      }
      function setNightMode(enabled) {
        var checkbox = document.getElementById('nightMode');
        if (checkbox) checkbox.checked = enabled;
        document.body.classList.toggle('night-mode', enabled);
        updateAppLogoForTheme();
      }
      function scheduleThemeBoundarySync() {
        var delay = Math.max(500, getNextThemeBoundary(new Date()) - Date.now() + 50);
        window.setTimeout(function () {
          clearThemeOverride();
          setNightMode(resolveNightModePreference());
          scheduleThemeBoundarySync();
        }, delay);
      }

      function bindColorPicker() {
        var container = document.getElementById('brandColorPicker');
        if (!container) return;
        container.addEventListener('click', function (event) {
          var btn = event.target.closest('.item-color');
          if (!btn) return;
          var hex = btn.dataset.hex || '';
          if (!hex) return;
          navigator.clipboard.writeText(hex).catch(function () {});
          btn.classList.add('copied');
          window.setTimeout(function () {
            btn.classList.remove('copied');
          }, 900);
        });
      }

      function init() {
        setNightMode(resolveNightModePreference());
        scheduleThemeBoundarySync();
        var nightToggle = document.getElementById('nightMode');
        if (nightToggle) {
          nightToggle.addEventListener('change', function () {
            setNightMode(nightToggle.checked);
            setNightModeOverride(nightToggle.checked);
          });
        }
        bindColorPicker();
        window.setBrandTab('colors');
      }
      init();
    })();
  </script>
  <script src="search-ui.js" defer></script>
</body>
</html>
