<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interwell Design Example</title>
  <style>
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-regular-eAm2gA_L.otf");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-medium-Ddm9_fCE.otf");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-bold-CntqEvi7.otf");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #f4f0f7;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-alt: rgba(255, 255, 255, 0.72);
      --border: rgba(33, 13, 42, 0.16);
      --text: #22122d;
      --muted: #685774;
      --primary: #210d2a;
      --primary-strong: #13081a;
      --shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius: 3px;
      --space-sm: 2px;
      --space-md: 4px;
      --space-lg: 6px;
      --control-height: 22px;
      --control-font: 10px;
    }
    body.night-mode {
      --bg: #110b16;
      --surface: rgba(30, 20, 40, 0.92);
      --surface-alt: rgba(25, 17, 34, 0.9);
      --border: rgba(208, 191, 222, 0.22);
      --text: #f2eaf8;
      --muted: #b8a6c4;
      --primary: #f2eaf8;
      --primary-strong: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "formular-interwell", "Segoe UI", sans-serif;
      font-size: 11px;
      background: radial-gradient(1200px 420px at 15% -5%, rgba(119, 74, 160, 0.2), transparent 55%), radial-gradient(900px 360px at 88% -10%, rgba(33, 13, 42, 0.16), transparent 60%), linear-gradient(180deg, #f8f4fb 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap { min-height: 100vh; padding: var(--space-lg); display: grid; gap: var(--space-lg); }
    .app-header { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 5px 7px; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
    .app-header h1 { margin: 0; font-size: .82rem; }
    .app-header p { margin: 2px 0 0; color: var(--muted); font-size: 10px; }
    .card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 10px; box-shadow: var(--shadow); }
    .card h2 { margin: 0 0 6px; font-size: .82rem; }
    .card p { margin: 0; color: var(--muted); line-height: 1.45; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: var(--control-height); padding: 2px 8px; font-size: var(--control-font); border: 1px solid var(--primary); border-radius: var(--radius); background: var(--primary); color: #fff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="app-header">
      <h1>Interwell Design Example</h1>
      <p>Reference page aligned with the WAP design system tokens.</p>
    </header>
    <section class="card">
      <h2>Consistent UX Baseline</h2>
      <p>This page now uses the same compact typography, color palette, spacing scale, and component geometry as the updated tool pages.</p>
    </section>
    <section class="card">
      <a class="btn" href="index.html">Back To Tool Suite</a>
    </section>
  </div>
</body>
</html>
