<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interwell Units Converter</title>
  <link rel="stylesheet" href="brand/brand-tokens.css">
  <link rel="stylesheet" href="search-ui.css">
  <link rel="stylesheet" href="night-toggle.css">
  <style>
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-regular-eAm2gA_L.otf");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-medium-Ddm9_fCE.otf");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-bold-CntqEvi7.otf");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f4f0f7;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-alt: rgba(255, 255, 255, 0.72);
      --border: rgba(33, 13, 42, 0.16);
      --text: #22122d;
      --muted: #685774;
      --primary: #210d2a;
      --shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius: 4px;
      --panel-radius: 6px;
      --app-pad: 6px;
      --control-height: 22px;
      --control-font: 10px;
      --control-px: 6px;
      --control-py: 2px;
      --field-border: #cbd5e1;
    }

    body.night-mode {
      --bg: #110b16;
      --surface: rgba(30, 20, 40, 0.92);
      --surface-alt: rgba(25, 17, 34, 0.9);
      --border: rgba(208, 191, 222, 0.22);
      --text: #f2eaf8;
      --muted: #b8a6c4;
      --primary: #f2eaf8;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
      --field-border: #30363d;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "formular-interwell", "Segoe UI", sans-serif;
      font-size: 11px;
      background:
        radial-gradient(1200px 420px at 15% -5%, rgba(119, 74, 160, 0.2), transparent 55%),
        radial-gradient(900px 360px at 88% -10%, rgba(33, 13, 42, 0.16), transparent 60%),
        linear-gradient(180deg, #f8f4fb 0%, var(--bg) 100%);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    .wrap.app-shell {
      min-height: 100vh;
      padding: var(--app-pad);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .app-header {
      display: grid;
      gap: 4px;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .app-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .app-brand {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .app-logo {
      height: 18px;
      width: auto;
      flex-shrink: 0;
    }
    body.night-mode .app-logo {
      filter: brightness(0) invert(1) saturate(0);
    }
.nav-icon-btn {
      width: 34px;
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: transparent;
      color: var(--brand-dark-purple);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .nav-icon-btn:hover {
      transform: translateY(-2px);
      background: color-mix(in srgb, var(--brand-mid-lavender) 18%, transparent);
    }
    .nav-icon-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }    body.night-mode .nav-icon-btn {
      color: #f2eaf8;
    }
    
    .app-brand {
      gap: 0;
    }
    .app-logo {
      margin-right: 4px;
    }
    .app-brand .nav-icon-btn {
      flex-shrink: 0;
    }
    .app-brand .nav-icon-btn + .nav-icon-btn {
      margin-left: 4px;
    }
.app-header h1 {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    .app-header p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 10px;
    }
    .app-header p a {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
    }
    .app-header p a:hover {
      color: var(--primary);
      text-decoration: underline;
    }
    .app-meta {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      line-height: 1.4;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 4px;
      border-top: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
    }
    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: var(--control-py) var(--control-px);
      min-height: var(--control-height);
      border: 1px solid color-mix(in srgb, var(--border) 78%, #d8dbe5 22%);
      border-radius: var(--radius);
      background: var(--surface-alt);
      color: var(--text);
      font-size: var(--control-font);
    }
    .theme-switch input[type="checkbox"] {
      margin: 0;
      accent-color: var(--primary);
      inline-size: 13px;
      block-size: 13px;
    }

    .tool-main {
      display: grid;
      gap: 6px;
      width: 100%;
    }
    .tool-panel {
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 8px;
      display: grid;
      gap: 8px;
      width: 100%;
    }
    .sidebar-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      margin-bottom: 6px;
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent 22%);
      border-radius: 6px;
      padding: 3px;
      box-sizing: border-box;
      width: fit-content;
      max-width: 100%;
      align-self: start;
    }
    .sidebar-tab-option {
      display: flex;
      align-items: stretch;
    }
    .sidebar-tab-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-tab-btn {
      min-height: 24px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 5px;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .sidebar-tab-btn.is-active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 8px 18px rgba(33, 13, 42, 0.2);
    }
    body.night-mode .sidebar-tab-btn.is-active {
      background: #d3ef54;
      color: #210d2a;
      border-color: color-mix(in srgb, #d3ef54 84%, #95ab2f 16%);
    }
    .tab-panel { display: none; }
    .tab-panel.is-active { display: block; }
    .panel-title {
      margin: 0;
      font-size: 0.9rem;
    }
    .panel-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
    }
    .panel-subtitle,
    .input-row {
      width: min(100%, 860px);
    }

    .input-row {
      display: grid;
      grid-template-columns: 140px 110px;
      gap: 6px;
      align-items: end;
    }
    .input-row label {
      display: grid;
      gap: 3px;
      font-size: 10px;
      color: var(--muted);
    }
    input, select, button {
      font: inherit;
      color: inherit;
      border: 1px solid var(--field-border);
      border-radius: var(--radius);
      min-height: var(--control-height);
      padding: var(--control-py) var(--control-px);
      background: color-mix(in srgb, var(--surface-alt) 84%, #ffffff 16%);
      font-size: 10px;
    }
    button {
      cursor: pointer;
      font-weight: 600;
      border-color: color-mix(in srgb, var(--primary) 28%, var(--field-border));
      color: var(--primary);
      min-width: 86px;
    }

    .conversion-table-wrap {
      margin-top: 8px;
      overflow-x: auto;
      border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
      border-radius: var(--panel-radius);
      background: color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      width: fit-content;
      max-width: 100%;
    }
    .conversion-table {
      width: auto;
      border-collapse: collapse;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }
    .conversion-table th,
    .conversion-table td {
      padding: 7px 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      text-align: left;
      white-space: nowrap;
    }
    .conversion-table thead th {
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface-alt) 78%, #ffffff 22%);
    }
    .conversion-table tbody tr:last-child td {
      border-bottom: 0;
    }
    .source-row td {
      font-weight: 600;
      background: color-mix(in srgb, var(--surface-alt) 70%, #ffffff 30%);
    }

    @media (max-width: 980px) {
      .app-header-top {
        align-items: flex-start;
        flex-direction: column;
      }
      .app-meta {
        text-align: left;
        white-space: normal;
      }
      .header-actions {
        justify-content: flex-start;
      }
      .input-row {
        grid-template-columns: 1fr;
      }
      .sidebar-tabs { grid-template-columns: repeat(2, auto); }
    }
  
/* Prevent iOS Safari input zoom-on-focus */
@supports (-webkit-touch-callout: none) {
  @media (hover: none) and (pointer: coarse) {
    input,
    select,
    textarea {
      font-size: 16px !important;
    }
  }
}
</style>
</head>
<body>
  <div class="wrap app-shell">
    <header class="app-header">
      <div class="app-header-top">
        <div class="app-brand">
          <img class="app-logo" src="https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/assets/assets/Interwell_Logo_Symbol_Dark_Purple-2.png" alt="Interwell Logo">
                    <a class="nav-icon-btn" href="index.html" aria-label="Home" title="Home">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2L3 10.6v10.2h6.1v-6.3h5.8v6.3H21V10.6L12 3.2z"/></svg>
            </a>
            <button class="nav-icon-btn" type="button" aria-label="Back" title="Back" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = 'index.html'; }">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.2 4.4L3.6 12l7.6 7.6 1.6-1.6-4.9-4.9H20v-2.2H7.9l4.9-4.9-1.6-1.6z"/></svg>
            </button>
            <button class="nav-icon-btn" type="button" aria-label="Forward" title="Forward" onclick="if (window.history.length > 1) { window.history.forward(); } else { window.location.href = 'index.html'; }">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.8 4.4l7.6 7.6-7.6 7.6-1.6-1.6 4.9-4.9H4v-2.2h12.1l-4.9-4.9 1.6-1.6z"/></svg>
            </button>
        </div>
        <div class="app-meta">
          <div>By Darren Wilkinson</div>
          <div>Updated: 15.05.2026</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="toggle-switch" title="Night Mode">
          <label class="switch-label" for="nightMode">
            <input id="nightMode" class="checkbox" type="checkbox">
            <span class="slider"></span>
            <span class="toggle-text">Night Mode</span>
          </label>
        </div>
      </div>
    </header>

    <main class="tool-main">
      <section class="tool-panel" aria-labelledby="unitsTitle">
        <h2 id="unitsTitle" class="panel-title">Units Converter</h2>
        <p class="panel-subtitle">Choose a conversion tab, enter a value, and select the source unit.</p>

        <div class="sidebar-tabs" role="tablist" aria-label="Converter types">
          <div class="sidebar-tab-option">
            <input type="radio" id="tabPressureBtn" class="sidebar-tab-input" name="converterTab" checked onchange="setConverterTab('pressure')">
            <label for="tabPressureBtn" id="tabPressureLabel" class="sidebar-tab-btn is-active" role="tab" aria-selected="true" aria-controls="tabPanelPressure">Pressure</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="tabDistanceBtn" class="sidebar-tab-input" name="converterTab" onchange="setConverterTab('distance')">
            <label for="tabDistanceBtn" id="tabDistanceLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="tabPanelDistance">Distance</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="tabTemperatureBtn" class="sidebar-tab-input" name="converterTab" onchange="setConverterTab('temperature')">
            <label for="tabTemperatureBtn" id="tabTemperatureLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="tabPanelTemperature">Temperature</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="tabCasingBtn" class="sidebar-tab-input" name="converterTab" onchange="setConverterTab('casing')">
            <label for="tabCasingBtn" id="tabCasingLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="tabPanelCasing">Casing Weight</label>
          </div>
        </div>

        <div id="tabPanelPressure" class="tab-panel is-active" role="tabpanel" aria-labelledby="tabPressureLabel">
          <div class="input-row">
            <label for="pressureInput">
              Pressure Value
              <input id="pressureInput" type="number" step="any" value="1">
            </label>
            <label for="pressureUnit">
              Input Unit
              <select id="pressureUnit">
                <option value="psi" selected>psi</option>
                <option value="bar">bar</option>
                <option value="mpa">MPa</option>
              </select>
            </label>
          </div>
          <div class="conversion-table-wrap">
            <table class="conversion-table">
              <thead><tr><th>Unit</th><th>Value</th></tr></thead>
              <tbody id="pressureTableBody"></tbody>
            </table>
          </div>
        </div>

        <div id="tabPanelDistance" class="tab-panel" role="tabpanel" aria-labelledby="tabDistanceLabel">
          <div class="input-row">
            <label for="distanceInput">
              Distance Value
              <input id="distanceInput" type="number" step="any" value="1">
            </label>
            <label for="distanceUnit">
              Input Unit
              <select id="distanceUnit">
                <option value="m" selected>m</option>
                <option value="ft">ft</option>
                <option value="km">km</option>
                <option value="mi">mi</option>
                <option value="in">in</option>
              </select>
            </label>
          </div>
          <div class="conversion-table-wrap">
            <table class="conversion-table">
              <thead><tr><th>Unit</th><th>Value</th></tr></thead>
              <tbody id="distanceTableBody"></tbody>
            </table>
          </div>
        </div>

        <div id="tabPanelTemperature" class="tab-panel" role="tabpanel" aria-labelledby="tabTemperatureLabel">
          <div class="input-row">
            <label for="temperatureInput">
              Temperature Value
              <input id="temperatureInput" type="number" step="any" value="20">
            </label>
            <label for="temperatureUnit">
              Input Unit
              <select id="temperatureUnit">
                <option value="c" selected>Celsius (°C)</option>
                <option value="f">Fahrenheit (°F)</option>
                <option value="k">Kelvin (K)</option>
              </select>
            </label>
          </div>
          <div class="conversion-table-wrap">
            <table class="conversion-table">
              <thead><tr><th>Unit</th><th>Value</th></tr></thead>
              <tbody id="temperatureTableBody"></tbody>
            </table>
          </div>
        </div>

        <div id="tabPanelCasing" class="tab-panel" role="tabpanel" aria-labelledby="tabCasingLabel">
          <div class="input-row">
            <label for="casingInput">
              Casing Weight Value
              <input id="casingInput" type="number" step="any" value="20">
            </label>
            <label for="casingUnit">
              Input Unit
              <select id="casingUnit">
                <option value="lbft" selected>lb/ft</option>
                <option value="kgm">kg/m</option>
              </select>
            </label>
          </div>
          <div class="conversion-table-wrap">
            <table class="conversion-table">
              <thead><tr><th>Unit</th><th>Value</th></tr></thead>
              <tbody id="casingTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var THEME_OVERRIDE_KEY = 'rstools-theme-override-v1';
      var pressureInput = document.getElementById('pressureInput');
      var pressureUnit = document.getElementById('pressureUnit');
      var pressureTableBody = document.getElementById('pressureTableBody');
      var distanceInput = document.getElementById('distanceInput');
      var distanceUnit = document.getElementById('distanceUnit');
      var distanceTableBody = document.getElementById('distanceTableBody');
      var temperatureInput = document.getElementById('temperatureInput');
      var temperatureUnit = document.getElementById('temperatureUnit');
      var temperatureTableBody = document.getElementById('temperatureTableBody');
      var casingInput = document.getElementById('casingInput');
      var casingUnit = document.getElementById('casingUnit');
      var casingTableBody = document.getElementById('casingTableBody');

      var UNIT_FACTORS_TO_PSI = {
        psi: 1,
        bar: 14.5037738,
        mpa: 145.0377377
      };
      var UNIT_FACTORS_TO_METRE = {
        m: 1,
        ft: 0.3048,
        km: 1000,
        mi: 1609.344,
        in: 0.0254
      };
      var LBFT_TO_KGM = 1.48816394357;

      function updateAppLogoForTheme() {
        var isNight = document.body.classList.contains('night-mode');
        document.querySelectorAll('.app-logo').forEach(function (img) {
          var day = img.dataset.dayLogo || img.getAttribute('src');
          if (!img.dataset.dayLogo) img.dataset.dayLogo = day;
          var night = img.dataset.nightLogo;
          if (night) img.src = isNight ? night : img.dataset.dayLogo;
        });
      }

      function isNightByTime() {
        var h = new Date().getHours();
        return h >= 19 || h < 6;
      }

      function getNextThemeBoundary(fromDate) {
        var now = fromDate || new Date();
        var six = new Date(now);
        six.setHours(6, 0, 0, 0);
        var nineteen = new Date(now);
        nineteen.setHours(19, 0, 0, 0);
        if (now < six) return six.getTime();
        if (now < nineteen) return nineteen.getTime();
        six.setDate(six.getDate() + 1);
        return six.getTime();
      }

      function readThemeOverride() {
        try {
          var raw = localStorage.getItem(THEME_OVERRIDE_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (typeof parsed !== 'object' || parsed === null) return null;
          if (typeof parsed.enabled !== 'boolean') return null;
          if (!Number.isFinite(parsed.expiresAt)) return null;
          return parsed;
        } catch (err) {
          return null;
        }
      }

      function clearThemeOverride() {
        try {
          localStorage.removeItem(THEME_OVERRIDE_KEY);
        } catch (err) {}
      }

      function resolveNightModePreference() {
        var override = readThemeOverride();
        var nowMs = Date.now();
        if (override && override.expiresAt > nowMs) return override.enabled;
        if (override) clearThemeOverride();
        return isNightByTime();
      }

      function setNightModeOverride(enabled) {
        try {
          localStorage.setItem(
            THEME_OVERRIDE_KEY,
            JSON.stringify({
              enabled: Boolean(enabled),
              expiresAt: getNextThemeBoundary(new Date())
            })
          );
        } catch (err) {}
      }

      function setNightMode(enabled) {
        var checkbox = document.getElementById('nightMode');
        if (checkbox) checkbox.checked = enabled;
        document.body.classList.toggle('night-mode', enabled);
        updateAppLogoForTheme();
      }

      function scheduleThemeBoundarySync() {
        var delay = Math.max(500, getNextThemeBoundary(new Date()) - Date.now() + 50);
        window.setTimeout(function () {
          clearThemeOverride();
          setNightMode(resolveNightModePreference());
          scheduleThemeBoundarySync();
        }, delay);
      }

      function toPsi(value, unit) {
        return value * UNIT_FACTORS_TO_PSI[unit];
      }

      function fromPsi(valuePsi, unit) {
        return valuePsi / UNIT_FACTORS_TO_PSI[unit];
      }

      function formatValue(value) {
        if (!Number.isFinite(value)) return '-';
        return value.toLocaleString('en-GB', {
          maximumFractionDigits: 6
        });
      }

      function renderTable() {
        var raw = Number(pressureInput.value);
        var sourceUnit = pressureUnit.value || 'psi';
        var psiValue = Number.isFinite(raw) ? toPsi(raw, sourceUnit) : NaN;
        var units = ['psi', 'bar', 'mpa'];
        pressureTableBody.innerHTML = '';

        units.forEach(function (unit) {
          var row = document.createElement('tr');
          if (unit === sourceUnit) row.className = 'source-row';

          var unitCell = document.createElement('td');
          unitCell.textContent = unit === 'mpa' ? 'MPa' : unit;

          var valueCell = document.createElement('td');
          valueCell.textContent = formatValue(fromPsi(psiValue, unit));

          row.appendChild(unitCell);
          row.appendChild(valueCell);
          pressureTableBody.appendChild(row);
        });
      }

      function toMetre(value, unit) {
        return value * UNIT_FACTORS_TO_METRE[unit];
      }

      function fromMetre(valueMetre, unit) {
        return valueMetre / UNIT_FACTORS_TO_METRE[unit];
      }

      function renderDistanceTable() {
        var raw = Number(distanceInput.value);
        var sourceUnit = distanceUnit.value || 'm';
        var metreValue = Number.isFinite(raw) ? toMetre(raw, sourceUnit) : NaN;
        var units = ['m', 'ft', 'km', 'mi', 'in'];
        distanceTableBody.innerHTML = '';
        units.forEach(function (unit) {
          var row = document.createElement('tr');
          if (unit === sourceUnit) row.className = 'source-row';
          var unitCell = document.createElement('td');
          unitCell.textContent = unit;
          var valueCell = document.createElement('td');
          valueCell.textContent = formatValue(fromMetre(metreValue, unit));
          row.appendChild(unitCell);
          row.appendChild(valueCell);
          distanceTableBody.appendChild(row);
        });
      }

      function toKelvin(value, unit) {
        if (unit === 'c') return value + 273.15;
        if (unit === 'f') return (value - 32) * 5 / 9 + 273.15;
        return value;
      }

      function fromKelvin(valueKelvin, unit) {
        if (unit === 'c') return valueKelvin - 273.15;
        if (unit === 'f') return (valueKelvin - 273.15) * 9 / 5 + 32;
        return valueKelvin;
      }

      function renderTemperatureTable() {
        var raw = Number(temperatureInput.value);
        var sourceUnit = temperatureUnit.value || 'c';
        var kelvinValue = Number.isFinite(raw) ? toKelvin(raw, sourceUnit) : NaN;
        var units = ['c', 'f', 'k'];
        var labels = { c: 'Celsius (°C)', f: 'Fahrenheit (°F)', k: 'Kelvin (K)' };
        temperatureTableBody.innerHTML = '';
        units.forEach(function (unit) {
          var row = document.createElement('tr');
          if (unit === sourceUnit) row.className = 'source-row';
          var unitCell = document.createElement('td');
          unitCell.textContent = labels[unit];
          var valueCell = document.createElement('td');
          valueCell.textContent = formatValue(fromKelvin(kelvinValue, unit));
          row.appendChild(unitCell);
          row.appendChild(valueCell);
          temperatureTableBody.appendChild(row);
        });
      }

      function toKgPerM(value, unit) {
        if (unit === 'kgm') return value;
        return value * LBFT_TO_KGM;
      }

      function fromKgPerM(valueKgPerM, unit) {
        if (unit === 'kgm') return valueKgPerM;
        return valueKgPerM / LBFT_TO_KGM;
      }

      function renderCasingTable() {
        var raw = Number(casingInput.value);
        var sourceUnit = casingUnit.value || 'lbft';
        var kgPerMValue = Number.isFinite(raw) ? toKgPerM(raw, sourceUnit) : NaN;
        var units = ['lbft', 'kgm'];
        var labels = { lbft: 'lb/ft', kgm: 'kg/m' };
        casingTableBody.innerHTML = '';
        units.forEach(function (unit) {
          var row = document.createElement('tr');
          if (unit === sourceUnit) row.className = 'source-row';
          var unitCell = document.createElement('td');
          unitCell.textContent = labels[unit];
          var valueCell = document.createElement('td');
          valueCell.textContent = formatValue(fromKgPerM(kgPerMValue, unit));
          row.appendChild(unitCell);
          row.appendChild(valueCell);
          casingTableBody.appendChild(row);
        });
      }

      window.setConverterTab = function (tabName) {
        var map = {
          pressure: { input: 'tabPressureBtn', label: 'tabPressureLabel', panel: 'tabPanelPressure' },
          distance: { input: 'tabDistanceBtn', label: 'tabDistanceLabel', panel: 'tabPanelDistance' },
          temperature: { input: 'tabTemperatureBtn', label: 'tabTemperatureLabel', panel: 'tabPanelTemperature' },
          casing: { input: 'tabCasingBtn', label: 'tabCasingLabel', panel: 'tabPanelCasing' }
        };
        Object.keys(map).forEach(function (key) {
          var isActive = key === tabName;
          var inputEl = document.getElementById(map[key].input);
          var labelEl = document.getElementById(map[key].label);
          var panelEl = document.getElementById(map[key].panel);
          if (inputEl) inputEl.checked = isActive;
          if (labelEl) {
            labelEl.classList.toggle('is-active', isActive);
            labelEl.setAttribute('aria-selected', isActive ? 'true' : 'false');
          }
          if (panelEl) panelEl.classList.toggle('is-active', isActive);
        });
      };

      function bindEvents() {
        pressureInput.addEventListener('input', renderTable);
        pressureUnit.addEventListener('change', renderTable);
        distanceInput.addEventListener('input', renderDistanceTable);
        distanceUnit.addEventListener('change', renderDistanceTable);
        temperatureInput.addEventListener('input', renderTemperatureTable);
        temperatureUnit.addEventListener('change', renderTemperatureTable);
        casingInput.addEventListener('input', renderCasingTable);
        casingUnit.addEventListener('change', renderCasingTable);

        var nightToggle = document.getElementById('nightMode');
        if (nightToggle) {
          nightToggle.addEventListener('change', function () {
            setNightMode(nightToggle.checked);
            setNightModeOverride(nightToggle.checked);
          });
        }
      }

      function init() {
        setNightMode(resolveNightModePreference());
        scheduleThemeBoundarySync();
        bindEvents();
        renderTable();
        renderDistanceTable();
        renderTemperatureTable();
        renderCasingTable();
        window.setConverterTab('pressure');
      }

      init();
    })();
  </script>
  <script src="search-ui.js" defer></script>
</body>
</html>
