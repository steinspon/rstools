      const estimatedPlotHeightRaw = Math.max(760 * schematic.plotSettings.verticalScale, span * 0.18 * schematic.plotSettings.verticalScale);
      const estimatedPlotHeight = Math.min(MAX_PLOT_HEIGHT, estimatedPlotHeightRaw);
      const ticks = resolveDepthTicks(top, bottom, true, estimatedPlotHeight);
      schematic.plotSettings.minorTick = ticks.minor;
      schematic.plotSettings.majorTick = ticks.major;
      renderAll();
      markUnsavedChanges();
    }

    function resetVerticalScale() {
      schematic.plotSettings.verticalScale = 1;
      const top = num(schematic.plotSettings.topDepth);
      const bottom = num(schematic.plotSettings.bottomDepth, 5000);
      const span = Math.max(MIN_VIEW_SPAN, bottom - top);
      const estimatedPlotHeight = Math.max(760, span * 0.18);
      const ticks = resolveDepthTicks(top, bottom, true, estimatedPlotHeight);
      schematic.plotSettings.minorTick = ticks.minor;
      schematic.plotSettings.majorTick = ticks.major;
      renderAll();
      markUnsavedChanges();
    }

    function setVerticalScaleA4() {
      setVerticalScaleByAspect(Math.sqrt(2));
    }

    function setVerticalScaleA4Landscape() {
      setVerticalScaleByAspect(1 / Math.sqrt(2));
    }

    function setVerticalScaleByAspect(targetHeightToWidth) {
      const svg = document.getElementById('schematicSvg');
      const svgWrap = svg?.parentElement;
      const wrapWidth = Math.max(560, (svgWrap?.clientWidth || 1280) - 24);
      const top = num(schematic.plotSettings.topDepth);
      const bottom = num(schematic.plotSettings.bottomDepth, 5000);
      const span = Math.max(MIN_VIEW_SPAN, bottom - top);
      const basePlotHeight = Math.max(760, span * 0.18);
      const plotAreaWidth = Math.max(1, (wrapWidth - 40) - 98);
      const targetPlotHeight = plotAreaWidth * targetHeightToWidth;
      const nextScale = clampVerticalScale(targetPlotHeight / basePlotHeight);
      schematic.plotSettings.verticalScale = Math.round(nextScale * 1000) / 1000;
      const estimatedPlotHeightRaw = Math.max(760 * schematic.plotSettings.verticalScale, span * 0.18 * schematic.plotSettings.verticalScale);
      const estimatedPlotHeight = Math.min(MAX_PLOT_HEIGHT, estimatedPlotHeightRaw);
      const ticks = resolveDepthTicks(top, bottom, true, estimatedPlotHeight);
      schematic.plotSettings.minorTick = ticks.minor;
      schematic.plotSettings.majorTick = ticks.major;
      renderAll();
      markUnsavedChanges();
    }

    function autoPlaceAnnotations() {
      const clearManualPlacement = (item) => {
        if (!item || typeof item !== 'object') return;
        delete item.manualLabelY;
        item.labelLocked = false;
      };
      (schematic.strings || []).forEach(clearManualPlacement);
      (schematic.completion || []).forEach(clearManualPlacement);
      (schematic.components || []).forEach(clearManualPlacement);
      (schematic.cement || []).forEach(clearManualPlacement);
      (schematic.annotations || []).forEach(clearManualPlacement);
      renderSchematic();
      renderCollectionPanels();
      renderProperties();
      renderValidation();
      markUnsavedChanges();
    }

    function applyTemplate(name) {
      if (name !== 'rocksolid_alpha') return;
      schematic = clone(ROCKSOLID_TEMPLATE_ALPHA);
      selected = null;
      renderAll();
    }

    function validateSchematic() {
      const warnings = [];
      const ps = schematic.plotSettings;
      if (num(ps.topDepth) >= num(ps.bottomDepth)) warnings.push('Plot settings require top depth to be shallower than bottom depth.');
      Object.entries(collectionDefs).forEach(([key]) => {
        (schematic[key] || []).forEach(item => {
          if (item.topMD !== undefined && item.bottomMD !== undefined && num(item.topMD) >= num(item.bottomMD)) {
            warnings.push(`${itemTitle(item)}: topMD must be less than bottomMD.`);
          }
          if ((item.odIn !== undefined && num(item.odIn) <= 0) || (item.diameterIn !== undefined && num(item.diameterIn) <= 0)) {
            warnings.push(`${itemTitle(item)}: diameter must be positive.`);
          }
          const top = depthStart(item);
          const bottom = num(item.bottomMD, num(item.md, top));
          if (top < num(ps.topDepth) || bottom > num(ps.bottomDepth)) warnings.push(`${itemTitle(item)} extends outside the plotted depth range.`);
        });
      });
      schematic.strings.forEach(str => {
        const hole = schematic.holeSections.find(h => num(h.topMD) <= num(str.topMD) && num(h.bottomMD) >= num(str.bottomMD));
        if (hole && num(str.odIn) >= num(hole.diameterIn)) warnings.push(`${str.label}: string OD is not smaller than containing hole section diameter.`);
      });
      const tubularIds = new Set([...(schematic.strings || []).map(s => s.id), ...(schematic.completion || []).map(s => s.id)]);
      const holeIds = new Set((schematic.holeSections || []).map(h => `hole:${h.id}`));
      (schematic.components || []).forEach(item => {
        const type = String(item?.type || '').toLowerCase();
        if (type === 'cement_plug' || type === 'section_mill' || type === 'bridge_plug') {
          if (!item.host) {
            warnings.push(`${itemTitle(item)}: host must be set to a tubular or open hole section for this component type.`);
          } else if (!tubularIds.has(String(item.host)) && !holeIds.has(String(item.host))) {
            warnings.push(`${itemTitle(item)}: host must reference a tubular (string/completion) or open hole section (hole:...).`);
          }
        }
        if (type === 'restriction_general') {
          if (!item.host) {
            warnings.push(`${itemTitle(item)}: host must be set to a tubular for restriction components.`);
          } else if (!tubularIds.has(String(item.host))) {
            warnings.push(`${itemTitle(item)}: host must reference a tubular (string/completion).`);
          }
          if (!(num(item.restrictionIdIn, 0) > 0)) {
            warnings.push(`${itemTitle(item)}: restriction ID must be greater than zero.`);
          }
        }
      });
      return warnings;
    }

    function renderValidation() {
      const warnings = validateSchematic();
      document.getElementById('warningList').innerHTML = warnings.length
        ? warnings.map(w => `<li>${esc(w)}</li>`).join('')
        : '<li>No validation warnings.</li>';
    }

    function renderSchematic() {
      closeInlineAnnotationEditor();
      depthCompressionCache = null;
      const svg = document.getElementById('schematicSvg');
      const svgWrap = svg.parentElement;
      const ps = schematic.plotSettings;
      const wrapWidth = Math.max(560, (svgWrap?.clientWidth || 1280) - 24);
      const width = wrapWidth;
      const top = num(ps.topDepth);
      const selectedBottom = num(ps.bottomDepth, 5000);
      const depthSpan = Math.max(MIN_VIEW_SPAN, selectedBottom - top);
      const bottom = selectedBottom + Math.min(RENDER_BOTTOM_BUFFER_MAX, depthSpan * RENDER_BOTTOM_BUFFER_FACTOR);
      const verticalScale = clampVerticalScale(ps.verticalScale);
      const plotHeightRaw = Math.max(760 * verticalScale, (bottom - top) * 0.18 * verticalScale);
      const plotHeight = Math.min(MAX_PLOT_HEIGHT, plotHeightRaw);
      const margin = { top: 62, right: Math.min(280, Math.max(170, Math.floor(width * 0.24))), bottom: 44, left: 98 };
      lastRenderDepthContext = { top, bottom, margin, plotHeight };
      const height = margin.top + plotHeight + margin.bottom;
      const formationTrackWidth = width < 900 ? 36 : 50;
      const preferredCx = margin.left + (width < 900 ? 132 : 152);
      const cxMax = width - margin.right - 210;
      let cx = Math.max(margin.left + 118, Math.min(preferredCx, cxMax));
      const initialLithX = Math.min(width - formationTrackWidth - 92, Math.max(cx + 176, cx + 160));
      const initialHoleScaleRightBound = Math.max(cx + 130, initialLithX - 92);
      updateRenderRadialScale(cx, initialHoleScaleRightBound);
      const widestHalf = getMaxRenderedHalfWidth();
      const minCxForLeftFit = margin.left + widestHalf + 8;
      cx = Math.max(minCxForLeftFit, Math.min(cx, cxMax));
      let lithX = Math.min(width - formationTrackWidth - 92, Math.max(cx + 176, cx + 160));
      renderCalloutTextX = computeCalloutLabelX(cx, lithX, width, widestHalf);
      // Keep formation track to the right of annotation/callout text.
      const minLithXFromCallouts = renderCalloutTextX + 230;
      lithX = Math.min(width - formationTrackWidth - 32, Math.max(lithX, minLithXFromCallouts));
      // Recompute callout anchors after final formation-track placement so all label systems align.
      renderCalloutTextX = computeCalloutLabelX(cx, lithX, width, widestHalf);
      renderCalloutLineEndX = renderCalloutTextX - 8;
      const holeScaleRightBound = Math.max(cx + 130, lithX - 92);
      updateRenderRadialScale(cx, holeScaleRightBound);
      svg.setAttribute('width', width);
      svg.setAttribute('height', height);
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = '';
      const plotBg = currentPlotBackground();
      svg.style.background = '';
      svg.appendChild(el('title', { id:'schematicTitle' }, `${schematic.wellInfo.wellName || 'Well schematic'} well architecture schematic`));
      svg.appendChild(el('desc', { id:'schematicDesc' }, 'TVD-scaled well architecture diagram showing open hole, tubulars, cement, completions, barriers, perforations, formation intervals, and annotations.'));
      svg.appendChild(el('rect', { x:0, y:0, width, height, fill:'var(--plot-bg)' }));
      svg.appendChild(el('rect', {
        x: margin.left,
        y: margin.top,
        width: Math.max(1, (width - 40) - margin.left),
        height: Math.max(1, plotHeight),
        fill: plotBg
      }));

      // Explicit layer stack to keep open hole always back-most.
      const layerHole = el('g', { id:'layer-hole' });
      const layerFill = el('g', { id:'layer-annular-fill' });
      const layerTubular = el('g', { id:'layer-tubulars' });
      const layerComponents = el('g', { id:'layer-components-pre-mill' });
      const layerComponentsPostMill = el('g', { id:'layer-components-post-mill' });
      const layerOverlay = el('g', { id:'layer-overlays' });
      const layerTopDevices = el('g', { id:'layer-top-devices' });
      const layerCursor = el('g', { id:'layer-cursor-guide' });
      [layerHole, layerFill, layerTubular, layerComponents, layerComponentsPostMill, layerOverlay, layerTopDevices].forEach(layer => svg.appendChild(layer));
      applyPlotAreaClip(svg, [layerHole, layerFill, layerTubular, layerComponents, layerComponentsPostMill, layerTopDevices], margin, width, plotHeight);
      applySectionMillMasks(svg, [layerFill, layerTubular, layerComponents], cx, width, height, top, bottom, margin, plotHeight);

      if (ps.showLithology) drawFormationGuideLines(layerHole, margin, width, top, bottom, plotHeight);
      schematic.holeSections.filter(viz).forEach(item => drawHoleSection(layerHole, item, cx, top, bottom, margin, plotHeight));
      schematic.cement.filter(viz).forEach(item => drawCement(layerFill, item, cx, top, bottom, margin, plotHeight));
      schematic.strings.filter(viz).forEach(item => item.type === 'liner' ? drawLiner(layerTubular, item, cx, top, bottom, margin, plotHeight) : drawCasingString(layerTubular, item, cx, top, bottom, margin, plotHeight));
      schematic.completion.filter(viz).forEach(item => drawTubing(layerTubular, item, cx, top, bottom, margin, plotHeight));
      const lastSectionMillIndex = (schematic.components || []).reduce((last, item, index) => (viz(item) && item.type === 'section_mill' ? index : last), -1);
      const occupiedLabelBands = [];
      const deferredTopDevices = [];
      (schematic.components || []).forEach((item, index) => {
        if (!viz(item)) return;
        if (item.type === 'section_mill') return;
        const isDownholeDevice = item.type === 'downhole_device_circle' || item.type === 'downhole_device_rectangle';
        if (isDownholeDevice) {
          deferredTopDevices.push(item);
          return;
        }
        const targetLayer = index > lastSectionMillIndex ? layerComponentsPostMill : layerComponents;
        if (item.type === 'perforations') drawPerforations(targetLayer, item, cx, top, bottom, margin, plotHeight);
        else drawComponent(targetLayer, item, cx, top, bottom, margin, plotHeight, occupiedLabelBands);
      });
      drawHeader(layerOverlay, width, margin, top, bottom);
      drawDatumLines(layerOverlay, width, margin, plotHeight, top, bottom);
      drawDepthScale(layerOverlay, margin, plotHeight, top, bottom);
      if (ps.showLithology) drawFormationTrack(layerOverlay, lithX, margin, plotHeight, top, bottom, formationTrackWidth);
      schematic.components.filter(viz).filter(item => item.type === 'section_mill').forEach(item => drawSectionMill(layerOverlay, item, cx, top, bottom, margin, plotHeight, occupiedLabelBands));
      deferredTopDevices.forEach(item => drawComponent(layerTopDevices, item, cx, top, bottom, margin, plotHeight, occupiedLabelBands));
      drawHiddenSections(layerOverlay, cx, margin, width, top, bottom, plotHeight);
      if (ps.showAnnotations) drawAutoLabels(layerOverlay, cx, lithX, width, margin, plotHeight, top, bottom, occupiedLabelBands);
      drawAnnularFillLabels(layerOverlay, cx, lithX, width, margin, plotHeight, top, bottom, occupiedLabelBands);
      if (ps.showAnnotations) drawAnnotations(layerOverlay, cx, lithX, width, top, bottom, margin, plotHeight, occupiedLabelBands);
      drawSelectedDepthHandles(layerTopDevices, cx, top, bottom, margin, plotHeight, lithX, formationTrackWidth);
      svg.appendChild(layerCursor);

      let hoveringElement = false;
      let zoomDragActive = false;
      let zoomDragStartY = null;
      let zoomDragCurrentY = null;
      let hideDragActive = false;
      let hideDragStartY = null;
      let hideDragCurrentY = null;
      const guideLine = el('line', {
        x1: margin.left,
        x2: width - 40,
        y1: margin.top,
        y2: margin.top,
        stroke: 'currentColor',
        'stroke-width': 1,
        'stroke-dasharray': '4 4',
        opacity: .52
      });
      const guideBadge = el('rect', {
        x: margin.left - 90,
        y: margin.top - 9,
        width: 64,
        height: 16,
        rx: 3,
        fill: 'var(--surface)',
        stroke: 'currentColor',
        'stroke-width': .6,
        opacity: .9
      });
      const guideText = el('text', {
        x: margin.left - 58,
        y: margin.top + 3,
        fill: 'currentColor',
        'font-size': 10,
        'font-weight': 700,
        'text-anchor': 'middle'
      }, '');
      layerCursor.appendChild(guideLine);
      layerCursor.appendChild(guideBadge);
      layerCursor.appendChild(guideText);
      const zoomBand = el('rect', {
        x: margin.left,
        y: margin.top,
        width: Math.max(1, (width - 40) - margin.left),
        height: 1,
        fill: 'color-mix(in srgb, var(--lavender) 35%, transparent)',
        stroke: 'currentColor',
        'stroke-width': 1,
        'stroke-dasharray': '5 4',
        opacity: .75
      });
      layerCursor.appendChild(zoomBand);
      zoomBand.style.display = 'none';
      layerCursor.style.display = 'none';

      function formatDepthValue(md) {
        const rounded = Math.round(md * 10) / 10;
        const asText = Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
        return `${asText} ${schematic.plotSettings.depthUnit} TVD`;
      }
      function updateCursorGuide(clientY) {
        if (zoomDragActive || hideDragActive) return;
        if (hoveringElement) {
          layerCursor.style.display = 'none';
          return;
        }
        const rect = svg.getBoundingClientRect();
        const y = Math.max(margin.top, Math.min(margin.top + plotHeight, clientY - rect.top));
        const md = yToMd(y);
        guideLine.setAttribute('y1', String(y));
        guideLine.setAttribute('y2', String(y));
        guideBadge.setAttribute('y', String(y - 9));
        guideText.setAttribute('y', String(y + 3));
        guideText.textContent = formatDepthValue(md);
        layerCursor.style.display = '';
      }
      function yToMd(y) {
        return mdFromY(y, top, bottom, margin, plotHeight);
      }
      function clampedPlotY(clientY) {
        const rect = svg.getBoundingClientRect();
        return Math.max(margin.top, Math.min(margin.top + plotHeight, clientY - rect.top));
      }
      function updateZoomBand() {
        const startY = hideDragActive ? hideDragStartY : zoomDragStartY;
        const currentY = hideDragActive ? hideDragCurrentY : zoomDragCurrentY;
        if (startY === null || currentY === null) return;
        const y1 = Math.min(startY, currentY);
        const y2 = Math.max(startY, currentY);
        zoomBand.setAttribute('y', String(y1));
        zoomBand.setAttribute('height', String(Math.max(1, y2 - y1)));
      }
      function clearZoomBand() {
        zoomDragActive = false;
        zoomDragStartY = null;
        zoomDragCurrentY = null;
        hideDragActive = false;
        hideDragStartY = null;
        hideDragCurrentY = null;
        zoomBand.style.display = 'none';
      }
      function applyZoomBand() {
        if (zoomDragStartY === null || zoomDragCurrentY === null) return clearZoomBand();
        const spanPx = Math.abs(zoomDragCurrentY - zoomDragStartY);
        if (spanPx < 6) return clearZoomBand();
        const md1 = yToMd(zoomDragStartY);
        const md2 = yToMd(zoomDragCurrentY);
        const nextTop = Math.min(md1, md2);
        const nextBottom = Math.max(md1, md2);
        if (nextBottom - nextTop < MIN_VIEW_SPAN) return clearZoomBand();
        schematic.plotSettings.topDepth = nextTop;
        schematic.plotSettings.bottomDepth = nextBottom;
        const ticks = resolveDepthTicks(nextTop, nextBottom, true);
        schematic.plotSettings.minorTick = ticks.minor;
        schematic.plotSettings.majorTick = ticks.major;
        clearZoomBand();
        renderAll();
      }

      function applyHideBand() {
        if (hideDragStartY === null || hideDragCurrentY === null) return clearZoomBand();
        const spanPx = Math.abs(hideDragCurrentY - hideDragStartY);
        if (spanPx < 6) return clearZoomBand();
        const md1 = yToMd(hideDragStartY);
        const md2 = yToMd(hideDragCurrentY);
        const hideTop = Math.min(md1, md2);
        const hideBottom = Math.max(md1, md2);
        if (hideBottom - hideTop < 0.5) return clearZoomBand();
        if (!Array.isArray(schematic.hiddenSections)) schematic.hiddenSections = [];
        const hiddenItem = {
          id: makeId('hidden'),
          label: `Hidden section ${schematic.hiddenSections.length + 1}`,
          topMD: hideTop,
          bottomMD: hideBottom,
          visible: true
        };
        schematic.hiddenSections.push(hiddenItem);
        sortDepthCollections();
        selected = { collection: 'hiddenSections', id: hiddenItem.id };
        clearZoomBand();
        renderAll();
      }

      svg.onmousemove = (event) => {
        if (zoomDragActive || hideDragActive) {
          zoomDragCurrentY = clampedPlotY(event.clientY);
          hideDragCurrentY = zoomDragCurrentY;
          updateZoomBand();
          return;
        }
        updateCursorGuide(event.clientY);
      };
      svg.onmouseleave = () => {
        if (zoomDragActive || hideDragActive) clearZoomBand();
        layerCursor.style.display = 'none';
      };
      svg.onwheel = (event) => {
        if (event.ctrlKey || event.metaKey) {
          event.preventDefault();
          return;
        }
        event.preventDefault();
        wheelPanVelocity = 0;
        if (wheelPanAnimFrame !== null) {
          cancelAnimationFrame(wheelPanAnimFrame);
          wheelPanAnimFrame = null;
          wheelLastTs = 0;
        }
        const lineHeight = 16;
        const pageHeight = Math.max(1, window.innerHeight || 800);
        const factor = event.deltaMode === WheelEvent.DOM_DELTA_LINE
          ? lineHeight
          : (event.deltaMode === WheelEvent.DOM_DELTA_PAGE ? pageHeight : 1);
        window.scrollBy({
          top: event.deltaY * factor,
          left: event.deltaX * factor,
          behavior: 'auto'
        });
      };
      svg.oncontextmenu = (event) => {
        event.preventDefault();
      };
      svg.onmousedown = (event) => {
        const anchorHandle = event.target.closest('.callout-anchor-handle,[data-callout-anchor-id]');
        if (anchorHandle && event.button === 0) {
          event.preventDefault();
          event.stopPropagation();
          const calloutId = anchorHandle.getAttribute('data-callout-anchor-id');
          const calloutCollection = anchorHandle.getAttribute('data-callout-anchor-collection');
          if (calloutId && calloutCollection) beginCalloutAnchorDrag(event, calloutCollection, calloutId);
          return;
        }
        const calloutHandle = event.target.closest('.callout-drag-handle,[data-callout-drag-id]');
        if (calloutHandle && event.button === 0) {
          event.preventDefault();
          event.stopPropagation();
          const calloutId = calloutHandle.getAttribute('data-callout-drag-id');
          const calloutCollection = calloutHandle.getAttribute('data-callout-drag-collection');
          if (calloutId && calloutCollection) beginCalloutDrag(event, calloutCollection, calloutId);
          return;
        }
        const depthHandle = event.target.closest('.depth-handle');
        if (depthHandle && event.button === 0) {
          event.preventDefault();
          event.stopPropagation();
          if (depthHandle.dataset.mdDrag === 'true') {
            const id = depthHandle.dataset.id;
            if (id) {
              selectItem('components', id);
              beginComponentMdDrag(event, id);
            }
            return;
          }
          beginDepthDrag(event, depthHandle.dataset.edge);
          return;
        }
        const hit = event.target.closest('.element-hit');
        if (hit && event.button === 0) {
          const collection = hit.getAttribute('data-collection');
          const id = hit.getAttribute('data-id');
          if (collection === 'components' && id) {
            const component = findItem('components', id);
            if (component?.type === 'downhole_device_circle') {
              event.preventDefault();
              event.stopPropagation();
              selectItem('components', id);
              beginComponentMdDrag(event, id);
              return;
            }
          }
        }
        if (event.button !== 2) return;
        event.preventDefault();
        const onElement = Boolean(event.target.closest('.element-hit'));
        if (onElement) return;
        if (event.altKey) {
          hideDragActive = true;
          hideDragStartY = clampedPlotY(event.clientY);
          hideDragCurrentY = hideDragStartY;
        } else {
          zoomDragActive = true;
          zoomDragStartY = clampedPlotY(event.clientY);
          zoomDragCurrentY = zoomDragStartY;
        }
        layerCursor.style.display = '';
        zoomBand.style.display = '';
        guideLine.style.display = 'none';
        guideBadge.style.display = 'none';
        guideText.style.display = 'none';
        updateZoomBand();
      };
      svg.onmouseup = (event) => {
        if (event.button !== 2 || (!zoomDragActive && !hideDragActive)) return;
        event.preventDefault();
        guideLine.style.display = '';
        guideBadge.style.display = '';
        guideText.style.display = '';
        if (hideDragActive) applyHideBand();
        else applyZoomBand();
      };
      svg.onmouseover = (event) => {
        if (!event.target.closest('.element-hit')) return;
        hoveringElement = true;
        layerCursor.style.display = 'none';
      };
      svg.onmouseout = (event) => {
        if (!event.target.closest('.element-hit')) return;
        const next = event.relatedTarget;
        if (next && next.closest && next.closest('.element-hit')) return;
        hoveringElement = false;
      };
      svg.onclick = (event) => {
        if (suppressNextSvgClick) {
          suppressNextSvgClick = false;
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        const hit = event.target.closest('.element-hit');
        if (hit) {
          selectItem(hit.dataset.collection, hit.dataset.id);
          return;
        }
        deselectItem();
      };
      svg.ondblclick = (event) => {
        const annotationLabel = event.target.closest('.annotation-label');
        if (annotationLabel) {
          event.preventDefault();
          event.stopPropagation();
          const id = annotationLabel.getAttribute('data-id');
          if (id) openInlineAnnotationEditor(id, annotationLabel);
          return;
        }
        const editableLabel = event.target.closest('.editable-item-label');
        if (editableLabel) {
          event.preventDefault();
          event.stopPropagation();
          const collection = editableLabel.getAttribute('data-collection');
          const id = editableLabel.getAttribute('data-id');
          const field = editableLabel.getAttribute('data-field') || 'label';
          if (collection && id) openInlineItemEditor(collection, id, field, editableLabel);
          return;
        }
        const hit = event.target.closest('.element-hit');
        if (hit) {
          event.preventDefault();
          event.stopPropagation();
          selectItem(hit.dataset.collection, hit.dataset.id);
          openEditDialog(hit.dataset.collection, hit.dataset.id);
          return;
        }
        event.preventDefault();
        fitDepthRange();
      };
      updateDepthPanControl();
    }

    function drawSelectedDepthHandles(svg, cx, top, bottom, margin, plotHeight, lithX = null, formationTrackWidth = 50) {
      if (!selected) return;
      const item = findItem(selected.collection, selected.id);
      if (!item) return;
      if (item.topMD === undefined || item.bottomMD === undefined) return;
      const yTop = mdToY(item.topMD, top, bottom, margin, plotHeight);
      const yBottom = mdToY(item.bottomMD, top, bottom, margin, plotHeight);
      const yMid = (yTop + yBottom) / 2;
      const x = selected.collection === 'formations' && Number.isFinite(lithX)
        ? lithX + Math.max(12, Math.min(formationTrackWidth - 12, formationTrackWidth * 0.5))
        : cx + 10;
      const handleStyle = { fill:'#def359', stroke:'#210d2a', 'stroke-width':1.2, class:'depth-handle', 'data-collection':selected.collection, 'data-id':selected.id };
      appendGrabberHandle(svg, { ...handleStyle, cx:x, cy:yTop, 'data-edge':'top' }, 6, 12);
      appendGrabberHandle(svg, { ...handleStyle, cx:x, cy:yBottom, 'data-edge':'bottom' }, 6, 12);
      if (selected.collection === 'components' && item.type === 'downhole_device_rectangle') {
        const rectW = Math.max(4, Math.max(0.1, num(item.diameterIn, 2)) * renderWidthPerInch);
        const xMidHandle = (cx - rectW / 2);
        appendGrabberHandle(svg, { ...handleStyle, cx:xMidHandle, cy:yMid, 'data-edge':'middle' }, 6, 12);
      }
    }

    function beginAnnotationDrag(event, noteId) {
      const note = (schematic.annotations || []).find(a => a.id === noteId);
      if (!note) return;
      const svgNode = document.getElementById('schematicSvg');
      const ctx = lastRenderDepthContext;
      if (!svgNode || !ctx) return;
      annotationDragState = {
        id: noteId,
        startY: event.clientY,
        startOffset: num(note.labelOffsetY, 0),
        moved: false
      };
      const move = (e) => {
        if (!annotationDragState) return;
        const active = (schematic.annotations || []).find(a => a.id === annotationDragState.id);
        if (!active) return;
        const rect = svgNode.getBoundingClientRect();
        const y = Math.max(ctx.margin.top + 12, Math.min(ctx.margin.top + ctx.plotHeight - 10, e.clientY - rect.top));
        const dy = e.clientY - annotationDragState.startY;
        if (Math.abs(dy) > 2) annotationDragState.moved = true;
        active.manualLabelY = Math.round(y * 10) / 10;
        active.labelLocked = true;
        renderSchematic();
      };
      const up = () => {
        const moved = annotationDragState?.moved === true;
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        annotationDragState = null;
        if (moved) suppressNextSvgClick = true;
        if (selected && selected.collection === 'annotations') renderProperties();
        markUnsavedChanges();
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    }

    function findCalloutTarget(collection, id) {
      if (!id) return null;
      if (collection === 'annotations') return (schematic.annotations || []).find(a => a.id === id) || null;
      if (collection === 'strings') return (schematic.strings || []).find(a => a.id === id) || null;
      if (collection === 'completion') return (schematic.completion || []).find(a => a.id === id) || null;
      if (collection === 'components') return (schematic.components || []).find(a => a.id === id) || null;
      if (collection === 'cement') return (schematic.cement || []).find(a => a.id === id) || null;
      return null;
    }

    function beginCalloutDrag(event, collection, id) {
      const target = findCalloutTarget(collection, id);
      if (!target) return;
      const svgNode = document.getElementById('schematicSvg');
      const ctx = lastRenderDepthContext;
      if (!svgNode || !ctx) return;
      calloutDragState = {
        collection,
        id,
        startY: event.clientY,
        moved: false
      };
      const move = (e) => {
        if (!calloutDragState) return;
        const active = findCalloutTarget(calloutDragState.collection, calloutDragState.id);
        if (!active) return;
        const rect = svgNode.getBoundingClientRect();
        const y = Math.max(ctx.margin.top + 12, Math.min(ctx.margin.top + ctx.plotHeight - 10, e.clientY - rect.top));
        if (Math.abs(e.clientY - calloutDragState.startY) > 2) calloutDragState.moved = true;
        active.manualLabelY = Math.round(y * 10) / 10;
        active.labelLocked = true;
        renderSchematic();
      };
      const up = () => {
        const moved = calloutDragState?.moved === true;
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        calloutDragState = null;
        if (moved) suppressNextSvgClick = true;
        if (selected) renderProperties();
        markUnsavedChanges();
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    }

    function beginCalloutAnchorDrag(event, collection, id) {
      const target = findCalloutTarget(collection, id);
      if (!target) return;
      const svgNode = document.getElementById('schematicSvg');
      const ctx = lastRenderDepthContext;
      if (!svgNode || !ctx) return;
      const startClientY = event.clientY;
      calloutAnchorDragState = { collection, id, moved: false };
      const move = (e) => {
        if (!calloutAnchorDragState) return;
        const active = findCalloutTarget(calloutAnchorDragState.collection, calloutAnchorDragState.id);
        if (!active) return;
        const rect = svgNode.getBoundingClientRect();
        const y = Math.max(ctx.margin.top, Math.min(ctx.margin.top + ctx.plotHeight, e.clientY - rect.top));
        const md = Math.round(mdFromY(y, ctx.top, ctx.bottom, ctx.margin, ctx.plotHeight) * 10) / 10;
        if (Math.abs(e.clientY - startClientY) > 2) calloutAnchorDragState.moved = true;
        if (calloutAnchorDragState.collection === 'annotations') {
          active.anchorMD = md;
        } else {
          active.annotationMD = md;
        }
        renderSchematic();
      };
      const up = () => {
        const moved = calloutAnchorDragState?.moved === true;
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        calloutAnchorDragState = null;
        if (moved) suppressNextSvgClick = true;
        if (selected) renderProperties();
        markUnsavedChanges();
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    }

    function beginDepthDrag(event, edge) {
      if (!selected || !lastRenderDepthContext) return;
      const item = findItem(selected.collection, selected.id);
      if (!item) return;
      depthDragState = {
        collection:selected.collection,
        id:selected.id,
        edge,
        startTop: item.topMD !== undefined ? num(item.topMD) : null,
        startBottom: item.bottomMD !== undefined ? num(item.bottomMD) : null
      };
      updateDepthDrag(event.clientY, event.clientX);
      const move = (e) => updateDepthDrag(e.clientY, e.clientX);
      const up = () => {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        depthDragState = null;
        hideDepthDragBadge();
        renderCollectionPanels();
        renderProperties();
        renderValidation();
        markUnsavedChanges();
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    }

    function beginComponentMdDrag(event, id) {
      if (!lastRenderDepthContext) return;
      const item = findItem('components', id);
      if (!item) return;
      componentMdDragState = { id, moved: false, startY: event.clientY };
      const move = (e) => {
        if (!componentMdDragState || !lastRenderDepthContext) return;
        const active = findItem('components', componentMdDragState.id);
        if (!active) return;
        const ctx = lastRenderDepthContext;
        const rect = document.getElementById('schematicSvg').getBoundingClientRect();
        const y = Math.max(ctx.margin.top, Math.min(ctx.margin.top + ctx.plotHeight, e.clientY - rect.top));
        const md = Math.round(mdFromY(y, ctx.top, ctx.bottom, ctx.margin, ctx.plotHeight) * 10) / 10;
        if (Math.abs(e.clientY - componentMdDragState.startY) > 2) componentMdDragState.moved = true;
        active.md = md;
        if (active.type === 'annular_packer') {
          // Keep packer callout anchor attached to the component while dragging.
          active.annotationMD = md;
        }
        showDepthDragBadge(e.clientX, e.clientY, `${formatDepthOneDecimal(active.md)} ${schematic.plotSettings.depthUnit} TVD`);
        renderSchematic();
      };
      const up = () => {
        const moved = componentMdDragState?.moved === true;
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
        componentMdDragState = null;
        hideDepthDragBadge();
        if (moved) suppressNextSvgClick = true;
        renderCollectionPanels();
        renderProperties();
        renderValidation();
        markUnsavedChanges();
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    }

    function updateDepthDrag(clientY, clientX) {
      if (!depthDragState || !lastRenderDepthContext) return;
      const item = findItem(depthDragState.collection, depthDragState.id);
      if (!item) return;
      const ctx = lastRenderDepthContext;
      const rect = document.getElementById('schematicSvg').getBoundingClientRect();
      const y = Math.max(ctx.margin.top, Math.min(ctx.margin.top + ctx.plotHeight, clientY - rect.top));
      const md = mdFromY(y, ctx.top, ctx.bottom, ctx.margin, ctx.plotHeight);
      const minGap = 0.1;
      if (depthDragState.collection === 'formations') {
        applyFormationBoundaryDrag(item, depthDragState.edge, md, minGap);
      } else {
        if (depthDragState.edge === 'middle') {
          const startTop = num(depthDragState.startTop, num(item.topMD));
          const startBottom = num(depthDragState.startBottom, num(item.bottomMD));
          const span = Math.max(minGap, startBottom - startTop);
          const startMid = (startTop + startBottom) / 2;
          const delta = md - startMid;
          item.topMD = startTop + delta;
          item.bottomMD = item.topMD + span;

    function applyFormationBoundaryDrag(target, edge, md, minGap = 0.1) {

      const idx = sorted.findIndex(f => f.id === target.id);
      if (idx < 0) return;
      const current = sorted[idx];

        const nextTop = Math.min(md, num(current.bottomMD) - minGap);
        current.topMD = nextTop;
        // Eat into the formation above by moving its bottom boundary.
        const above = sorted[idx - 1];
        if (above && num(above.bottomMD) > nextTop) {
          above.bottomMD = nextTop;
          if (num(above.topMD) > num(above.bottomMD) - minGap) {
            above.topMD = above.bottomMD - minGap;
          }
        }
      } else {
        const nextBottom = Math.max(md, num(current.topMD) + minGap);
        current.bottomMD = nextBottom;
        // Eat into the formation below by moving its top boundary.
        const below = sorted[idx + 1];
        if (below && num(below.topMD) < nextBottom) {

          if (num(below.bottomMD) < num(below.topMD) + minGap) {

    function showDepthDragBadge(clientX, clientY, text) {

    function hideDepthDragBadge() {

    const HIDDEN_BREAK_GAP_PX = 18;
    function viz(item) { return item.visible !== false; }
    function effectiveHiddenSections(top, bottom) {
      const sections = normalizeHiddenSections(schematic?.hiddenSections)

        .map(section => ({

          bottomMD: Math.min(bottom, section.bottomMD)

        .filter(section => section.bottomMD > section.topMD)

      sections.forEach(section => {

        } else {
          last.bottomMD = Math.max(last.bottomMD, section.bottomMD);

      });

    }
    function buildDepthCompression(top, bottom, plotHeight) {
      const cached = depthCompressionCache;
      if (
        cached
        && cached.top === top
        && cached.bottom === bottom
        && cached.plotHeight === plotHeight
      ) {
        return cached.value;
      }
      const sections = effectiveHiddenSections(top, bottom);
      const hiddenSpan = sections.reduce((sum, section) => sum + (section.bottomMD - section.topMD), 0);
      const visibleSpan = Math.max(0.001, (bottom - top) - hiddenSpan);
      const totalGap = sections.length * HIDDEN_BREAK_GAP_PX;
      const drawableHeight = Math.max(1, plotHeight - totalGap);
      const pxPerMd = drawableHeight / visibleSpan;
      const value = { sections, pxPerMd };

    }
    function mdToY(md, top, bottom, margin, plotHeight) {
      const v = num(md, top);
      const c = buildDepthCompression(top, bottom, plotHeight);
      let y = margin.top;
      let cursorMd = top;
      for (const section of c.sections) {
        if (v <= section.topMD) return y + ((v - cursorMd) * c.pxPerMd);
        y += (section.topMD - cursorMd) * c.pxPerMd;
        if (v < section.bottomMD) return y + (HIDDEN_BREAK_GAP_PX / 2);
        y += HIDDEN_BREAK_GAP_PX;
        cursorMd = section.bottomMD;
      }

    }
    function mdFromY(y, top, bottom, margin, plotHeight) {

      const c = buildDepthCompression(top, bottom, plotHeight);
      let cursorY = margin.top;
      let cursorMd = top;
      for (const section of c.sections) {
        const visibleH = (section.topMD - cursorMd) * c.pxPerMd;
        if (clamped <= cursorY + visibleH) return cursorMd + ((clamped - cursorY) / Math.max(0.0001, c.pxPerMd));
        cursorY += visibleH;
        const gapEnd = cursorY + HIDDEN_BREAK_GAP_PX;
        if (clamped <= gapEnd) return (clamped - cursorY) <= (HIDDEN_BREAK_GAP_PX / 2) ? section.topMD : section.bottomMD;

    function isMdHidden(md, top, bottom) {

    function subtractHiddenFromInterval(startMd, endMd, hiddenSections) {
      let visible = [{ start: startMd, end: endMd }];

          if (section.bottomMD <= seg.start || section.topMD >= seg.end) {
            next.push(seg);
            return;
          }
          if (section.topMD > seg.start) next.push({ start: seg.start, end: section.topMD });
          if (section.bottomMD < seg.end) next.push({ start: section.bottomMD, end: seg.end });

        visible = next.filter(seg => seg.end > seg.start);

      return visible;
    }

    function drawWireToSurface(g, cx, startMdRaw, endMdRaw, top, bottom, margin, plotHeight, options = {}) {
      const startMd = num(startMdRaw, NaN);
      const endMd = num(endMdRaw, NaN);
      if (!Number.isFinite(startMd) || !Number.isFinite(endMd)) return;
      const a = Math.max(top, Math.min(startMd, endMd));
      const b = Math.min(bottom, Math.max(startMd, endMd));
      if (!(b > a)) return;
      const hidden = effectiveHiddenSections(top, bottom);
      const visibleSegments = subtractHiddenFromInterval(a, b, hidden);
      if (!visibleSegments.length) return;

      const amp = Math.max(0.8, num(options.amp, 2));
      const wavelength = Math.max(16, num(options.wavelength, 46));
      const stroke = options.stroke || '#210d2a';
      const strokeWidth = Math.max(0.4, num(options.strokeWidth, 1));
      const dashArray = options.dashArray || null;
      const overallTopY = mdToY(a, top, bottom, margin, plotHeight);

      visibleSegments.forEach(seg => {
        const yTop = mdToY(seg.start, top, bottom, margin, plotHeight);
        const yBottom = mdToY(seg.end, top, bottom, margin, plotHeight);
        const span = Math.abs(yBottom - yTop);
        if (span < 1) return;
        const dir = yBottom >= yTop ? 1 : -1;
        const targetStepPx = span > 6000 ? 12 : 8;
        const steps = Math.max(8, Math.min(420, Math.ceil(span / targetStepPx)));
        const points = [];
        for (let i = 0; i <= steps; i += 1) {
          const t = i / steps;
          const py = yTop + (span * t * dir);
          const px = cx + Math.sin((py - overallTopY) * (Math.PI * 2 / wavelength)) * amp;
          points.push(`${i === 0 ? 'M' : 'L'} ${px.toFixed(2)} ${py.toFixed(2)}`);
        }
        g.appendChild(el('path', {
          d: points.join(' '),
          fill: 'none',
          stroke,
          'stroke-width': strokeWidth,
          'stroke-dasharray': dashArray,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round'
        }));
      });
    }
    function resolveCalloutAnchorMd(item, preferredMd, top, bottom) {
      const hidden = effectiveHiddenSections(top, bottom);
      const hasInterval = item?.topMD !== undefined && item?.topMD !== null && item?.bottomMD !== undefined && item?.bottomMD !== null;
      if (hasInterval) {
        const rawTop = num(item.topMD);
        const rawBottom = num(item.bottomMD);
        const itemTop = Math.min(rawTop, rawBottom);
        const itemBottom = Math.max(rawTop, rawBottom);
        const start = Math.max(top, itemTop);
        const end = Math.min(bottom, itemBottom);
        if (!(end > start)) return null;
        const visibleSegments = subtractHiddenFromInterval(start, end, hidden);
        if (!visibleSegments.length) return null;
        const pref = Math.max(start, Math.min(end, num(preferredMd, start)));
        for (const seg of visibleSegments) {
          if (pref >= seg.start && pref <= seg.end) return pref;
        }
        const candidates = visibleSegments.flatMap(seg => [seg.start, seg.end]);
        let best = candidates[0];
        let bestDist = Math.abs(best - pref);
        for (let i = 1; i < candidates.length; i += 1) {
          const d = Math.abs(candidates[i] - pref);
          if (d < bestDist) {

            best = candidates[i];
          }

      const md = num(preferredMd, num(item?.md));

      if (isMdHidden(md, top, bottom)) return null;

    function diameterToWidth(inches) {
      // Telescopic nesting should stay visible; use indicative, compressed scaling.
      const d = Math.max(0.5, num(inches, 1));
      return Math.max(42, Math.min(440, d * renderWidthPerInch));
    }

    function updateRenderRadialScale(cx, rightBound) {
      const candidates = [];
      (schematic.holeSections || []).forEach(item => { if (item.visible !== false) candidates.push(num(item.diameterIn, 0)); });
      (schematic.strings || []).forEach(item => { if (item.visible !== false) candidates.push(num(item.odIn, 0)); });
      (schematic.completion || []).forEach(item => { if (item.visible !== false) candidates.push(num(item.odIn, 0)); });
      const maxNominalIn = Math.max(8.5, ...candidates.filter(Number.isFinite));
      const usableHalfWidth = Math.max(220, rightBound - cx);
      const desiredOuterWidth = usableHalfWidth * 1.55;

    }

    function getMaxRenderedHalfWidth() {
      const candidates = [];
      (schematic.holeSections || []).forEach(item => { if (item.visible !== false) candidates.push(num(item.diameterIn, 0)); });
      (schematic.strings || []).forEach(item => { if (item.visible !== false) candidates.push(num(item.odIn, 0)); });
      (schematic.completion || []).forEach(item => { if (item.visible !== false) candidates.push(num(item.odIn, 0)); });

    function applySectionMillMasks(svg, layers, cx, width, height, top, bottom, margin, plotHeight) {

    function drawDepthScaleBreakMarkers(svg, axisX, margin, top, bottom, plotHeight) {

    function resolveDepthTicks(top, bottom, forceAuto = false, plotHeightPx = null) {
      const hiddenSpan = effectiveHiddenSections(top, bottom).reduce((sum, section) => sum + (section.bottomMD - section.topMD), 0);
      const span = Math.max(1, (bottom - top) - hiddenSpan);
      const targetMinorCount = plotHeightPx ? Math.max(8, Math.min(60, Math.round(plotHeightPx / 42))) : 18;
      // Keep major labels denser at high vertical zoom so scale annotations do not look sparse.
      const targetMajorCount = plotHeightPx ? Math.max(5, Math.min(36, Math.round(plotHeightPx / 88))) : 7;
      const recommendedMinor = niceTickStep(span / targetMinorCount);
      const recommendedMajor = niceTickStep(span / targetMajorCount);

      let minor = forceAuto ? recommendedMinor : (userMinor > 0 ? userMinor : recommendedMinor);
      let major = forceAuto ? recommendedMajor : (userMajor > 0 ? userMajor : recommendedMajor);
      if (!Number.isFinite(minor) || minor <= 0) minor = recommendedMinor;
      if (!Number.isFinite(major) || major <= 0) major = recommendedMajor;

      if (minor >= major) {

      const minMinorStep = span / maxMinorTicks;
      const minMajorStep = span / maxMajorTicks;
      if (minor < minMinorStep) minor = niceTickStep(minMinorStep);
      if (major < minMajorStep) major = niceTickStep(minMajorStep);

    function niceTickStep(rawStep) {

    function formatDepthTick(value) {

    function drawHoleSection(svg, item, cx, top, bottom, margin, plotHeight) {
      const y1 = mdToY(item.topMD, top, bottom, margin, plotHeight);
      const y2 = mdToY(item.bottomMD, top, bottom, margin, plotHeight);

      g.appendChild(el('rect', { x:cx - w/2, y:y1, width:w, height:Math.max(1, y2-y1), fill:itemFillColor('holeSections', item, '#e3dfeb'), opacity:.38, stroke:'#9b8eaa', 'stroke-dasharray':'4 4', ...selectionAttrs('holeSections', item.id) }));

    function drawCement(svg, item, cx, top, bottom, margin, plotHeight) {
      const bounds = annularFillBounds(item);
      const outerW = bounds.outerW;
      const innerW = bounds.innerW;
      const annulus = Math.max(4, (outerW - innerW) / 2);
      const y1 = mdToY(item.topMD, top, bottom, margin, plotHeight);
      const y2 = mdToY(item.bottomMD, top, bottom, margin, plotHeight);
      const g = makeGroup('cement', item);
      const outerHalf = outerW / 2;
      const innerHalf = innerW / 2;
      const h = Math.max(1, y2 - y1);
      const fill = itemFillColor('cement', item, annularMaterialColor(item.material));

      g.appendChild(el('rect', {
        x: cx - outerHalf,
        y: y1,
        width: annulus,

        x: cx + innerHalf,

        width: annulus,
        height: h,
        fill,

        stroke: isSelected('cement', item.id) ? '#def359' : fill,

    }

    function drawAnnularFillLabels(svg, cx, lithX, width, margin, plotHeight, top, bottom, occupied = []) {

    function annularFillBounds(item) {
      const md = num(item.bottomMD, num(item.topMD));

      const insideProfile = boundaryProfileAtDepth(item.insideStringId, md);
      const outsideProfile = boundaryProfileAtDepth(item.outsideStringId, md);
      if (insideProfile && outsideProfile) {
        const profiles = [insideProfile, outsideProfile].sort((a, b) => a.referenceW - b.referenceW);
        const innerBoundary = profiles[0];
        const outerBoundary = profiles[1];
        let innerW = innerBoundary.outerFaceW;
        let outerW = outerBoundary.innerFaceW;
        if (innerW > outerW) [innerW, outerW] = [outerW, innerW];
        if (outerW - innerW < 6) outerW = innerW + 12;
        return { innerW, outerW };
      }

      const innerFromField = item.insideStringId ? boundaryWidthAtDepth(item.insideStringId, md, 0, 'inside') : 0;
      const outerFromField = item.outsideStringId ? boundaryWidthAtDepth(item.outsideStringId, md, 0, 'outside') : 0;
      let innerW = innerFromField;
      let outerW = outerFromField;

      // Legacy fills sometimes named only a casing as the outside boundary.
      // Interpret that as the annulus between the casing OD and containing open hole.
      if (!innerW && item.outsideStringId && boundaryIsTubular(item.outsideStringId)) {
        innerW = boundaryWidthAtDepth(item.outsideStringId, md, 0, 'inside');
        outerW = findHoleWidthAtDepth(md, innerW);
      }
      if (!outerW && innerW) outerW = findHoleWidthAtDepth(md, innerW);
      if (!innerW && !outerW) {
        innerW = 0;
        outerW = diameterToWidth(12);
      }
      if (innerW > outerW) [innerW, outerW] = [outerW, innerW];
      if (outerW - innerW < 6) outerW = innerW + 12;
      return { innerW, outerW };
    }

    function boundaryProfileAtDepth(boundaryId, md) {
      if (!boundaryId) return null;
      if (String(boundaryId).startsWith('hole:')) {
        const holeId = String(boundaryId).slice(5);
        const hole = (schematic.holeSections || []).find(h => h.id === holeId);
        if (!hole) return null;
        const w = diameterToWidth(hole.diameterIn);
        return { referenceW: w, innerFaceW: w, outerFaceW: w };
      }
      const tubular = [...(schematic.strings || []), ...(schematic.completion || [])].find(s => s.id === boundaryId);
      if (tubular) {
        const odW = diameterToWidth(tubular.odIn);
        const wallThickness = resolveTubularWallThickness(tubular, odW);
        const idW = Math.max(1, odW - (wallThickness * 2));
        return {
          referenceW: (odW + idW) / 2,
          innerFaceW: idW,
          outerFaceW: odW
        };
      }

      const legacyHole = (schematic.holeSections || []).find(h => h.id === boundaryId);
      if (legacyHole) {
        const w = diameterToWidth(legacyHole.diameterIn);
        return { referenceW: w, innerFaceW: w, outerFaceW: w };
      }
      return null;
    }

    function boundaryIsTubular(boundaryId) {
      if (!boundaryId || String(boundaryId).startsWith('hole:')) return false;
      return [...(schematic.strings || []), ...(schematic.completion || [])].some(s => s.id === boundaryId);
    }

    function annularMaterialColor(material) {
      const m = String(material || 'cement').toLowerCase();
      if (m === 'epoxy') return '#def359';
      if (m === 'bismuth') return '#def359';
      return '#646464';
    }

    function boundaryWidthAtDepth(boundaryId, md, fallbackWidth, role = 'inside') {
      if (!boundaryId) return fallbackWidth;
      if (String(boundaryId).startsWith('hole:')) {
        const holeId = String(boundaryId).slice(5);
        const hole = (schematic.holeSections || []).find(h => h.id === holeId);
        if (!hole) return fallbackWidth;
        return diameterToWidth(hole.diameterIn);
      }
      const tubular = [...(schematic.strings || []), ...(schematic.completion || [])].find(s => s.id === boundaryId);
      if (tubular) {
        const odWidth = diameterToWidth(tubular.odIn);
        if (role === 'outside') {
          const wallThickness = resolveTubularWallThickness(tubular, odWidth);
          return Math.max(1, odWidth - (wallThickness * 2));
        }
        return odWidth;
      }

      // Compatibility fallback for legacy cement objects that used plain IDs.
      const legacyHole = (schematic.holeSections || []).find(h => h.id === boundaryId);
      if (legacyHole) return diameterToWidth(legacyHole.diameterIn);
      return fallbackWidth;
    }

    function drawCasingString(svg, item, cx, top, bottom, margin, plotHeight) {
      drawStringPair(svg, 'strings', item, cx, top, bottom, margin, plotHeight, itemFillColor('strings', item, '#210d2a'), 2.4, { shoe: true });
    }

    function drawLiner(svg, item, cx, top, bottom, margin, plotHeight) {
      drawStringPair(svg, 'strings', item, cx, top, bottom, margin, plotHeight, itemFillColor('strings', item, '#302711'), 2.4, { liner: true, shoe: true });
    }

    function drawTubing(svg, item, cx, top, bottom, margin, plotHeight) {
      drawStringPair(svg, 'completion', item, cx, top, bottom, margin, plotHeight, itemFillColor('completion', item, '#574064'), 2);
    }

    function drawStringPair(svg, collection, item, cx, top, bottom, margin, plotHeight, color, strokeWidth, options = {}) {
      const y1 = mdToY(item.topMD, top, bottom, margin, plotHeight);
      const y2 = mdToY(item.bottomMD, top, bottom, margin, plotHeight);
      const w = diameterToWidth(item.odIn);
      const g = makeGroup(collection, item);
      const stroke = itemFillColor(collection, item, color);
      const attrs = isSelected(collection, item.id) ? { stroke:'#def359', 'stroke-width':5 } : { stroke, 'stroke-width':strokeWidth };
      const shoeDepth = options.shoe ? num(item.shoeMD, num(item.bottomMD)) : null;
      const shoeY = options.shoe ? mdToY(shoeDepth, top, bottom, margin, plotHeight) : y2;
      const bodyBottomY = options.shoe ? Math.min(y2, shoeY) : y2;
      const wallThickness = resolveTubularWallThickness(item, w);
      drawPipeWallBands(g, cx, w, wallThickness, y1, bodyBottomY, attrs.stroke, isSelected(collection, item.id));
      if (options.shoe) {
        drawCasingShoe(g, cx, w, shoeDepth, shoeY, isSelected(collection, item.id));
      }
      if (options.liner) g.appendChild(el('line', { x1:cx - w/2 - 9, y1, x2:cx + w/2 + 9, y2:y1, stroke, 'stroke-width':1.2, 'stroke-dasharray':'5 3' }));
      svg.appendChild(g);
    }

    function drawPipeWallBands(group, cx, width, wallThickness, yTop, yBottom, fill, selectedPipe) {
      const half = width / 2;
      const h = Math.max(1, yBottom - yTop);
      const stroke = selectedPipe ? '#210d2a' : 'none';
      const strokeWidth = selectedPipe ? 0.8 : 0;
      [
        cx - half,
        cx + half - wallThickness
      ].forEach(x => {
        group.appendChild(el('rect', {
          x,
          y: yTop,
          width: wallThickness,
          height: h,
          fill,
          stroke,
          'stroke-width': strokeWidth
        }));
      });
    }

    function drawCasingShoe(group, cx, pipeWidth, shoeDepth, shoeY, selectedShoe) {
      const pipeHalf = pipeWidth / 2;
      const holeWidth = findHoleWidthAtDepth(shoeDepth, pipeWidth);
      const holeHalf = holeWidth / 2;
      // Keep shoe symbol size visually consistent between strings.
      const shoeHeight = 12;
      const fill = selectedShoe ? '#def359' : '#210d2a';
      const stroke = selectedShoe ? '#210d2a' : 'none';
      const strokeWidth = selectedShoe ? 1.5 : 0;
      const yTop = shoeY - shoeHeight;
      const yBottom = shoeY;
      const wedges = [
        {
          points: `${cx - pipeHalf},${yBottom} ${cx - pipeHalf},${yTop} ${cx - holeHalf},${yBottom}`
        },
        {
          points: `${cx + pipeHalf},${yBottom} ${cx + pipeHalf},${yTop} ${cx + holeHalf},${yBottom}`
        }
      ];
      wedges.forEach(wedge => {
        group.appendChild(el('polygon', {
          points: wedge.points,
          fill,
          stroke,
          'stroke-width': strokeWidth,
          'stroke-linejoin': 'miter'
        }));
      });
    }

    function findHoleWidthAtDepth(md, pipeWidth) {
      const candidates = schematic.holeSections
        .filter(hole => hole.visible !== false)
        .filter(hole => num(hole.topMD) <= num(md) && num(hole.bottomMD) >= num(md))
        .filter(hole => hole.diameterIn !== undefined && hole.diameterIn !== null)
        .map(hole => diameterToWidth(hole.diameterIn))
        .filter(width => Number.isFinite(width) && width > pipeWidth)
        .sort((a, b) => a - b);
      if (!candidates.length) return pipeWidth + 26;
      return candidates[0];
    }

    function drawComponent(svg, item, cx, top, bottom, margin, plotHeight, occupiedLabelBands = []) {

      const g = makeGroup('components', item);

        g.appendChild(el('line', { x1:cx - plugW/2, y1:y1, x2:cx + plugW/2, y2:y1 + plugH, stroke, 'stroke-width':1.4 }));
        g.appendChild(el('line', { x1:cx + plugW/2, y1:y1, x2:cx - plugW/2, y2:y1 + plugH, stroke, 'stroke-width':1.4 }));
        {

        g.appendChild(el('line', { x1:cx - w/2, y1:y, x2:cx + w/2, y2:y, stroke:fill, 'stroke-width':2 }));
      } else if (item.type === 'downhole_device_circle') {
        const diameterIn = Math.max(0.1, num(item.diameterIn, 2));
        const diameterPx = Math.max(4, diameterIn * renderWidthPerInch);
        const r = diameterPx / 2;
        const selectedCircle = isSelected('components', item.id);
        const stroke = selectedCircle ? '#def359' : colorInputValue(item.lineColor, '#210d2a');
        const strokeWidth = Math.max(0.4, num(item.lineWidth, 1.2));
        const dashArray = String(item.lineType || 'solid').toLowerCase() === 'dashed' ? '5 4' : null;
        const circleFill = itemFillColor('components', item, '#ffffff');
        if (item.wireToSurface === true) {
          const wireStroke = selectedCircle ? '#def359' : colorInputValue(item.wireLineColor, '#210d2a');
          const wireWidth = Math.max(0.4, num(item.wireLineWidth, 1));
          const wireDash = String(item.wireLineType || 'solid').toLowerCase() === 'dashed' ? '5 4' : null;
          const wireBottomMd = mdFromY(y - r, top, bottom, margin, plotHeight);
          drawWireToSurface(g, cx, Math.max(0, top), wireBottomMd, top, bottom, margin, plotHeight, {
            amp: Math.max(1.2, Math.min(3.2, r * 0.16)),
            wavelength: 46,
            stroke: wireStroke,
            strokeWidth: selectedCircle ? Math.max(wireWidth + 0.8, 1.8) : wireWidth,
            dashArray: wireDash
          });
        }
        g.appendChild(el('circle', {
          cx,
          cy:y,
          r,
          fill:circleFill,
          stroke,
          'stroke-width': selectedCircle ? Math.max(strokeWidth + 0.8, 2) : strokeWidth,
          'stroke-dasharray': dashArray
        }));
        const insideText = String(item.text ?? '').trim();
        if (insideText) {
          const textSize = Math.max(8, Math.min(12, r * 0.9));
          g.appendChild(el('text', {
            x:cx,
            y:y + (textSize * 0.07),
            fill:colorInputValue(item.textColor, '#210d2a'),
            'font-size':textSize,
            'font-weight':600,
            'text-anchor':'middle',
            'dominant-baseline':'middle'
          }, insideText));
        }
      } else if (item.type === 'downhole_device_rectangle') {
        const rectW = Math.max(4, Math.max(0.1, num(item.diameterIn, 2)) * renderWidthPerInch);
        const y1 = Math.min(yTop, yTop + h);
        const y2 = Math.max(yTop, yTop + h);
        const rectH = Math.max(8, y2 - y1);
        const selectedRect = isSelected('components', item.id);
        const stroke = selectedRect ? '#def359' : colorInputValue(item.lineColor, '#210d2a');
        const strokeWidth = Math.max(0.4, num(item.lineWidth, 1.2));
        const dashArray = String(item.lineType || 'solid').toLowerCase() === 'dashed' ? '5 4' : null;
        const rectFill = itemFillColor('components', item, '#ffffff');
        if (item.wireToSurface === true) {
          const wireStroke = selectedRect ? '#def359' : colorInputValue(item.wireLineColor, '#210d2a');
          const wireWidth = Math.max(0.4, num(item.wireLineWidth, 1));
          const wireDash = String(item.wireLineType || 'solid').toLowerCase() === 'dashed' ? '5 4' : null;
          const wireBottomMd = mdFromY(y1, top, bottom, margin, plotHeight);
          drawWireToSurface(g, cx, Math.max(0, top), wireBottomMd, top, bottom, margin, plotHeight, {
            amp: Math.max(1.2, Math.min(3.2, (rectW / 2) * 0.16)),
            wavelength: 46,
            stroke: wireStroke,
            strokeWidth: selectedRect ? Math.max(wireWidth + 0.8, 1.8) : wireWidth,
            dashArray: wireDash
          });
        }
        g.appendChild(el('rect', {
          x:cx - rectW / 2,
          y:y1,
          width:rectW,
          height:rectH,
          fill:rectFill,
          stroke,
          'stroke-width': selectedRect ? Math.max(strokeWidth + 0.8, 2) : strokeWidth,
          'stroke-dasharray': dashArray
        }));
        const insideText = String(item.text ?? '').trim();
        if (insideText) {
          const textSize = Math.max(8, Math.min(12, Math.min(rectW * 0.9, rectH * 0.45)));
          const textAngle = num(item.textRotationDeg, 0);
          g.appendChild(el('text', {
            x:cx,
            y:y1 + rectH / 2 + (textSize * 0.05),
            fill:colorInputValue(item.textColor, '#210d2a'),
            'font-size':textSize,
            'font-weight':600,
            'text-anchor':'middle',
            'dominant-baseline':'middle',
            transform: textAngle ? `rotate(${textAngle} ${cx} ${y1 + rectH / 2})` : null
          }, insideText));
        }
      } else {
        g.appendChild(el('rect', { x:cx - w/2, y:yTop, width:w, height:h, rx:2, fill, stroke:'#210d2a', 'stroke-width':1 }));
      }
      svg.appendChild(g);
    }

    function drawSectionMill(svg, item, cx, top, bottom, margin, plotHeight, occupiedLabelBands = []) {
      const yTop = mdToY(item.topMD, top, bottom, margin, plotHeight);
      const yBottom = mdToY(item.bottomMD, top, bottom, margin, plotHeight);
      const plotTop = margin.top;
      const plotBottom = margin.top + plotHeight;
      const y1Raw = Math.min(yTop, yBottom);
      const y2Raw = Math.max(yTop, yBottom);
      const y1 = Math.max(plotTop, Math.min(plotBottom, y1Raw));
      const y2 = Math.max(plotTop, Math.min(plotBottom, y2Raw));
      if (y2 <= plotTop || y1 >= plotBottom || y2 <= y1) return;
      const w = sectionMillWidth(item);
      const selectedMill = isSelected('components', item.id);
      const stroke = selectedMill ? '#def359' : itemFillColor('components', item, '#b0294a');
      const g = makeGroup('components', item);
      g.appendChild(el('rect', {
        x:cx - w / 2,
        y:y1,
        width:w,
        height:Math.max(1, y2 - y1),
        fill:'none',
        stroke,
        'stroke-width':selectedMill ? 3 : 1.6,
        'stroke-dasharray':'6 4'
      }));
      {
        const preferredMd = item.annotationMD === null || item.annotationMD === undefined || item.annotationMD === ''
          ? (item.labelPosition === 'bottom' ? num(item.bottomMD) : (item.labelPosition === 'middle' ? ((num(item.topMD) + num(item.bottomMD)) / 2) : num(item.topMD)))
          : num(item.annotationMD);
        const anchorMd = resolveCalloutAnchorMd(item, preferredMd, top, bottom);
        if (Number.isFinite(anchorMd)) drawIntervalComponentLabel(g, item, cx + w / 2 + 10, y1, y2, occupiedLabelBands, margin, plotHeight, mdToY(anchorMd, top, bottom, margin, plotHeight));
      }
      svg.appendChild(g);
    }

    function drawIntervalComponentLabel(group, item, x, yTop, yBottom, occupied = [], margin = null, plotHeight = null, anchorYOverride = null) {
      const position = String(item.labelPosition || 'top').toLowerCase();
      const baseY = Number.isFinite(anchorYOverride)
        ? anchorYOverride
        : (position === 'bottom' ? yBottom : position === 'middle' ? (yTop + yBottom) / 2 : yTop);
      const anchorX = x - 10;
      const laneTop = margin ? (margin.top + 10) : 0;
      const laneBottom = (margin && Number.isFinite(plotHeight)) ? (margin.top + plotHeight - 10) : Math.max(baseY + 1, yBottom + 2000);
      if (baseY < laneTop || baseY > laneBottom) return;
      const preferredY = Number.isFinite(num(item.manualLabelY, NaN)) ? num(item.manualLabelY) : baseY;
      const y = item.labelLocked === true
        ? Math.max(laneTop, Math.min(laneBottom, preferredY))
        : avoidReservedBands(preferredY, 13, occupied, laneBottom, laneTop);
      occupied.push(y);
      const lineEndX = Number.isFinite(renderCalloutLineEndX) && renderCalloutLineEndX > 0 ? renderCalloutLineEndX : (x + 44);
      const textX = Number.isFinite(renderCalloutTextX) && renderCalloutTextX > 0 ? renderCalloutTextX : (x + 48);
      const kneeX = Math.max(x + 24, lineEndX - 120);
      const selected = isSelected('components', item.id);
      const stroke = calloutStroke(selected);
      appendCalloutPath(group, routedLabelPath(anchorX, baseY, y, kneeX, lineEndX), stroke, .8, .68);
      group.appendChild(el('circle', {
        cx:anchorX,
        cy:baseY,
        r:selected ? 3 : 2,
        fill:stroke,
        opacity:selected ? 1 : .6,
        class:'callout-drag-handle',
        'data-callout-drag-id':item.id,
        'data-callout-drag-collection':'components'
      }));
      group.appendChild(el('text', {
        x:textX,
        y:y,
        fill:'currentColor',
        'font-size':10,
        'font-weight':600,
        'text-anchor':'start',
        'dominant-baseline':'middle',
        class:'editable-item-label callout-drag-handle',
        'data-collection':'components',
        'data-id':item.id,
        'data-field':'label',
        'data-callout-drag-id':item.id,
        'data-callout-drag-collection':'components'
      }, labelWithDepthSuffix(item, item.label || item.type || item.id)));
      if (selected) {
        appendGrabberHandle(group, {
          cx: textX - 16,
          cy: y,
          fill: '#def359',
          stroke: '#210d2a',
          'stroke-width': 1.2,
          class: 'callout-drag-handle',
          'data-callout-drag-id': item.id,
          'data-callout-drag-collection': 'components'
        }, 6, 12);
        appendGrabberHandle(group, {
          cx: anchorX,
          cy: baseY,
          fill: '#def359',
          stroke: '#210d2a',
          'stroke-width': 1.2,
          class: 'callout-anchor-handle',
          'data-callout-anchor-id': item.id,
          'data-callout-anchor-collection': 'components'
        }, 6, 12);
      }
    }

    function sectionMillWidth(item) {
      const hostInnerW = hostInnerWidth(item);
      if (hostInnerW !== null) return Math.max(10, hostInnerW - 2);
      if (item.diameterIn !== undefined && item.diameterIn !== null && item.diameterIn !== '') return diameterToWidth(item.diameterIn);
      return componentWidth(item);
    }

    function cementPlugWidth(item) {
      // Host takes precedence: when selected, plug should fit host ID.
      const hostInnerW = hostInnerWidth(item);
      if (hostInnerW !== null) return Math.max(10, hostInnerW - 2);
      if (item.diameterIn !== undefined && item.diameterIn !== null && item.diameterIn !== '') {
        return Math.max(40, Math.min(120, diameterToWidth(item.diameterIn)));
      }
      return Math.max(40, Math.min(120, componentWidth(item)));
    }

    function componentWidth(item) {
      if (item?.type === 'annular_packer') {
        const md = item.md !== undefined ? num(item.md) : ((num(item.topMD) + num(item.bottomMD)) / 2);
        const bounds = annularFillBounds({ insideStringId: item.insideStringId, outsideStringId: item.outsideStringId, topMD: md, bottomMD: md });
        return Math.max(20, bounds.outerW);
      }
      if (item.diameterIn !== undefined && item.diameterIn !== null && item.diameterIn !== '') {
        return diameterToWidth(item.diameterIn);
      }
      if (item.host) {
        const host = [...schematic.strings, ...schematic.completion].find(s => s.id === item.host);
        if (host) return diameterToWidth(host.odIn) + 18;
      }
      return 86;
    }

    function componentCalloutAnchorOffset(item) {
      if (item?.type === 'annular_packer') {
        const md = item.md !== undefined ? num(item.md) : ((num(item.topMD) + num(item.bottomMD)) / 2);
        const bounds = annularFillBounds({ insideStringId: item.insideStringId, outsideStringId: item.outsideStringId, topMD: md, bottomMD: md });
        return Math.max(6, bounds.outerW / 2 + 4);
      }
      if (item?.type === 'downhole_device_circle') {
        const diameterIn = Math.max(0.1, num(item.diameterIn, 2));
        const radiusPx = Math.max(2, (diameterIn * renderWidthPerInch) / 2);
        return radiusPx;
      }
      if (item?.type === 'downhole_device_rectangle') {
        const widthPx = Math.max(4, Math.max(0.1, num(item.diameterIn, 2)) * renderWidthPerInch);
        return widthPx / 2;
      }
      if (item?.type === 'perforations') {
        const hostInnerW = hostInnerWidth(item);
        const hostIdWidth = Number.isFinite(hostInnerW) ? hostInnerW : componentWidth(item);
        const half = Math.max(6, hostIdWidth / 2);
        const triDepth = Math.max(4, num(item.perfLength, 18));
        return half + triDepth;
      }
      return componentWidth(item) / 2 + 14;
    }

    function hostInnerWidth(item) {
      if (!item?.host) return null;
      const hostId = String(item.host);
      if (hostId.startsWith('hole:')) {
        const hole = (schematic.holeSections || []).find(h => h.id === hostId.slice(5));
        if (hole) return Math.max(6, diameterToWidth(hole.diameterIn));
      }
      const tubular = [...schematic.strings, ...schematic.completion].find(s => s.id === hostId);
      if (tubular) {
        const outerW = diameterToWidth(tubular.odIn);
        const wallThickness = resolveTubularWallThickness(tubular, outerW);
        return Math.max(6, outerW - (wallThickness * 2));
      }
      // Legacy compatibility: plain hole IDs without "hole:" prefix.
      const legacyHole = (schematic.holeSections || []).find(h => h.id === hostId);
      if (legacyHole) return Math.max(6, diameterToWidth(legacyHole.diameterIn));
      return null;
    }

    function componentColor(type) {
      if (type === 'cement_plug') return '#c7b2ea';
      if (type === 'section_mill') return '#b0294a';
      if (type === 'bridge_plug' || type === 'mechanical_plug' || type === 'tubing_plug') return '#302711';
      if (type === 'restriction_general') return '#302711';
      if (type === 'annular_packer') return '#302711';
      if (type === 'packer') return '#210d2a';
      if (type === 'downhole_device_circle') return '#210d2a';
      if (type === 'downhole_device_rectangle') return '#210d2a';
      return '#574064';
    }

    function plugMaterialColor(material) {
      const m = String(material || 'cement').toLowerCase();
      if (m === 'epoxy') return '#def359';
      if (m === 'bismuth') return '#def359';
      return '#555555';
    }

    function drawPerforations(svg, item, cx, top, bottom, margin, plotHeight) {
      const y1 = mdToY(item.topMD, top, bottom, margin, plotHeight);
      const y2 = mdToY(item.bottomMD, top, bottom, margin, plotHeight);
      const yTop = Math.min(y1, y2);
      const yBottom = Math.max(y1, y2);
      const g = makeGroup('components', item);
      const fill = itemFillColor('components', item, '#ffffff');
      const selected = isSelected('components', item.id);
      const stroke = selected ? '#def359' : colorInputValue(item.lineColor, '#210d2a');
      const strokeWidth = Math.max(0.4, num(item.lineWidth, 1));
      const hostInnerW = hostInnerWidth(item);
      const hostIdWidth = Number.isFinite(hostInnerW) ? hostInnerW : componentWidth(item);
      const half = Math.max(6, hostIdWidth / 2);
      const triDepth = Math.max(4, num(item.perfLength, 18));
      const triHalfH = 4.5;
      const spacing = 12;
      const perforationYs = [];
      if (yBottom - yTop < spacing) {
        perforationYs.push((yTop + yBottom) / 2);
      } else {
        for (let y = yTop + triHalfH; y <= yBottom - triHalfH + 0.001; y += spacing) perforationYs.push(y);
      }
      perforationYs.forEach(y => {
        g.appendChild(el('polygon', {
          points:`${cx - half},${y - triHalfH} ${cx - half},${y + triHalfH} ${cx - half - triDepth},${y}`,
          fill,
          stroke,
          'stroke-width': selected ? Math.max(strokeWidth + 0.6, 1.2) : strokeWidth,
          'stroke-linejoin':'round'
        }));
        g.appendChild(el('polygon', {
          points:`${cx + half},${y - triHalfH} ${cx + half},${y + triHalfH} ${cx + half + triDepth},${y}`,
          fill,
          stroke,
          'stroke-width': selected ? Math.max(strokeWidth + 0.6, 1.2) : strokeWidth,
          'stroke-linejoin':'round'
        }));
      });
      svg.appendChild(g);
    }

    function drawHiddenSections(svg, cx, margin, width, top, bottom, plotHeight) {
      const sections = (schematic.hiddenSections || [])
        .filter(viz)
        .map(item => ({ ...item, topMD: num(item.topMD), bottomMD: num(item.bottomMD) }))
        .filter(item => Number.isFinite(item.topMD) && Number.isFinite(item.bottomMD) && item.bottomMD > item.topMD)
        .sort((a, b) => a.topMD - b.topMD)
        .map(item => ({
          ...item,
          topMD: Math.max(top, item.topMD),
          bottomMD: Math.min(bottom, item.bottomMD)
        }))
        .filter(item => item.bottomMD > item.topMD);
      if (!sections.length) return;
      const lineGap = 9;
      sections.forEach(section => {
        const g = makeGroup('hiddenSections', section);
        addTitle(g, `${itemTitle(section)} | ${itemDepthText(section)}`);
        const selected = isSelected('hiddenSections', section.id);
        const baseStroke = colorInputValue(section.lineColor, '#b3b3b3');
        const stroke = selected ? '#def359' : baseStroke;
        const baseStrokeWidth = Math.max(0.6, num(section.lineWidth, 1));
        const strokeWidth = selected ? Math.max(baseStrokeWidth + 0.8, 2.2) : baseStrokeWidth;
        const dashArray = section.lineType === 'solid' ? null : '5 4';
        const yTopVisible = mdToY(section.topMD, top, bottom, margin, plotHeight);
        const yBottomVisible = mdToY(section.bottomMD, top, bottom, margin, plotHeight);
        const gapMid = (yTopVisible + yBottomVisible) / 2;
        const waveYTop = gapMid - (lineGap / 2);
        const waveYBottom = gapMid + (lineGap / 2);
        const localWellWidth = findHoleWidthAtDepth((section.topMD + section.bottomMD) / 2, 0);
        const breakWidth = Math.max(48, localWellWidth * 1.3);
        const plotLeft = margin.left;
        const plotRight = width - 40;
        const left = Math.max(plotLeft, cx - (breakWidth / 2));
        const right = Math.min(plotRight, cx + (breakWidth / 2));
        g.appendChild(el('rect', {
          x: left,
          y: waveYTop,
          width: Math.max(1, right - left),
          height: Math.max(1, waveYBottom - waveYTop),
          fill: currentPlotBackground(),
          stroke: 'none'
        }));
        g.appendChild(el('line', {
          x1: left,
          y1: waveYTop,
          x2: right,
          y2: waveYTop,
          stroke,
          'stroke-width': strokeWidth,
          'stroke-dasharray': dashArray,
          'stroke-linecap': 'round',
          opacity: 0.95
        }));
        g.appendChild(el('line', {
          x1: left,
          y1: waveYBottom,
          x2: right,
          y2: waveYBottom,
          stroke,
          'stroke-width': strokeWidth,
          'stroke-dasharray': dashArray,
          'stroke-linecap': 'round',
          opacity: 0.95
        }));
        svg.appendChild(g);
      });
    }

    function drawFormationTrack(svg, lithX, margin, plotHeight, top, bottom, trackW = 50) {
      const plotTop = margin.top;
      const plotBottom = margin.top + plotHeight;
      svg.appendChild(el('rect', { x:lithX, y:margin.top, width:trackW, height:plotHeight, fill:'#e4ebd7', opacity:.35, stroke:'currentColor', 'stroke-width':1, 'stroke-opacity':.18 }));
      svg.appendChild(el('text', { x:lithX + trackW - 6, y:margin.top - 12, fill:'currentColor', 'font-size':10, 'font-weight':700, 'text-anchor':'end' }, 'Formations'));
      schematic.formations.filter(viz).forEach(item => {
        const y1Raw = mdToY(item.topMD, top, bottom, margin, plotHeight);
        const y2Raw = mdToY(item.bottomMD, top, bottom, margin, plotHeight);
        const rawTop = Math.min(y1Raw, y2Raw);
        const rawBottom = Math.max(y1Raw, y2Raw);
        if (rawBottom <= plotTop || rawTop >= plotBottom) return;
        const y1 = Math.max(plotTop, rawTop);
        const y2 = Math.min(plotBottom, rawBottom);
        const g = makeGroup('formations', item);
        const fill = itemFillColor('formations', item, lithologyColor(item.lithology));
        g.appendChild(el('rect', { x:lithX, y:y1, width:trackW, height:Math.max(1, y2-y1), fill, opacity:1, stroke:isSelected('formations', item.id) ? '#def359' : 'currentColor', 'stroke-width':isSelected('formations', item.id) ? 3 : .6, 'stroke-opacity':.45 }));
        g.appendChild(el('text', { x:lithX + trackW + 6, y:Math.min(plotBottom - 4, y1 + 13), fill:'currentColor', 'font-size':10, 'font-weight':700, 'text-anchor':'start' }, labelWithDepthSuffix(item, item.name || item.id)));
        svg.appendChild(g);
      });
    }

    function drawFormationGuideLines(svg, margin, width, top, bottom, plotHeight) {
      const plotLeft = margin.left;
      const plotRight = width - 40;
      schematic.formations.filter(viz).forEach(item => {
        const y = mdToY(item.topMD, top, bottom, margin, plotHeight);
        svg.appendChild(el('line', {
          x1: plotLeft,
          y1: y,
          x2: plotRight,
          y2: y,
          stroke: 'currentColor',
          'stroke-width': 1,
          'stroke-dasharray': '3 4',
          opacity: 0.28
        }));
      });
    }

    function lithologyColor(lithology) {
      const l = String(lithology || '').toLowerCase();
      if (l.includes('sand')) return '#def359';
      if (l.includes('shale')) return '#c7b2ea';
      if (l.includes('chalk') || l.includes('lime')) return '#e3dfeb';
      return '#e4ebd7';
    }

        }));
        g.appendChild(el('text', {

          class:'editable-item-label callout-drag-handle',

          'data-id':label.id,
          'data-field':'label',
          'data-callout-drag-id':label.id,

        }, label.text));
        if (selected) {
          appendGrabberHandle(g, {
