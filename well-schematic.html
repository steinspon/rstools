<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interwell Well Schematic Creator</title>
  <link rel="stylesheet" href="brand/brand-tokens.css">
  <link rel="stylesheet" href="search-ui.css">
  <link rel="stylesheet" href="night-toggle.css">
  <style>
    :root {
      --bg: #f4f0f7;
      --surface: rgba(255,255,255,.88);
      --surface-alt: rgba(255,255,255,.72);
      --border: rgba(33,13,42,.16);
      --text: #22122d;
      --muted: #685774;
      --primary: #210d2a;
      --primary-strong: #13081a;
      --lavender: #c7b2ea;
      --lime: #def359;
      --neutral-lavender: #e3dfeb;
      --neutral-green: #e4ebd7;
      --brown: #302711;
      --danger: #b0294a;
      --field-bg: #ffffff;
      --field-text: var(--text);
      --field-border: #c8bdd0;
      --plot-bg: #ffffff;
      --plot-line: #210d2a;
      --table-head: #f3edf7;
      --shadow: 0 10px 26px rgba(33,13,42,.08);
      --radius: 6px;
      --control-height: 24px;
      --control-font: 10px;
    }
    body.night-mode {
      --bg: #110b16;
      --surface: rgba(30,20,40,.94);
      --surface-alt: rgba(25,17,34,.9);
      --border: rgba(227,223,235,.22);
      --text: #f2eaf8;
      --muted: #b8a6c4;
      --primary: #f2eaf8;
      --primary-strong: #ffffff;
      --field-bg: #171022;
      --field-text: #f2eaf8;
      --field-border: #493955;
      --plot-bg: #171022;
      --plot-line: #f2eaf8;
      --table-head: #2a1f35;
      --shadow: 0 8px 22px rgba(0,0,0,.26);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "formular-interwell", Arial, sans-serif;
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }
    button, input, select, textarea { font: inherit; font-variant-numeric: tabular-nums; }
    button, .btn {
      min-height: var(--control-height);
      border: 1px solid color-mix(in srgb, var(--field-border) 88%, var(--border));
      border-radius: 4px;
      background: color-mix(in srgb, var(--surface-alt) 82%, #fff 18%);
      color: var(--text);
      padding: 3px 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    button:hover, .btn:hover { border-color: color-mix(in srgb, var(--lavender) 60%, var(--border)); }
    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    body.night-mode button.primary { background: var(--lime); color: #210d2a; border-color: var(--lime); }
    button.danger { color: var(--danger); }
    input, select, textarea {
      width: 100%;
      min-height: var(--control-height);
      border: 1px solid var(--field-border);
      border-radius: 4px;
      background: var(--field-bg);
      color: var(--field-text);
      padding: 3px 6px;
    }
    input[type="checkbox"] {
      width: 14px;
      min-width: 14px;
      height: 14px;
      min-height: 14px;
      accent-color: var(--primary);
      padding: 0;
      margin: 0;
      justify-self: start;
    }
    .checkbox-row {
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      margin: 0;
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
    }
    .checkbox-row input[type="checkbox"] {
      flex: 0 0 14px;
    }
    .form-grid .checkbox-row {
      min-height: var(--control-height);
    }
    .form-grid .checkbox-row span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    textarea { min-height: 72px; resize: vertical; }
    label { display: grid; gap: 3px; color: var(--muted); font-size: 10px; }
    .wrap.app-shell {
      min-height: 100vh;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .app-header {
      position: relative;
      z-index: 20;
      display: grid;
      gap: 4px;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .app-header-top, .header-actions, .menu-bar, .toolbar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .app-header-top { justify-content: space-between; }
    .app-brand { display: flex; align-items: center; min-width: 0; }
    .app-logo { width: auto; height: 18px; flex: 0 0 auto; margin-right: 6px; }
    body.night-mode .app-logo { filter: brightness(0) invert(1) saturate(0); }
    .app-brand .nav-icon-btn + .nav-icon-btn { margin-left: 6px; }
    .nav-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--brand-dark-purple);
      cursor: pointer;
    }
    body.night-mode .nav-icon-btn { color: #f2eaf8; }
    .nav-icon-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }
    .app-meta { color: var(--muted); text-align: right; line-height: 1.35; white-space: nowrap; }
    .header-actions {
      justify-content: space-between;
      flex-wrap: wrap;
      padding-top: 4px;
      border-top: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
    }
    .menu-group { position: relative; display: inline-flex; }
    .menu-popover {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 180px;
      display: none;
      padding: 5px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      z-index: 50;
    }
    .menu-group.open .menu-popover { display: grid; gap: 3px; }
    .menu-item { justify-content: flex-start; width: 100%; }
    .app-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 360px minmax(520px, 1fr);
      gap: 6px;
      align-items: start;
    }
    .controls-panel { grid-column: 1; grid-row: 1 / span 2; }
    .canvas-shell { grid-column: 2; grid-row: 1; }
    .right-panel { grid-column: 2; grid-row: 2; }
    .panel, .canvas-shell {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .panel {
      overflow: auto;
      padding: 8px;
    }
    .controls-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
    }
    .sidebar-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface);
      padding: 3px;
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent 22%);
      border-radius: 6px;
    }
    .sidebar-tab-option {
      display: flex;
      align-items: stretch;
    }
    .sidebar-tab-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-tab-btn {
      min-height: 24px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      border-radius: 5px;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      padding: 0 3px;
      transition: background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .sidebar-tab-btn.is-active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 8px 18px rgba(33,13,42,.18);
    }
    body.night-mode .sidebar-tab-btn.is-active {
      background: var(--lime);
      color: #210d2a;
      border-color: var(--lime);
    }
    .sidebar-tab-panel {
      display: none;
      min-height: 0;
    }
    .sidebar-tab-panel.is-active {
      display: block;
    }
    .canvas-shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }
    .canvas-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 0;
      background: color-mix(in srgb, var(--surface-alt) 82%, transparent);
    }
    .svg-wrap {
      position: relative;
      overflow: auto;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--border) 30%, transparent) 1px, transparent 1px),
        linear-gradient(180deg, color-mix(in srgb, var(--border) 28%, transparent) 1px, transparent 1px),
        var(--plot-bg);
      background-size: 24px 24px;
      padding: 12px;
    }
    .depth-pan-scroll {
      position: absolute;
      right: 6px;
      top: 84px;
      width: 220px;
      height: 18px;
      z-index: 8;
      opacity: .88;
      accent-color: #ab4ce4;
      cursor: ns-resize;
      transform: rotate(90deg);
      transform-origin: top right;
      -webkit-appearance: none;
      appearance: none;
    }
    .depth-pan-scroll.hidden { display: none; }
    #schematicSvg {
      display: block;
      width: 100%;
      min-width: 760px;
      height: auto;
      background: var(--plot-bg);
      color: var(--plot-line);
      border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
    }
    details.section {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 7px;
      background: color-mix(in srgb, var(--surface-alt) 84%, transparent);
    }
    details.section > summary {
      cursor: pointer;
      padding: 7px 8px;
      font-weight: 600;
      color: var(--text);
      list-style: none;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    .section-body { display: grid; gap: 7px; padding: 0 8px 8px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
    .form-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .quick-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; }
    .quick-grid button { justify-content: flex-start; text-align: left; }
    .add-tree,
    .add-tree ul {
      list-style: none;
      margin: 0;
      padding-left: 0;
    }
    .add-tree {
      display: grid;
      gap: 4px;
    }
    .add-tree ul {
      margin-top: 2px;
      margin-left: 10px;
      padding-left: 8px;
      border-left: 1px solid color-mix(in srgb, var(--border) 74%, transparent 26%);
      display: grid;
      gap: 3px;
    }
    .add-tree ul[hidden] {
      display: none;
    }
    .add-tree-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 6px 8px;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      transition: background 160ms ease, color 160ms ease;
    }
    .add-tree-toggle::after {
      content: "\203A";
      display: inline-block;
      margin-left: 2px;
      transition: transform 180ms ease;
      transform-origin: 50% 50%;
      font-size: 14px;
      line-height: 1;
      opacity: 0.9;
    }
    .add-tree-toggle[aria-expanded="true"]::after {
      transform: rotate(90deg);
    }
    .add-tree-toggle:hover {
      background: color-mix(in srgb, var(--surface-alt) 84%, var(--surface) 16%);
      color: var(--text);
    }
    .add-tree-link {
      display: block;
      text-decoration: none;
      color: var(--muted);
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      transition: background 160ms ease, color 160ms ease;
      cursor: pointer;
    }
    .add-tree-link:hover {
      background: color-mix(in srgb, var(--surface-alt) 84%, var(--surface) 16%);
      color: var(--text);
    }
    .add-tree-link:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .add-tree-link.is-action {
      width: 100%;
      font-size: 11px;
    }
    .item-list { display: grid; gap: 4px; }
    .item-row {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
      padding: 5px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: color-mix(in srgb, var(--field-bg) 80%, transparent);
    }
    .item-row.selected {
      border-color: var(--lime);
      box-shadow: inset 3px 0 0 var(--lime);
    }
    .item-main { min-width: 0; display: grid; gap: 1px; }
    .item-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .item-meta { color: var(--muted); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mini-actions { display: flex; gap: 2px; }
    .mini-actions button { min-width: 24px; padding: 2px 5px; }
    .properties-empty {
      color: var(--muted);
      line-height: 1.45;
      padding: 8px;
      border: 1px dashed var(--border);
      border-radius: 6px;
    }
    .selected-path { color: var(--muted); margin: 0 0 8px; }
    .warning-list { display: grid; gap: 5px; margin: 0; padding: 0; list-style: none; }
    .warning-list li {
      padding: 6px;
      border-left: 3px solid var(--lime);
      background: color-mix(in srgb, var(--lime) 12%, transparent);
      border-radius: 4px;
      line-height: 1.35;
    }
    .legend-grid { display: grid; gap: 5px; }
    .legend-item { display: grid; grid-template-columns: 26px 1fr; align-items: center; gap: 6px; }
    .legend-swatch { height: 12px; border: 1px solid currentColor; }
    .status-line {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hidden { display: none !important; }
    body.lock-active { overflow: hidden; }
    body.lock-active .app-shell { pointer-events: none; user-select: none; filter: blur(1px); }
    .access-gate {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(8,10,14,.62);
      backdrop-filter: blur(4px);
    }
    .access-card {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 20px 45px rgba(0,0,0,.34);
      padding: 18px;
    }
    .dialog-gate {
      position: fixed;
      inset: 0;
      z-index: 1250;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(8,10,14,.55);
      backdrop-filter: blur(3px);
    }
    .dialog-card {
      width: min(540px, 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: 0 20px 45px rgba(0,0,0,.34);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .dialog-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }
    .dialog-sub {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
    }
    .dialog-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      max-height: 50vh;
      overflow: auto;
      padding-right: 2px;
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }
    .access-kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .access-title { margin: 0 0 10px; font-size: 20px; }
    .access-error { margin: 0 0 12px; line-height: 1.4; }
    .element-hit { cursor: pointer; }
    .element-hit:hover { filter: drop-shadow(0 0 4px rgba(222,243,89,.75)); }
    .annotation-label { cursor: ns-resize; }
    .editable-item-label { cursor: text; }
    .depth-handle { cursor: ns-resize; }
    @media (max-width: 1180px) {
      .app-layout { grid-template-columns: 330px minmax(480px, 1fr); }
    }
    @media (max-width: 820px) {
      .app-header-top { align-items: flex-start; flex-direction: column; }
      .app-meta { text-align: left; white-space: normal; }
      .app-layout { grid-template-columns: 1fr; }
      .controls-panel,
      .canvas-shell,
      .right-panel {
        grid-column: 1;
        grid-row: auto;
      }
      .panel { max-height: none; }
      #schematicSvg { min-width: 700px; }
    }
    @supports (-webkit-touch-callout: none) {
      @media (hover: none) and (pointer: coarse) {
        input, select, textarea { font-size: 16px !important; }
      }
    }
  </style>
</head>
<body>
  <div class="dialog-gate hidden" id="addDialogGate" role="dialog" aria-modal="true" aria-labelledby="addDialogTitle">
    <form class="dialog-card" id="addDialogForm">
      <h2 class="dialog-title" id="addDialogTitle">Add Element</h2>
      <p class="dialog-sub" id="addDialogSubtitle">Enter element details before plotting.</p>
      <div class="dialog-grid" id="addDialogFields"></div>
      <div class="dialog-actions">
        <button type="button" id="addDialogCancelBtn">Cancel</button>
        <button type="submit" class="primary" id="addDialogSubmitBtn">Add Element</button>
      </div>
    </form>
  </div>

  <div class="wrap app-shell">
    <header class="app-header">
      <div class="app-header-top">
        <div class="app-brand">
          <img class="app-logo" src="https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/assets/assets/Interwell_Logo_Symbol_Dark_Purple-2.png" alt="Interwell Logo">
          <a class="nav-icon-btn" id="homeNavBtn" href="index.html" aria-label="Home" title="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2L3 10.6v10.2h6.1v-6.3h5.8v6.3H21V10.6L12 3.2z"/></svg>
          </a>
          <button class="nav-icon-btn" id="backNavBtn" type="button" aria-label="Back" title="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.2 4.4L3.6 12l7.6 7.6 1.6-1.6-4.9-4.9H20v-2.2H7.9l4.9-4.9-1.6-1.6z"/></svg>
          </button>
          <button class="nav-icon-btn" id="forwardNavBtn" type="button" aria-label="Forward" title="Forward">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.8 4.4l7.6 7.6-7.6 7.6-1.6-1.6 4.9-4.9H4v-2.2h12.1l-4.9-4.9 1.6-1.6z"/></svg>
          </button>
        </div>
        <div class="app-meta">
          <div>By Darren Wilkinson</div>
          <div>Updated: 16.05.2026</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="menu-bar">
          <div class="menu-group" id="importMenu">
            <button type="button" id="importMenuButton" aria-expanded="false" aria-controls="importMenuPanel">Import</button>
            <div class="menu-popover" id="importMenuPanel">
              <button type="button" class="menu-item" id="importJsonBtn">Schematic JSON</button>
            </div>
          </div>
          <div class="menu-group" id="exportMenu">
            <button type="button" class="primary" id="exportMenuButton" aria-expanded="false" aria-controls="exportMenuPanel">Export</button>
            <div class="menu-popover" id="exportMenuPanel">
              <button type="button" class="menu-item" id="exportJsonBtn">Schematic JSON</button>
              <button type="button" class="menu-item" id="exportSvgBtn">Schematic SVG</button>
              <button type="button" class="menu-item" id="exportPngBtn">Schematic PNG</button>
              <button type="button" class="menu-item" id="exportPdfBtn">Schematic PDF</button>
            </div>
          </div>
          <button type="button" id="newBtn">New Example</button>
          <button type="button" id="clearBtn">Clear Canvas</button>
        </div>
        <div class="toolbar-row">
          <span class="status-line" id="saveStatus">Saved locally</span>
          <div class="toggle-switch" title="Night Mode">
            <label class="switch-label" for="nightMode">
              <input id="nightMode" class="checkbox" type="checkbox">
              <span class="slider"></span>
              <span class="toggle-text">Night Mode</span>
            </label>
          </div>
        </div>
        <input type="file" id="importFileInput" accept=".json,application/json" hidden>
      </div>
    </header>

    <main class="app-layout">
      <aside class="panel controls-panel">
        <div class="sidebar-tabs" role="tablist" aria-label="Well schematic sidebar sections">
          <div class="sidebar-tab-option">
            <input type="radio" id="sidebarTabAddBtn" class="sidebar-tab-input" name="sidebarTab" checked onchange="setSidebarTab('add')">
            <label for="sidebarTabAddBtn" id="sidebarTabAddLabel" class="sidebar-tab-btn is-active" role="tab" aria-selected="true" aria-controls="sidebarPanelAdd">Add Elements</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="sidebarTabWellBtn" class="sidebar-tab-input" name="sidebarTab" onchange="setSidebarTab('well')">
            <label for="sidebarTabWellBtn" id="sidebarTabWellLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="sidebarPanelWell">Well Info</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="sidebarTabPlotBtn" class="sidebar-tab-input" name="sidebarTab" onchange="setSidebarTab('plot')">

    function defaultSchematic() {

      const base = defaultSchematic();

    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function num(v, fallback = 0) { const n = Number(v); return Number.isFinite(n) ? n : fallback; }
    function clampVerticalScale(value) {
      return Math.max(MIN_VERTICAL_SCALE, Math.min(MAX_VERTICAL_SCALE, num(value, 1)));
    }
    function esc(v) {
      return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function makeId(prefix) {
      return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`;
    }
    function itemTitle(item) { return item.label || item.name || item.id || 'Untitled'; }
    function itemDepthText(item) {
      if (item.md !== undefined && item.md !== '') return `${item.md} ${schematic.plotSettings.depthUnit} TVD`;
      if (item.topMD !== undefined || item.bottomMD !== undefined) return `${item.topMD ?? ''}-${item.bottomMD ?? ''} ${schematic.plotSettings.depthUnit} TVD`;
      return item.type || '';
    }
    function depthSuffixText(item) {
      const showTop = item?.showDepthTop === true;
      const showBase = item?.showDepthBase === true;
      if (item?.type === 'restriction_general' && String(item?.labelPosition || 'top').toLowerCase() === 'middle') {
        if (!showTop) return '';
        const unit = schematic?.plotSettings?.depthUnit || 'm';
        const topValRaw = num(item?.topMD, NaN);
        const bottomValRaw = num(item?.bottomMD, NaN);
        if (!Number.isFinite(topValRaw) || !Number.isFinite(bottomValRaw)) return '';
        const midVal = formatDepthOneDecimal((topValRaw + bottomValRaw) / 2);
        return midVal ? ` (${midVal} ${unit})` : '';
      }
      if (item?.type === 'downhole_device_circle') {
        if (!showTop) return '';
        const unit = schematic?.plotSettings?.depthUnit || 'm';
        const hasMd = item?.md !== undefined && item?.md !== null && item?.md !== '';
        const mdVal = hasMd ? formatDepthOneDecimal(item.md) : '';
        return mdVal ? ` (${mdVal} ${unit})` : '';
      }
      if (!showTop && !showBase) return '';
      const unit = schematic?.plotSettings?.depthUnit || 'm';
      const hasTop = item?.topMD !== undefined && item?.topMD !== null && item?.topMD !== '';
      const hasBottom = item?.bottomMD !== undefined && item?.bottomMD !== null && item?.bottomMD !== '';
      const hasMd = item?.md !== undefined && item?.md !== null && item?.md !== '';
      const topVal = hasTop ? formatDepthOneDecimal(item.topMD) : (hasMd ? formatDepthOneDecimal(item.md) : '');
      const bottomVal = hasBottom ? formatDepthOneDecimal(item.bottomMD) : (hasMd ? formatDepthOneDecimal(item.md) : topVal);
      if (showTop && showBase) return (topVal || bottomVal) ? ` (${topVal}-${bottomVal} ${unit})` : '';
      if (showTop) return topVal ? ` (Top ${topVal} ${unit})` : '';
      return bottomVal ? ` (Base ${bottomVal} ${unit})` : '';
    }
    function labelWithDepthSuffix(item, fallbackText) {
      const base = fallbackText || item?.label || item?.name || item?.id || '';
      return `${base}${depthSuffixText(item)}`;
    }

    function safeBootIfRequested() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        if (params.get('safe') !== '1') return;
        localStorage.removeItem(STORAGE_KEY);
      } catch (err) {}
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        if (raw.length > MAX_LOCAL_DRAFT_BYTES) {
          try { localStorage.removeItem(STORAGE_KEY); } catch (removeErr) {}
          return null;
        }
        const parsed = JSON.parse(raw);
        return parsed && parsed.schemaVersion === '1.0' ? parsed : null;
      } catch (err) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (removeErr) {}
        return null;
      }
    }

    function normalizeSchematic(data) {
      const next = data || defaultSchematic();
      Object.keys(collectionDefs).forEach(key => { if (!Array.isArray(next[key])) next[key] = []; });
      next.plotSettings = { ...defaultSchematic().plotSettings, ...(next.plotSettings || {}) };
      next.plotSettings.verticalScale = Math.round(clampVerticalScale(next.plotSettings.verticalScale) * 1000) / 1000;
      const legacyHidden = normalizeHiddenSections(next.plotSettings.hiddenSections);
      const currentHidden = normalizeHiddenSections(next.hiddenSections);
      next.hiddenSections = (currentHidden.length ? currentHidden : legacyHidden).map((section, index) => ({
        id: section.id || makeId('hidden'),
        label: section.label || `Hidden section ${index + 1}`,
        topMD: section.topMD,
        bottomMD: section.bottomMD,
        lineType: section.lineType === 'solid' ? 'solid' : 'dashed',
        lineColor: colorInputValue(section.lineColor, '#b3b3b3'),
        lineWidth: Math.max(0.6, num(section.lineWidth, 1)),
        visible: section.visible !== false
      }));
      delete next.plotSettings.hiddenSections;
      next.strings = (next.strings || []).map(item => {
        const normalized = { annotationEnabled:true, annotationMD:null, showDepthTop:false, showDepthBase:false, wallThickness:8, ...item };
        normalized.wallThickness = normalizeTubularWallThickness(normalized.wallThickness);
        delete normalized.tocMD;
        return normalized;
      });
      next.completion = (next.completion || []).map(item => {
        const normalized = { annotationEnabled:true, annotationMD:null, showDepthTop:false, showDepthBase:false, wallThickness:8, ...item };
        normalized.wallThickness = normalizeTubularWallThickness(normalized.wallThickness);
        return normalized;
      });
      next.cement = (next.cement || []).map(item => normalizeAnnularFill(item, next));
      next.components = (next.components || []).map(item => normalizeComponentDraft({ showDepthTop:false, showDepthBase:false, ...item }));
      next.formations = (next.formations || []).map(item => ({ showDepthTop:true, showDepthBase:false, ...item }));
      return next;
    }

    function normalizeHiddenSections(sections) {
      if (!Array.isArray(sections)) return [];
      return sections
        .map(section => ({
          id: section?.id,
          label: section?.label,
          visible: section?.visible !== false,
          lineType: section?.lineType,
          lineColor: section?.lineColor,
          lineWidth: section?.lineWidth,
          topMD: num(section?.topMD, NaN),
          bottomMD: num(section?.bottomMD, NaN)
        }))
        .filter(section => Number.isFinite(section.topMD) && Number.isFinite(section.bottomMD) && section.bottomMD > section.topMD)
        .sort((a, b) => a.topMD - b.topMD);
    }

    function normalizeTubularWallThickness(value) {
      return Math.max(1, Math.min(60, num(value, 8)));
    }

    function resolveTubularWallThickness(item, outerWidthPx) {
      const requested = normalizeTubularWallThickness(item?.wallThickness);
      const maxForShape = Math.max(1, (num(outerWidthPx, 0) / 2) - 0.5);
      return Math.min(requested, maxForShape);
    }

    function normalizeAnnularFill(item, model = schematic) {
      const normalized = { annotationMD:null, showDepthTop:true, ...item };
      if (!normalized.material) normalized.material = 'cement';
      delete normalized.quality;

      if (normalized.outsideStringId && legacyHoleId(normalized.outsideStringId, model)) {
        normalized.outsideStringId = `hole:${normalized.outsideStringId}`;
      }
      if (!normalized.insideStringId && normalized.outsideStringId && boundaryIsTubularInModel(normalized.outsideStringId, model)) {
        const tubularId = normalized.outsideStringId;
        normalized.insideStringId = tubularId;
        const containingHole = findContainingHoleIdForInterval(tubularId, normalized, model);
        if (containingHole) normalized.outsideStringId = `hole:${containingHole}`;
      }
      return normalized;
    }

    function legacyHoleId(id, model = schematic) {
      return !String(id).startsWith('hole:') && (model.holeSections || []).some(hole => hole.id === id);
    }

    function boundaryIsTubularInModel(id, model = schematic) {
      if (!id || String(id).startsWith('hole:')) return false;
      return [...(model.strings || []), ...(model.completion || [])].some(item => item.id === id);
    }

    function findContainingHoleIdForInterval(tubularId, interval, model = schematic) {
      const tubular = [...(model.strings || []), ...(model.completion || [])].find(item => item.id === tubularId);
      const topMd = num(interval.topMD, num(tubular?.topMD));
      const bottomMd = num(interval.bottomMD, num(tubular?.bottomMD, topMd));
      const od = num(tubular?.odIn, 0);
      const candidates = (model.holeSections || [])
        .filter(hole => num(hole.topMD) <= topMd && num(hole.bottomMD) >= bottomMd && num(hole.diameterIn) > od)
        .sort((a, b) => num(a.diameterIn) - num(b.diameterIn));
      return candidates[0]?.id || null;
    }

    function updateHistoryButtons() {
      const undoBtn = document.getElementById('undoBtn');
      const redoBtn = document.getElementById('redoBtn');

    function captureHistorySnapshot() {
      if (!historyManager.isReady || historyManager.isRestoring) return;
      const serialized = JSON.stringify(schematic);
      if (!serialized || serialized === historyManager.lastSerialized) return;
      historyManager.undoStack.push(serialized);
      if (historyManager.undoStack.length > historyManager.maxEntries) historyManager.undoStack.shift();
      historyManager.redoStack = [];
      historyManager.lastSerialized = serialized;
      updateHistoryButtons();
    }

    function scheduleHistoryCapture(delayMs = 120) {
      if (!historyManager.isReady || historyManager.isRestoring) return;
      if (historyManager.captureTimer) clearTimeout(historyManager.captureTimer);
      historyManager.captureTimer = setTimeout(() => {
        historyManager.captureTimer = null;
        captureHistorySnapshot();
      }, delayMs);
    }

    function restoreHistorySnapshot(serialized) {
      if (!serialized) return;
      try {
        const parsed = JSON.parse(serialized);
        historyManager.isRestoring = true;
        schematic = normalizeSchematic(parsed);
        selected = null;
        renderAll(false);
        markUnsavedChanges();
      } catch (err) {
        console.error(err);
      } finally {
        historyManager.isRestoring = false;
        historyManager.lastSerialized = serialized;
        updateHistoryButtons();
      }
    }

    function undoAction() {
      if (historyManager.undoStack.length <= 1) return;
      const current = historyManager.undoStack.pop();
      if (current) historyManager.redoStack.push(current);
      const previous = historyManager.undoStack[historyManager.undoStack.length - 1];
      restoreHistorySnapshot(previous);
    }

    function redoAction() {
      if (historyManager.redoStack.length === 0) return;
      const snapshot = historyManager.redoStack.pop();
      if (!snapshot) return;
      historyManager.undoStack.push(snapshot);
      restoreHistorySnapshot(snapshot);
    }

    function dataDepthBounds() {
      const all = ['holeSections','strings','cement','completion','components','formations'].flatMap(key => schematic[key] || []);
      const tops = all.map(depthStart).filter(Number.isFinite);
      const bottoms = all.map(item => num(item.bottomMD, num(item.md, 0))).filter(Number.isFinite);
      if (!tops.length || !bottoms.length) return { min: 0, max: 5000 };
      return { min: Math.min(...tops), max: Math.max(...bottoms) };
    }

    function updateDepthPanControl() {
      const slider = document.getElementById('depthPanScrollbar');
      if (!slider) return;
      const bounds = dataDepthBounds();
      const top = num(schematic.plotSettings.topDepth);
      const bottom = num(schematic.plotSettings.bottomDepth, 5000);
      const span = Math.max(MIN_VIEW_SPAN, bottom - top);
      const totalSpan = Math.max(1, bounds.max - bounds.min);
      const canPan = span < totalSpan - 0.001;
      if (!canPan) {
        slider.classList.add('hidden');
        return;
      }
      const maxTop = bounds.max - span;
      slider.classList.remove('hidden');
      slider.min = String(bounds.min);
      slider.max = String(Math.max(bounds.min, maxTop));
      slider.step = String(Math.max(0.000001, span / 1000));
      slider.value = String(Math.max(bounds.min, Math.min(maxTop, top)));
    }

    function panDepthWindow(deltaDepth, markDirty = true, syncInputs = true) {
      const bounds = dataDepthBounds();
      const top = num(schematic.plotSettings.topDepth);
      const bottom = num(schematic.plotSettings.bottomDepth, 5000);
      const span = Math.max(MIN_VIEW_SPAN, bottom - top);
      const minTop = bounds.min;
      const maxTop = bounds.max - span;
      if (maxTop <= minTop) return;
      const nextTop = Math.max(minTop, Math.min(maxTop, top + deltaDepth));
      schematic.plotSettings.topDepth = nextTop;
      schematic.plotSettings.bottomDepth = nextTop + span;
      renderSchematic();
      if (syncInputs) syncDepthRangeInputs();
      if (markDirty) markUnsavedChanges();
    }

    function scheduleWheelInteraction(deltaY) {
      wheelDeltaAccumulator += deltaY;
      if (wheelFrameId !== null) return;
      wheelFrameId = requestAnimationFrame(() => {
        const totalDelta = wheelDeltaAccumulator;
        wheelDeltaAccumulator = 0;
        wheelFrameId = null;
        if (!Number.isFinite(totalDelta) || Math.abs(totalDelta) < 0.01) return;
        const bounds = dataDepthBounds();
        const topNow = num(schematic.plotSettings.topDepth);
        const bottomNow = num(schematic.plotSettings.bottomDepth, 5000);
        const spanNow = Math.max(MIN_VIEW_SPAN, bottomNow - topNow);
        const totalSpan = Math.max(1, bounds.max - bounds.min);
        if (spanNow >= totalSpan - 0.001) return;
        const impulse = Math.max(-3.5, Math.min(3.5, totalDelta / 220));
        wheelPanVelocity += impulse * Math.max(0.8, spanNow * 0.022);
        if (wheelPanAnimFrame === null) {
          wheelLastTs = 0;
          wheelPanAnimFrame = requestAnimationFrame(runWheelPanInertia);
        }
        if (wheelPanSaveTimer) clearTimeout(wheelPanSaveTimer);
        wheelPanSaveTimer = setTimeout(() => {
          markUnsavedChanges();
          wheelPanSaveTimer = null;
        }, 280);
      });
    }

    function runWheelPanInertia(ts) {
      if (wheelLastTs === 0) wheelLastTs = ts;
      const dtMs = Math.max(8, Math.min(40, ts - wheelLastTs));
      wheelLastTs = ts;
      const dtNorm = dtMs / 16.6667;
      if (Math.abs(wheelPanVelocity) < 0.002) {
        wheelPanVelocity = 0;
        wheelPanAnimFrame = null;
        wheelLastTs = 0;
        syncDepthRangeInputs();
        return;
      }
      const deltaDepth = wheelPanVelocity * dtNorm;
      panDepthWindow(deltaDepth, false, false);
      // Friction decay tuned for responsive but smooth stop.
      wheelPanVelocity *= Math.pow(0.86, dtNorm);
      wheelPanAnimFrame = requestAnimationFrame(runWheelPanInertia);
    }

    function handleDepthPanInput(event) {
      wheelPanVelocity = 0;
      if (wheelPanAnimFrame !== null) {
        cancelAnimationFrame(wheelPanAnimFrame);
        wheelPanAnimFrame = null;
        wheelLastTs = 0;
      }
      const value = Number(event.target.value);
      if (!Number.isFinite(value)) return;
      const top = value;
      const bottom = num(schematic.plotSettings.bottomDepth, 5000);
      const currentTop = num(schematic.plotSettings.topDepth);
      const span = Math.max(1, bottom - currentTop);
      schematic.plotSettings.topDepth = top;
      schematic.plotSettings.bottomDepth = top + span;
      renderSchematic();
      syncDepthRangeInputs();
      markUnsavedChanges();
    }

    function syncDepthRangeInputs() {
      const topInput = document.querySelector('[data-group="plotSettings"][data-field="topDepth"]');
      const bottomInput = document.querySelector('[data-group="plotSettings"][data-field="bottomDepth"]');
      if (topInput) topInput.value = formatDepthInputDisplay(schematic.plotSettings.topDepth);
      if (bottomInput) bottomInput.value = formatDepthInputDisplay(schematic.plotSettings.bottomDepth);
      updateDepthPanControl();
    }

    function bindMenu(menuId, buttonId) {
      const menu = document.getElementById(menuId);
      const button = document.getElementById(buttonId);
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        const open = menu.classList.toggle('open');
        button.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', () => {
        menu.classList.remove('open');
        button.setAttribute('aria-expanded', 'false');
      });
      menu.addEventListener('click', event => event.stopPropagation());
    }

    

    function renderTopForms() {
      document.getElementById('wellInfoForm').innerHTML = [
        ['operator','text'], ['wellName','text'], ['field','text'], ['country','text'], ['wellType','text'], ['datum','text'],
        ['rkbM','number'], ['waterDepthM','number'], ['status','text'], ['revision','text'], ['date','date'],
      ].map(([key, type]) => fieldHtml('wellInfo', key, schematic.wellInfo[key], type)).join('');
      document.getElementById('plotSettingsForm').innerHTML = [
        ['depthUnit','text'], ['topDepth','number'], ['bottomDepth','number'], ['majorTick','number'], ['minorTick','number'], ['calloutLineColor','color'],
        ['calloutHaloEnabled','checkbox'], ['calloutHaloColor','color'], ['plotBgDay','color'], ['plotBgNight','color'],
        ['showLithology','checkbox'], ['showAnnotations','checkbox'], ['showPlotLogo','checkbox']
      ].map(([key, type]) => fieldHtml('plotSettings', key, schematic.plotSettings[key], type)).join('');
      document.getElementById('notesInput').value = schematic.notes || '';
    }

    function fieldHtml(group, key, value, type = inferInputType(key, value)) {
      const label = fieldLabels[key] || key.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());
      if (type === 'checkbox') {
        return `<label class="checkbox-row"><input data-group="${group}" data-field="${key}" type="checkbox" ${value ? 'checked' : ''}><span>${esc(label)}</span></label>`;
      }
      if (type === 'color') {
        const fallbackByKey = {
          calloutLineColor: '#AB4CE4',
          calloutHaloColor: '#ffffff',
          plotBgDay: '#ffffff',
          plotBgNight: '#6b6b6b'
        };
        const fallback = fallbackByKey[key] || '#ffffff';
        const color = colorInputValue(value, fallback);
        return `<label>${esc(label)}<input data-group="${group}" data-field="${key}" type="color" value="${esc(color)}"></label>`;
      }
      const stepAttr = type === 'number' ? ' step="any"' : '';
      const displayValue = type === 'number' && isDepthInputField(key) ? formatDepthInputDisplay(value) : (value ?? '');
      return `<label>${esc(label)}<input data-group="${group}" data-field="${key}" type="${type}"${stepAttr} value="${esc(displayValue)}"></label>`;
    }

    function isDepthInputField(field) {
      return field === 'md' || field === 'topMD' || field === 'bottomMD' || field === 'shoeMD' || field === 'annotationMD' || field === 'topDepth' || field === 'bottomDepth';
    }

    function formatDepthInputDisplay(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return value ?? '';
      const rounded = Math.round(n * 100) / 100;
      if (Math.abs(rounded - Math.round(rounded)) < 0.000001) return String(Math.round(rounded));
      return rounded.toFixed(2).replace(/\.?0+$/, '');
    }

    function inferInputType(key, value) {
      if (typeof value === 'boolean') return 'checkbox';
      if (['visible','annotationEnabled','showLithology','showAnnotations','showPlotLogo','showDepthTop','showDepthBase','calloutHaloEnabled'].includes(key)) return 'checkbox';
      if (key === 'fillColor' || key === 'color' || key === 'lineColor' || key === 'wireLineColor' || key === 'textColor' || key === 'calloutLineColor' || key === 'calloutHaloColor' || key === 'plotBgDay' || key === 'plotBgNight') return 'color';
      if (/MD$|Depth|Tick|In$|Deg$|spf|phase|rkbM|waterDepthM|Width|Length|Rotation|Thickness/.test(key)) return 'number';
      if (key === 'date') return 'date';
      return 'text';
    }

    function handleTopFormInput(event) {
      const input = event.target.closest('[data-group][data-field]');
      if (!input) return;
      schematic[input.dataset.group][input.dataset.field] = readInputValue(input);
      scheduleLiveRender({ validation: true });
    }

    function scheduleLiveRender(options = {}) {
      liveRenderNeedsValidation = liveRenderNeedsValidation || Boolean(options.validation);
      liveRenderNeedsCollections = liveRenderNeedsCollections || Boolean(options.collections);
      if (liveRenderRaf !== null) return;
      liveRenderRaf = requestAnimationFrame(() => {
        liveRenderRaf = null;
        if (liveRenderNeedsCollections) renderCollectionPanels();
        renderSchematic();
        if (liveRenderNeedsValidation) renderValidation();
        liveRenderNeedsValidation = false;
        liveRenderNeedsCollections = false;
        markUnsavedChanges();
      });
    }

    function readInputValue(input) {
      if (input.type === 'checkbox') return input.checked;
      if (input.type === 'number') return input.value === '' ? null : Number(input.value);
      return input.value;
    }

    function colorInputValue(value, fallback = '#555555') {
      const color = String(value || '').trim();
      if (/^#[0-9a-f]{6}$/i.test(color)) return color;
      if (/^#[0-9a-f]{3}$/i.test(color)) {
        return '#' + color.slice(1).split('').map(ch => ch + ch).join('');
      }
      return fallback;
    }

    function defaultFillColorForItem(collection, item = {}) {
      if (collection === 'holeSections') return '#e3dfeb';
      if (collection === 'strings') return item.type === 'liner' ? '#302711' : '#210d2a';
      if (collection === 'completion') return '#574064';
      if (collection === 'cement') return annularMaterialColor(item.material);
      if (collection === 'formations') return lithologyColor(item.lithology);
      if (collection === 'components') {
        if (item.type === 'cement_plug') return plugMaterialColor(item.material);
        return componentColor(item.type);
      }
      return '#555555';
    }

    function itemFillColor(collection, item, fallback) {
      return colorInputValue(item?.fillColor || item?.color, fallback || defaultFillColorForItem(collection, item));
    }

    function calloutStroke(selected = false) {
      if (selected) return '#def359';
      return colorInputValue(schematic?.plotSettings?.calloutLineColor, '#210d2a');
    }

    function calloutHaloStroke() {
      return colorInputValue(schematic?.plotSettings?.calloutHaloColor, '#ffffff');
    }

    function appendCalloutPath(group, d, stroke, strokeWidth = .8, opacity = .68) {
      if (schematic?.plotSettings?.calloutHaloEnabled !== false) {
        group.appendChild(el('path', {
          d,
          fill:'none',
          stroke:calloutHaloStroke(),
          'stroke-width':Math.max(1, strokeWidth + 3),
          'stroke-linecap':'round',
          'stroke-linejoin':'round',
          opacity:.72,
          'pointer-events':'none'
        }));
      }
      group.appendChild(el('path', {
        d,
        fill:'none',
        stroke,
        'stroke-width':strokeWidth,
        'stroke-linecap':'round',
        'stroke-linejoin':'round',
        opacity
      }));
    }

    function isNightModeEnabled() {
      return document.body.classList.contains('night-mode');
    }

    function currentPlotBackground() {
      const night = isNightModeEnabled();
      const configured = night
        ? schematic?.plotSettings?.plotBgNight
        : schematic?.plotSettings?.plotBgDay;
      return colorInputValue(configured, night ? '#6b6b6b' : '#ffffff');
    }

    function renderCollectionPanels() {
      Object.keys(collectionDefs).forEach(key => {
        const el = document.getElementById(`${key}List`);
        el.innerHTML = (schematic[key] || []).map((item, index) => `
          <div class="item-row ${selected && selected.collection === key && selected.id === item.id ? 'selected' : ''}" data-collection="${key}" data-id="${esc(item.id)}">
            <input type="checkbox" data-action="visible" ${item.visible !== false ? 'checked' : ''} title="Visible">
            <div class="item-main" data-action="select">
              <span class="item-label">${esc(itemTitle(item))}</span>
              <span class="item-meta">${esc(item.type || item.lithology || collectionDefs[key].singular)} | ${esc(itemDepthText(item))}</span>
            </div>
            <div class="mini-actions">
              <button type="button" data-action="up" title="Move up">&uarr;</button>
              <button type="button" data-action="down" title="Move down">&darr;</button>
              <button type="button" data-action="duplicate" title="Duplicate">Copy</button>
              <button type="button" data-action="delete" class="danger" title="Delete">Del</button>
            </div>
          </div>
        `).join('');
      });
    }

    function handleCollectionClick(event) {
      const addBtn = event.target.closest('[data-add]');
      if (addBtn) {
        openAddDialog(addBtn.dataset.add, {});
        return;
      }
      const row = event.target.closest('.item-row');
      if (!row) return;
      const collection = row.dataset.collection;
      const id = row.dataset.id;
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (action === 'select' || !action) selectItem(collection, id);
      if (action === 'visible') {
        findItem(collection, id).visible = event.target.checked;
        renderAll();
      }
      if (action === 'duplicate') duplicateItem(collection, id);
      if (action === 'delete') deleteItem(collection, id);
      if (action === 'up') moveItem(collection, id, -1);
      if (action === 'down') moveItem(collection, id, 1);
    }

    function handleCollectionDoubleClick(event) {
      const row = event.target.closest('.item-row');
      if (!row) return;
      event.preventDefault();
      selectItem(row.dataset.collection, row.dataset.id);
      openEditDialog(row.dataset.collection, row.dataset.id);
    }

    function baseItem(collection) {
      const id = makeId(collection.replace(/s$/, ''));
      if (collection === 'holeSections') return { id, label:'New hole section', diameterIn:12.25, topMD:0, bottomMD:1000, visible:true };
      if (collection === 'strings') return { id, type:'casing', label:'New casing', odIn:9.625, weight:'', wallThickness:8, topMD:0, bottomMD:1000, shoeMD:1000, annotationEnabled:true, annotationMD:null, showDepthTop:false, showDepthBase:false, color:null, visible:true };
      if (collection === 'cement') return { id, label:'New annular fill', material:'cement', insideStringId:null, outsideStringId:'', topMD:0, bottomMD:1000, annotationMD:null, showDepthTop:true, visible:true };
      if (collection === 'completion') return { id, type:'tubing', odIn:5.5, wallThickness:8, label:'New tubing', topMD:0, bottomMD:1000, annotationEnabled:true, annotationMD:null, showDepthTop:false, showDepthBase:false, visible:true };
      if (collection === 'components') return { id, type:'packer', label:'New component', md:1000, host:'', labelPosition:'top', showDepthTop:false, showDepthBase:false, visible:true };
      if (collection === 'hiddenSections') return { id, label:'Hidden section', topMD:1000, bottomMD:1200, lineType:'dashed', lineColor:'#b3b3b3', lineWidth:1, visible:true };
      if (collection === 'formations') return { id, name:'New formation', topMD:1000, bottomMD:1500, showDepthTop:true, showDepthBase:false, lithology:'sandstone', color:null, visible:true };
      return { id, targetType:'component', targetId:'', text:'New annotation', side:'right' };
    }

    function addItem(collection, overrides = {}) {
      const item = { ...baseItem(collection), ...overrides };
      if (!item.id) item.id = makeId(collection.replace(/s$/, ''));
      if (item.visible === undefined && collection !== 'annotations') item.visible = true;
      if (collection === 'hiddenSections') {
        item.label = item.label || 'Hidden section';
        const pair = [num(item.topMD), num(item.bottomMD)].sort((a, b) => a - b);
        item.topMD = pair[0];
        item.bottomMD = pair[1];
      }
      schematic[collection].push(item);
      selected = { collection, id: item.id };
      sortDepthCollections();
      renderAll();
    }

    function openAddDialog(collection, overrides = {}) {
      const draft = { ...baseItem(collection), ...overrides };
      if (!draft.id) draft.id = makeId(collection.replace(/s$/, ''));
      normalizeComponentDraft(draft);
      pendingAddDialog = { collection, draft, mode:'add' };
      document.getElementById('addDialogTitle').textContent = `Add ${collectionDefs[collection].singular}`;
      document.getElementById('addDialogSubtitle').textContent = 'Fill required inputs before plotting.';
      document.getElementById('addDialogSubmitBtn').textContent = 'Add Element';
      renderAddDialogFields();
      document.getElementById('addDialogGate').classList.remove('hidden');
      document.body.classList.add('lock-active');
    }

    function openEditDialog(collection, id) {
      const item = findItem(collection, id);
      if (!item) return;
      const draft = clone(item);
      normalizeComponentDraft(draft);
      pendingAddDialog = { collection, id, draft, mode:'edit' };
      document.getElementById('addDialogTitle').textContent = `Edit ${collectionDefs[collection].singular}`;
      document.getElementById('addDialogSubtitle').textContent = 'Update element details and apply changes.';
      document.getElementById('addDialogSubmitBtn').textContent = 'Apply Changes';
      renderAddDialogFields();
      document.getElementById('addDialogGate').classList.remove('hidden');
      document.body.classList.add('lock-active');
    }

    function closeAddDialog() {
      pendingAddDialog = null;
      document.getElementById('addDialogGate').classList.add('hidden');
      document.body.classList.remove('lock-active');
    }

    function renderAddDialogFields() {
      if (!pendingAddDialog) return;
      const { collection, draft } = pendingAddDialog;
      const fields = fieldsForDialog(collection, draft).filter(field => field !== 'id' && field !== 'type');
      const rows = [];
      if ((collection === 'strings' || collection === 'completion') && draft.odIn !== undefined) {
        rows.push(`<label>Typical Size<select data-add-field="_typicalSize">${typicalSizeOptions(draft).map(opt => `<option value="${esc(opt.value)}" ${opt.selected ? 'selected' : ''}>${esc(opt.label)}</option>`).join('')}</select></label>`);
      }
      rows.push(...fields.map(field => addDialogFieldHtml(field, draft[field])));
      document.getElementById('addDialogFields').innerHTML = rows.join('');
    }

    function addDialogFieldHtml(field, value) {
      let label = fieldLabels[field] || field.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());
      if (field === 'showDepthTop' && pendingAddDialog?.collection === 'components' && pendingAddDialog?.draft?.type === 'downhole_device_circle') {
        label = 'Label Suffix: Depth';
      }
      if (field === 'showDepthTop' && pendingAddDialog?.collection === 'components' && pendingAddDialog?.draft?.type === 'restriction_general' && String(pendingAddDialog?.draft?.labelPosition || 'top').toLowerCase() === 'middle') {
        label = 'Label Suffix: Mid Depth';
      }
      if (field === 'fillColor') {
        const color = colorInputValue(value, defaultFillColorForItem(pendingAddDialog?.collection, pendingAddDialog?.draft));
        return `<label>${esc(label)}<input data-add-field="${field}" type="color" value="${esc(color)}"></label>`;
      }
      if (field === 'lineColor' || field === 'wireLineColor') {
        const color = colorInputValue(value, '#210d2a');
        return `<label>${esc(label)}<input data-add-field="${field}" type="color" value="${esc(color)}"></label>`;
      }
      if (field === 'material') {
        const options = ['cement', 'epoxy', 'bismuth'];
        return `<label>${esc(label)}<select data-add-field="${field}">${options.map(opt => `<option value="${opt}" ${String(value || 'cement') === opt ? 'selected' : ''}>${esc(opt[0].toUpperCase() + opt.slice(1))}</option>`).join('')}</select></label>`;
      }
      if (field === 'labelPosition') {
        const options = ['top', 'middle', 'bottom'];
        return `<label>${esc(label)}<select data-add-field="${field}">${options.map(opt => `<option value="${opt}" ${String(value || 'top') === opt ? 'selected' : ''}>${esc(opt[0].toUpperCase() + opt.slice(1))}</option>`).join('')}</select></label>`;
      }
      if (field === 'lineType' || field === 'wireLineType') {
        const options = ['dashed', 'solid'];
        return `<label>${esc(label)}<select data-add-field="${field}">${options.map(opt => `<option value="${opt}" ${String(value || 'dashed') === opt ? 'selected' : ''}>${esc(opt[0].toUpperCase() + opt.slice(1))}</option>`).join('')}</select></label>`;
      }
      if (field === 'host') {
        const options = (pendingAddDialog?.collection === 'components')
          ? getComponentHostOptions(pendingAddDialog?.draft)
          : getPlottedElementOptions();
        return `<label>${esc(label)}<select data-add-field="${field}">${options.map(opt => `<option value="${esc(opt.value)}" ${String(value ?? '') === String(opt.value) ? 'selected' : ''}>${esc(opt.label)}</option>`).join('')}</select></label>`;
      }
      if (field === 'insideStringId' || field === 'outsideStringId') {
        const options = getCementBoundaryOptions(field === 'insideStringId');
        return `<label>${esc(label)}<select data-add-field="${field}">${options.map(opt => `<option value="${esc(opt.value)}" ${String(value ?? '') === String(opt.value) ? 'selected' : ''}>${esc(opt.label)}</option>`).join('')}</select></label>`;
      }
      if (field === 'text') {
        return `<label>${esc(label)}<textarea data-add-field="${field}" rows="3">${esc(value ?? '')}</textarea></label>`;
      }
      const type = inferInputType(field, value);
      if (type === 'checkbox') return `<label class="checkbox-row"><input data-add-field="${field}" type="checkbox" ${value ? 'checked' : ''}><span>${esc(label)}</span></label>`;
      const stepAttr = type === 'number' ? ' step="any"' : '';
      const displayValue = type === 'number' && isDepthInputField(field) ? formatDepthInputDisplay(value) : (value ?? '');
      return `<label>${esc(label)}<input data-add-field="${field}" type="${type}"${stepAttr} value="${esc(displayValue)}"></label>`;
    }

    function handleAddDialogChange(event) {
      if (!pendingAddDialog) return;
      const control = event.target.closest('[data-add-field]');
      if (!control) return;
      const field = control.dataset.addField;
      if (field === '_typicalSize') {
        applyTypicalSizeToDraft(control.value);
        renderAddDialogFields();
        return;
      }
      pendingAddDialog.draft[field] = readInputValue(control);
      if (field === 'type') {
        normalizeComponentDraft(pendingAddDialog.draft);
        renderAddDialogFields();
      }
    }

    function submitAddDialog(event) {
      event.preventDefault();
      if (!pendingAddDialog) return;
      const fields = document.querySelectorAll('#addDialogFields [data-add-field]');
      fields.forEach(input => {
        if (input.dataset.addField === '_typicalSize') return;
        pendingAddDialog.draft[input.dataset.addField] = readInputValue(input);
      });
      const collection = pendingAddDialog.collection;
      const draft = pendingAddDialog.draft;
      normalizeComponentDraft(draft);
      if (collection === 'hiddenSections') {
        draft.label = draft.label || 'Hidden section';
        const pair = [num(draft.topMD), num(draft.bottomMD)].sort((a, b) => a - b);
        draft.topMD = pair[0];
        draft.bottomMD = pair[1];
      }
      if (pendingAddDialog.mode === 'edit') {
        const list = schematic[collection] || [];
        const idx = list.findIndex(item => item.id === pendingAddDialog.id);
        if (idx >= 0) {
          list[idx] = draft;
          selected = { collection, id: draft.id };
          sortDepthCollections();
          renderAll();
        }
      } else {
        addItem(collection, draft);
      }
      closeAddDialog();
    }

    function typicalSizeOptions(draft) {
      const sets = [
        { value: '', label: 'Custom size' },
        { value: '30|30 in Conductor', label: '30 in conductor' },
        { value: '20|20 in Surface Casing', label: '20 in surface casing' },
        { value: '13.375|13-3/8 in Casing', label: '13-3/8 in casing' },
        { value: '9.625|9-5/8 in Production Casing', label: '9-5/8 in production casing' },
        { value: '7|7 in Liner', label: '7 in liner' },
        { value: '5.5|5-1/2 in Tubing', label: '5-1/2 in tubing' },
        { value: '4.5|4-1/2 in Tubing', label: '4-1/2 in tubing' }
      ];
      const current = `${num(draft.odIn, 0)}|${draft.label || ''}`;
      return sets.map(opt => ({ ...opt, selected: opt.value && current.startsWith(opt.value.split('|')[0] + '|') }));
    }

    function applyTypicalSizeToDraft(value) {
      if (!pendingAddDialog || !value) return;
      const [odRaw, label] = String(value).split('|');
      const od = Number(odRaw);
      if (Number.isFinite(od)) pendingAddDialog.draft.odIn = od;
      if (label) pendingAddDialog.draft.label = label;
    }

    function normalizeComponentDraft(draft) {
      if (!draft || !draft.type) return draft;
      if (draft.showDepthTop === undefined) draft.showDepthTop = false;
      if (draft.showDepthBase === undefined) draft.showDepthBase = false;
      const intervalTypes = ['cement_plug', 'perforations', 'section_mill', 'bridge_plug', 'restriction_general'];
      if (intervalTypes.includes(draft.type)) {
        if (draft.md !== undefined && (draft.topMD === undefined || draft.topMD === null || draft.topMD === '')) {
          draft.topMD = num(draft.md) - 25;
          draft.bottomMD = num(draft.md) + 25;
        }
        delete draft.md;
        if (draft.topMD === undefined || draft.topMD === null) draft.topMD = 0;
        if (draft.bottomMD === undefined || draft.bottomMD === null) draft.bottomMD = num(draft.topMD) + 100;
      }
      if (draft.type === 'cement_plug') {
        if (!draft.material) draft.material = 'cement';
        if (!draft.labelPosition) draft.labelPosition = 'top';
        if (!draft.host) draft.host = '';
      }
      if (draft.type === 'section_mill') {
        if (!draft.labelPosition) draft.labelPosition = 'top';
        if (!draft.host) draft.host = '';
      }
      if (draft.type === 'bridge_plug') {
        if (!draft.labelPosition) draft.labelPosition = 'middle';
        if (!draft.fillColor) draft.fillColor = '#ffffff';
        if (!draft.lineColor) draft.lineColor = '#210d2a';
      }
      if (draft.type === 'restriction_general') {
        if (!draft.labelPosition) draft.labelPosition = 'top';
        if (!draft.host) draft.host = '';
        if (!(num(draft.restrictionIdIn, 0) > 0)) draft.restrictionIdIn = 2;
        if (String(draft.labelPosition || 'top').toLowerCase() === 'middle') draft.showDepthBase = false;
        if (!draft.fillColor) draft.fillColor = '#ffffff';
        if (!draft.lineColor) draft.lineColor = '#210d2a';
      }
      if (draft.type === 'annular_packer') {
        if (draft.md === undefined || draft.md === null || draft.md === '') draft.md = 1000;
        if (!draft.insideStringId) draft.insideStringId = '';
        if (!draft.outsideStringId) draft.outsideStringId = '';
        if (!draft.fillColor) draft.fillColor = '#ffffff';
        if (!draft.lineColor) draft.lineColor = '#210d2a';
      }
      if (draft.type === 'perforations') {
        if (!(num(draft.perfLength, 0) > 0)) draft.perfLength = 18;
        if (!draft.fillColor) draft.fillColor = '#ffffff';
        if (!draft.lineColor) draft.lineColor = '#210d2a';
        if (!(num(draft.lineWidth, 0) > 0)) draft.lineWidth = 1;
      }
      if (draft.type === 'downhole_device_circle') {
        if (draft.md === undefined || draft.md === null || draft.md === '') draft.md = 0;
        if (!(num(draft.diameterIn, 0) > 0)) draft.diameterIn = 2;
        if (!draft.fillColor) draft.fillColor = '#ffffff';
        if (!draft.lineColor) draft.lineColor = '#210d2a';
        if (!(num(draft.lineWidth, 0) > 0)) draft.lineWidth = 1.2;
        draft.lineType = String(draft.lineType || 'solid').toLowerCase() === 'dashed' ? 'dashed' : 'solid';
        draft.wireToSurface = draft.wireToSurface === true;
        if (!draft.wireLineColor) draft.wireLineColor = '#210d2a';
        if (!(num(draft.wireLineWidth, 0) > 0)) draft.wireLineWidth = 1;
        draft.wireLineType = String(draft.wireLineType || 'solid').toLowerCase() === 'dashed' ? 'dashed' : 'solid';
        if (draft.text === undefined || draft.text === null) draft.text = '';
        if (!draft.textColor) draft.textColor = '#210d2a';
        if (!Number.isFinite(num(draft.textRotationDeg, NaN))) draft.textRotationDeg = 0;
      }
      if (draft.type === 'downhole_device_rectangle') {
        if (draft.md !== undefined && (draft.topMD === undefined || draft.topMD === null || draft.topMD === '')) {
          draft.topMD = num(draft.md) - 50;
          draft.bottomMD = num(draft.md) + 50;
        }
        delete draft.md;
        if (draft.topMD === undefined || draft.topMD === null) draft.topMD = 0;
        if (draft.bottomMD === undefined || draft.bottomMD === null) draft.bottomMD = num(draft.topMD) + 100;
        if (!(num(draft.diameterIn, 0) > 0)) draft.diameterIn = 2;
        if (!draft.fillColor) draft.fillColor = '#ffffff';
        if (!draft.lineColor) draft.lineColor = '#210d2a';
        if (!(num(draft.lineWidth, 0) > 0)) draft.lineWidth = 1.2;
        draft.lineType = String(draft.lineType || 'solid').toLowerCase() === 'dashed' ? 'dashed' : 'solid';
        draft.wireToSurface = draft.wireToSurface === true;
        if (!draft.wireLineColor) draft.wireLineColor = '#210d2a';
        if (!(num(draft.wireLineWidth, 0) > 0)) draft.wireLineWidth = 1;
        draft.wireLineType = String(draft.wireLineType || 'solid').toLowerCase() === 'dashed' ? 'dashed' : 'solid';
        if (draft.text === undefined || draft.text === null) draft.text = '';
        if (!draft.textColor) draft.textColor = '#210d2a';
        if (!Number.isFinite(num(draft.textRotationDeg, NaN))) draft.textRotationDeg = 0;
      }
      return draft;
    }

    function fieldsForDialog(collection, draft) {
      if (collection !== 'components') return collectionDefs[collection].fields;
      const common = ['id','type','label'];
      if (draft.type === 'cement_plug') return [...common, 'topMD','bottomMD','host','material','labelPosition','showDepthTop','showDepthBase','fillColor','visible'];
      if (draft.type === 'section_mill') return [...common, 'topMD','bottomMD','host','labelPosition','showDepthTop','showDepthBase','fillColor','visible'];
      if (draft.type === 'bridge_plug') return [...common, 'topMD','bottomMD','host','labelPosition','showDepthTop','showDepthBase','fillColor','lineColor','visible'];
      if (draft.type === 'restriction_general') {
        const isMiddle = String(draft.labelPosition || 'top').toLowerCase() === 'middle';
        return isMiddle
          ? [...common, 'topMD','bottomMD','host','restrictionIdIn','labelPosition','showDepthTop','fillColor','lineColor','visible']
          : [...common, 'topMD','bottomMD','host','restrictionIdIn','labelPosition','showDepthTop','showDepthBase','fillColor','lineColor','visible'];
      }
      if (draft.type === 'annular_packer') return [...common, 'md','insideStringId','outsideStringId','showDepthTop','fillColor','lineColor','visible'];
      if (draft.type === 'perforations') return [...common, 'topMD','bottomMD','host','showDepthTop','showDepthBase','status','perfLength','fillColor','lineColor','lineWidth','visible'];
      if (draft.type === 'downhole_device_circle') return [...common, 'md','diameterIn','host','showDepthTop','lineColor','lineWidth','lineType','fillColor','text','textColor','wireToSurface','wireLineColor','wireLineWidth','wireLineType','visible'];
      if (draft.type === 'downhole_device_rectangle') return [...common, 'topMD','bottomMD','diameterIn','host','showDepthTop','showDepthBase','lineColor','lineWidth','lineType','fillColor','text','textColor','textRotationDeg','wireToSurface','wireLineColor','wireLineWidth','wireLineType','visible'];
      if (draft.type === 'td') return [...common, 'md','showDepthTop','showDepthBase','fillColor','visible'];
      if (['pbtd','cut_point','packer','mechanical_plug','tubing_plug','dhsv','sleeve','mandrel','nipple'].includes(draft.type)) {
        return [...common, 'md','host','showDepthTop','showDepthBase','fillColor','visible'];
      }
      return collectionDefs[collection].fields;
    }

    function selectItem(collection, id) {
      selected = { collection, id };
      renderCollectionPanels();
      renderProperties();
      renderSchematic();
      setSidebarTab('element');
    }

    function deselectItem() {
      if (!selected) return;
      selected = null;
      renderCollectionPanels();
      renderProperties();
      renderSchematic();
    }

    function findItem(collection, id) {
      return (schematic[collection] || []).find(item => item.id === id);
    }

    function duplicateItem(collection, id) {
      const item = clone(findItem(collection, id));
      item.id = makeId(item.id || collection);
      if (item.label) item.label += ' Copy';
      if (item.name) item.name += ' Copy';
      schematic[collection].push(item);
      selected = { collection, id: item.id };
      renderAll();
    }

    function deleteItem(collection, id) {
      schematic[collection] = schematic[collection].filter(item => item.id !== id);
      if (selected && selected.collection === collection && selected.id === id) selected = null;
      renderAll();
    }

    function moveItem(collection, id, delta) {
      const list = schematic[collection];
      const idx = list.findIndex(item => item.id === id);
      const next = idx + delta;
      if (idx < 0 || next < 0 || next >= list.length) return;
      [list[idx], list[next]] = [list[next], list[idx]];
      renderAll();
    }

    function renderProperties() {
      const panel = document.getElementById('propertiesPanel');
      if (!selected) {
        panel.innerHTML = '<div class="properties-empty">Select an item in a table or click a schematic element to edit its properties.</div>';
        document.getElementById('selectionStatus').textContent = 'No element selected';
        return;
      }
      const item = findItem(selected.collection, selected.id);
      if (!item) { selected = null; renderProperties(); return; }
      document.getElementById('selectionStatus').textContent = `${collectionDefs[selected.collection].singular}: ${itemTitle(item)}`;
      const fields = fieldsForDialog(selected.collection, item)
        .filter(field => field !== 'id' && field !== 'type')
        .filter(field => item[field] !== undefined || ['label','name','visible'].includes(field));
      panel.innerHTML = `
        <p class="selected-path">${esc(collectionDefs[selected.collection].title)} / ${esc(itemTitle(item))}</p>
        <div class="form-grid">${fields.map(field => propertyFieldHtml(field, item[field])).join('')}</div>
        <div class="toolbar-row">
          <button type="button" data-prop-action="duplicate">Duplicate</button>
          <button type="button" data-prop-action="delete" class="danger">Delete</button>
        </div>
      `;
    }

    function propertyFieldHtml(field, value) {
      let label = fieldLabels[field] || field.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());
      if (field === 'showDepthTop' && selected?.collection === 'components') {
        const currentItem = findItem(selected.collection, selected.id);
        if (currentItem?.type === 'downhole_device_circle') label = 'Label Suffix: Depth';
        if (currentItem?.type === 'restriction_general' && String(currentItem?.labelPosition || 'top').toLowerCase() === 'middle') label = 'Label Suffix: Mid Depth';
      }
      if (field === 'fillColor') {
        const item = selected ? findItem(selected.collection, selected.id) : null;
        const color = colorInputValue(value, defaultFillColorForItem(selected?.collection, item));
        return `<label>${esc(label)}<input data-prop="${field}" type="color" value="${esc(color)}"></label>`;
      }
      if (field === 'lineColor' || field === 'wireLineColor') {
        const color = colorInputValue(value, '#210d2a');
        return `<label>${esc(label)}<input data-prop="${field}" type="color" value="${esc(color)}"></label>`;
      }
      if (field === 'material') {
        const options = ['cement', 'epoxy', 'bismuth'];
        return `<label>${esc(label)}<select data-prop="${field}">${options.map(opt => `<option value="${opt}" ${String(value || 'cement') === opt ? 'selected' : ''}>${esc(opt[0].toUpperCase() + opt.slice(1))}</option>`).join('')}</select></label>`;
      }
      if (field === 'labelPosition') {
        const options = ['top', 'middle', 'bottom'];
        return `<label>${esc(label)}<select data-prop="${field}">${options.map(opt => `<option value="${opt}" ${String(value || 'top') === opt ? 'selected' : ''}>${esc(opt[0].toUpperCase() + opt.slice(1))}</option>`).join('')}</select></label>`;
      }
      if (field === 'lineType' || field === 'wireLineType') {
        const options = ['dashed', 'solid'];
        return `<label>${esc(label)}<select data-prop="${field}">${options.map(opt => `<option value="${opt}" ${String(value || 'dashed') === opt ? 'selected' : ''}>${esc(opt[0].toUpperCase() + opt.slice(1))}</option>`).join('')}</select></label>`;
      }
      if (field === 'host') {
        const currentItem = selected ? findItem(selected.collection, selected.id) : null;
        const options = selected?.collection === 'components'
          ? getComponentHostOptions(currentItem)
          : getPlottedElementOptions();
        return `<label>${esc(label)}<select data-prop="${field}">${options.map(opt => `<option value="${esc(opt.value)}" ${String(value ?? '') === String(opt.value) ? 'selected' : ''}>${esc(opt.label)}</option>`).join('')}</select></label>`;
      }
      if (field === 'insideStringId' || field === 'outsideStringId') {
        const options = getCementBoundaryOptions(field === 'insideStringId');
        return `<label>${esc(label)}<select data-prop="${field}">${options.map(opt => `<option value="${esc(opt.value)}" ${String(value ?? '') === String(opt.value) ? 'selected' : ''}>${esc(opt.label)}</option>`).join('')}</select></label>`;
      }
      if (field === 'text') {
        return `<label>${esc(label)}<textarea data-prop="${field}" rows="4">${esc(value ?? '')}</textarea></label>`;
      }
      const type = inferInputType(field, value);
      if (type === 'checkbox') return `<label class="checkbox-row"><input data-prop="${field}" type="checkbox" ${value ? 'checked' : ''}><span>${esc(label)}</span></label>`;
      const stepAttr = type === 'number' ? ' step="any"' : '';
      const displayValue = type === 'number' && isDepthInputField(field) ? formatDepthInputDisplay(value) : (value ?? '');
      return `<label>${esc(label)}<input data-prop="${field}" type="${type}"${stepAttr} value="${esc(displayValue)}"></label>`;
    }

    function getPlottedElementOptions() {
      const rows = [{ value: '', label: 'None' }];
      const buckets = [
        ['String', schematic.strings || []],
        ['Completion', schematic.completion || []],
        ['Hole', schematic.holeSections || []],
        ['Component', schematic.components || []],
        ['Formation', schematic.formations || []],
        ['Cement', schematic.cement || []]
      ];
      buckets.forEach(([kind, list]) => {
        list.filter(item => item.visible !== false).forEach(item => {
          rows.push({
            value: item.id,
            label: `${kind}: ${itemTitle(item)} (${item.id})`
          });
        });
      });
      return rows;
    }

    function getTubularHostOptions(allowNone = true) {
      const rows = allowNone ? [{ value: '', label: 'None' }] : [];
      (schematic.strings || []).filter(item => item.visible !== false).forEach(item => {
        rows.push({ value: item.id, label: `String: ${itemTitle(item)} (${item.id})` });
      });
      (schematic.completion || []).filter(item => item.visible !== false).forEach(item => {
        rows.push({ value: item.id, label: `Completion: ${itemTitle(item)} (${item.id})` });
      });
      return rows;
    }

    function getBoreHostOptions(allowNone = true) {
      const rows = getTubularHostOptions(allowNone);
      (schematic.holeSections || []).filter(item => item.visible !== false).forEach(item => {
        rows.push({ value: `hole:${item.id}`, label: `Open hole: ${itemTitle(item)} (${item.id})` });
      });
      return rows;
    }

    function getComponentHostOptions(componentDraft) {
      const type = String(componentDraft?.type || '').toLowerCase();
      const tubularHostTypes = new Set([
        'cement_plug', 'section_mill', 'bridge_plug', 'packer', 'mechanical_plug',
        'tubing_plug', 'dhsv', 'sleeve', 'mandrel', 'nipple', 'perforations', 'restriction_general',
        'downhole_device_circle', 'downhole_device_rectangle'
      ]);
      const boreHostTypes = new Set(['cement_plug', 'section_mill', 'bridge_plug']);
      if (boreHostTypes.has(type)) return getBoreHostOptions(true);
      if (tubularHostTypes.has(type)) return getTubularHostOptions(true);
      return getPlottedElementOptions();
    }

    function getCementBoundaryOptions(allowNone) {
      const rows = [];
      if (allowNone) rows.push({ value: '', label: 'None (well centerline)' });
      (schematic.strings || []).filter(item => item.visible !== false).forEach(item => {
        rows.push({ value: item.id, label: `Tubular: ${itemTitle(item)} (${item.id})` });
      });
      (schematic.holeSections || []).filter(item => item.visible !== false).forEach(item => {
        rows.push({ value: `hole:${item.id}`, label: `Open hole: ${itemTitle(item)} (${item.id})` });
      });
      return rows;
    }

    function handlePropertyInput(event) {
      const input = event.target.closest('[data-prop]');
      if (!input || !selected) return;
      const item = findItem(selected.collection, selected.id);
      const field = input.dataset.prop;
      item[field] = readInputValue(input);
      if ((selected.collection === 'strings' || selected.collection === 'completion') && field === 'wallThickness') {
        item.wallThickness = normalizeTubularWallThickness(item.wallThickness);
      }
      if (selected.collection === 'components') normalizeComponentDraft(item);
      if (field === 'type' || field === 'material' || field === 'host' || field === 'insideStringId' || field === 'outsideStringId') {
        // These can change what fields/options are shown; safe to rebuild panel.
        renderProperties();
      }
      scheduleLiveRender({ collections: true, validation: true });
    }

    function handlePropertyClick(event) {
      const btn = event.target.closest('[data-prop-action]');
      if (!btn || !selected) return;
      if (btn.dataset.propAction === 'duplicate') duplicateItem(selected.collection, selected.id);
      if (btn.dataset.propAction === 'delete') deleteItem(selected.collection, selected.id);
    }

    function sortDepthCollections() {
      ['holeSections','strings','cement','completion','components','hiddenSections','formations'].forEach(key => {
        schematic[key].sort((a, b) => depthStart(a) - depthStart(b));
      });
    }

    function depthStart(item) { return num(item.topMD, num(item.md, 0)); }

    function fitDepthRange() {
      if (!applyFitDepthWindowToPlotSettings()) return;
      renderAll();
    }

    function applyFitDepthWindowToPlotSettings() {
      const all = ['holeSections','strings','cement','completion','components','formations']
        .flatMap(key => (schematic[key] || []).filter(viz));
      const tops = all.map(depthStart).filter(Number.isFinite);
      const bottoms = all.map(item => num(item.bottomMD, num(item.md, 0))).filter(Number.isFinite);
      if (!tops.length || !bottoms.length) return false;
      const minTop = Math.min(...tops);
      const maxBottom = Math.max(...bottoms);
      const span = Math.max(MIN_VIEW_SPAN, maxBottom - minTop);
      const pad = Math.max(0, Math.min(FIT_DEPTH_PAD_MAX, span * FIT_DEPTH_PAD_FACTOR));
      schematic.plotSettings.topDepth = minTop - pad;
      schematic.plotSettings.bottomDepth = maxBottom + pad;
      const ticks = resolveDepthTicks(num(schematic.plotSettings.topDepth), num(schematic.plotSettings.bottomDepth), true);
      schematic.plotSettings.minorTick = ticks.minor;
      schematic.plotSettings.majorTick = ticks.major;
      return true;
    }

    function adjustVerticalScale(multiplier) {
      const current = clampVerticalScale(schematic.plotSettings.verticalScale);
      const next = clampVerticalScale(current * multiplier);
      schematic.plotSettings.verticalScale = Math.round(next * 1000) / 1000;
      const top = num(schematic.plotSettings.topDepth);
      const bottom = num(schematic.plotSettings.bottomDepth, 5000);
      const span = Math.max(MIN_VIEW_SPAN, bottom - top);
