          }, 6, 12);
          appendGrabberHandle(g, {
            cx:textX - 16,
            cy:label.labelY,
            fill:'#def359',
            stroke:'#210d2a',
            'stroke-width':1.2,
            class:'callout-drag-handle',
            'data-callout-drag-id':label.id,
            'data-callout-drag-collection':label.collection
          }, 6, 12);
        }
        svg.appendChild(g);
      });
    }

    function collectAutoLabels(cx, top, bottom, margin, plotHeight) {
      const labels = [];
      const add = (collection, item, text, md, anchorOffset) => {
        if (!item || !text) return;
        const anchorMd = resolveCalloutAnchorMd(item, md, top, bottom);
        if (!Number.isFinite(anchorMd)) return;
        labels.push({
          collection,
          id:item.id,
          text,
          anchorY:mdToY(anchorMd, top, bottom, margin, plotHeight),
          anchorX:cx + anchorOffset,
          preferredY: Number.isFinite(num(item.manualLabelY, NaN)) ? num(item.manualLabelY) : mdToY(anchorMd, top, bottom, margin, plotHeight),
          locked: item.labelLocked === true
        });
      };
      schematic.strings.filter(viz).forEach(item => {
        if (item.annotationEnabled === false) return;
        const width = diameterToWidth(item.odIn);
        const midMd = item.annotationMD === null || item.annotationMD === undefined || item.annotationMD === '' ? (num(item.topMD) + num(item.bottomMD)) / 2 : num(item.annotationMD);
        add('strings', item, labelWithDepthSuffix(item, item.label || item.id), midMd, width / 2 + 1);
      });
      schematic.completion.filter(viz).forEach(item => {
        if (item.annotationEnabled === false) return;
        const width = diameterToWidth(item.odIn);
        const midMd = item.annotationMD === null || item.annotationMD === undefined || item.annotationMD === '' ? (num(item.topMD) + num(item.bottomMD)) / 2 : num(item.annotationMD);
        add('completion', item, labelWithDepthSuffix(item, item.label || item.id), midMd, width / 2 + 1);
      });
      schematic.components.filter(viz).forEach(item => {
        if (['td', 'pbtd', 'cement_plug', 'section_mill', 'bridge_plug', 'restriction_general'].includes(item.type)) return;
        const md = item.annotationMD === null || item.annotationMD === undefined || item.annotationMD === ''
          ? (item.md !== undefined ? item.md : (num(item.topMD) + num(item.bottomMD)) / 2)
          : num(item.annotationMD);
        add('components', item, labelWithDepthSuffix(item, item.label || item.type || item.id), md, componentCalloutAnchorOffset(item));
      });
      return labels;
    }

    function drawAnnotations(svg, cx, lithX, width, top, bottom, margin, plotHeight, occupied = []) {
      const textX = computeCalloutLabelX(cx, lithX, width);
      const lineEndX = textX - 8;
      const notes = schematic.annotations.map((note) => {
        const target = findAnnotationTarget(note);
        if (!target) return null;
        const preferredMd = Number.isFinite(num(note.anchorMD, NaN))
          ? num(note.anchorMD)
          : (target.md !== undefined ? num(target.md) : ((num(target.topMD) + num(target.bottomMD)) / 2));
        const targetMd = resolveCalloutAnchorMd(target, preferredMd, top, bottom);
        if (!Number.isFinite(targetMd)) return null;
        const y = mdToY(targetMd, top, bottom, margin, plotHeight);
        return { note, y };
      }).filter(Boolean).sort((a, b) => a.y - b.y);
      const laneTop = margin.top + 12;
      const laneBottom = margin.top + plotHeight - 10;
      const labelDrafts = notes.map(({ note, y }) => ({
        note,
        anchorY: y,
        preferredY: Number.isFinite(num(note.manualLabelY, NaN)) ? num(note.manualLabelY) : (y + num(note.labelOffsetY, 0)),
        locked: note.labelLocked === true
      }));
      assignLabelLanePositions(labelDrafts, laneTop, laneBottom, 15, occupied);
      labelDrafts.forEach(({ note, anchorY, labelY }) => {
        const g = makeGroup('annotations', note);
        g.setAttribute('data-callout-drag-id', note.id);
        g.setAttribute('data-callout-drag-collection', 'annotations');
        const stroke = calloutStroke(isSelected('annotations', note.id));
        appendCalloutPath(g, routedLabelPath(cx + 82, anchorY, labelY, lineEndX - 120, lineEndX), stroke, 1, .72);
        g.appendChild(el('circle', {
          cx:cx + 82,
          cy:anchorY,
          r:3,
          fill:stroke,
          class:'callout-drag-handle',
          'data-callout-drag-id':note.id,
          'data-callout-drag-collection':'annotations'
        }));
        g.appendChild(el('text', {
          x:textX,
          y:labelY,
          fill:'currentColor',
          'font-size':10,
          'text-anchor':'start',
          'dominant-baseline':'middle',
          class:'annotation-label callout-drag-handle',
          'data-id':note.id,
          'data-callout-drag-id':note.id,
          'data-callout-drag-collection':'annotations'
        }, note.text || note.id));
        if (isSelected('annotations', note.id)) {
          appendGrabberHandle(g, {
            cx:cx + 82,
            cy:anchorY,
            fill:'#def359',
            stroke:'#210d2a',
            'stroke-width':1.2,
            class:'callout-anchor-handle',
            'data-callout-anchor-id':note.id,
            'data-callout-anchor-collection':'annotations'
          }, 6, 12);
          appendGrabberHandle(g, {
            cx:textX - 16,
            cy:labelY,
            fill:'#def359',
            stroke:'#210d2a',
            'stroke-width':1.2,
            class:'callout-drag-handle',
            'data-callout-drag-id':note.id,
            'data-callout-drag-collection':'annotations'
          }, 6, 12);
        }
        g.appendChild(el('rect', {
          x: Math.min(cx + 82, textX) - 8,
          y: Math.min(anchorY, labelY) - 8,
          width: Math.max(24, Math.abs(textX - (cx + 82)) + 16),
          height: Math.max(18, Math.abs(labelY - anchorY) + 16),
          fill: 'transparent',
          class: 'callout-drag-handle',
          'data-callout-drag-id': note.id,
          'data-callout-drag-collection': 'annotations'
        }));
        svg.appendChild(g);
      });
    }

    function openInlineAnnotationEditor(annotationId, textNode) {
      const note = (schematic.annotations || []).find(a => a.id === annotationId);
      if (!note || !textNode) return;
      openInlineTextEditor(textNode, note.text || '', 'Edit annotation text', (nextValue) => {
        const current = (schematic.annotations || []).find(a => a.id === annotationId);
        if (!current) return;
        current.text = nextValue;
        renderSchematic();
        renderCollectionPanels();
        if (selected && selected.collection === 'annotations' && selected.id === annotationId) renderProperties();
        markUnsavedChanges();
      });
    }

    function openInlineItemEditor(collection, id, field, textNode) {
      const item = findItem(collection, id);
      if (!item || !textNode) return;
      const currentText = item[field] || '';
      openInlineTextEditor(textNode, currentText, 'Edit label', (nextValue) => {
        const target = findItem(collection, id);
        if (!target) return;
        target[field] = nextValue;
        renderSchematic();
        renderCollectionPanels();
        if (selected && selected.collection === collection && selected.id === id) renderProperties();
        markUnsavedChanges();
      });
    }

    function openInlineTextEditor(textNode, value, ariaLabel, onCommit) {
      closeInlineAnnotationEditor();
      const rect = textNode.getBoundingClientRect();
      const input = document.createElement('input');
      input.type = 'text';
      input.value = value || '';
      input.setAttribute('aria-label', ariaLabel);
      input.style.position = 'fixed';
      input.style.left = `${Math.max(8, rect.left - 240)}px`;
      input.style.top = `${Math.max(8, rect.top - 8)}px`;
      input.style.width = `${Math.max(220, rect.width + 28)}px`;
      input.style.height = '26px';
      input.style.padding = '3px 6px';
      input.style.border = '1px solid var(--field-border)';
      input.style.borderRadius = '4px';
      input.style.background = 'var(--field-bg)';
      input.style.color = 'var(--field-text)';
      input.style.zIndex = '1300';
      let committed = false;
      const commit = () => {
        if (committed) return;
        committed = true;
        onCommit(input.value);
      };
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          commit();
          closeInlineAnnotationEditor();
        } else if (event.key === 'Escape') {
          event.preventDefault();
          closeInlineAnnotationEditor();
        }
      });
      input.addEventListener('blur', () => {
        commit();
        closeInlineAnnotationEditor();
      });
      document.body.appendChild(input);
      inlineAnnotationEditor = input;
      requestAnimationFrame(() => {
        input.focus();
        input.select();
      });
    }

    function closeInlineAnnotationEditor() {
      if (!inlineAnnotationEditor) return;
      const node = inlineAnnotationEditor;
      inlineAnnotationEditor = null;
      if (document.body.contains(node)) node.remove();
    }

    function assignLabelLanePositions(labels, laneTop, laneBottom, minGap, occupied = []) {
      const occupiedCopy = [...occupied].filter(Number.isFinite);
      labels.forEach(label => {
        const preferredY = Number.isFinite(num(label.preferredY, NaN)) ? num(label.preferredY) : num(label.anchorY);
        const y = label.locked
          ? Math.max(laneTop, Math.min(laneBottom, preferredY))
          : avoidReservedBands(preferredY, minGap, occupiedCopy, laneBottom, laneTop);
        label.labelY = Math.max(laneTop, Math.min(laneBottom, y));
        occupiedCopy.push(label.labelY);
      });
      labels.forEach(label => occupied.push(label.labelY));
    }

    function avoidReservedBands(y, minGap, reserved, laneBottom, laneTop = 0) {
      const reservedBands = reserved.filter(Number.isFinite);
      const isFree = (candidate) => reservedBands.every(r => Math.abs(candidate - r) >= minGap);
      const clamped = Math.max(laneTop, Math.min(laneBottom, y));
      if (isFree(clamped)) return clamped;
      const maxDistance = Math.ceil(Math.max(clamped - laneTop, laneBottom - clamped));
      for (let distance = 1; distance <= maxDistance; distance += 1) {
        const up = clamped - distance;
        const down = clamped + distance;
        if (up >= laneTop && isFree(up)) return up;
        if (down <= laneBottom && isFree(down)) return down;
      }
      return clamped;
    }

    function routedLabelPath(anchorX, anchorY, labelY, kneeX, labelX) {
      const left = Math.min(anchorX, labelX);
      const right = Math.max(anchorX, labelX);
      const clampedKnee = Math.max(left + 2, Math.min(right - 2, kneeX));
      if (Math.abs(anchorY - labelY) < 5) return `M ${anchorX} ${anchorY} H ${clampedKnee} H ${labelX}`;
      return `M ${anchorX} ${anchorY} L ${clampedKnee} ${labelY} H ${labelX}`;
    }

    function computeCalloutLabelX(cx, lithX, width, widestHalf = null) {
      const maxRight = width - 92;
      const half = Number.isFinite(widestHalf) ? widestHalf : getMaxRenderedHalfWidth();
      const wellRight = cx + Math.max(half, 24);
      const dynamicGap = Math.max(22, Math.min(72, half * 0.28));
      const preferred = wellRight + dynamicGap;
      return Math.min(maxRight, preferred);
    }

    function findAnnotationTarget(note) {
      if (note.targetType === 'component') return schematic.components.find(c => c.id === note.targetId);
      if (note.targetType === 'string') return schematic.strings.find(s => s.id === note.targetId);
      return schematic.components.find(c => c.id === note.targetId) || schematic.strings.find(s => s.id === note.targetId);
    }

    function drawLegend(svg, width, margin) {
      if (width < 900) return;
      const x = width - 190;
      const y = margin.top + 8;
      svg.appendChild(el('text', { x, y, fill:'currentColor', 'font-size':10, 'font-weight':700 }, 'Legend'));
      [
        ['Hole', '#e3dfeb'], ['Annular fill', '#555555'], ['Casing / liner', '#210d2a'], ['Plug / packer', '#302711'], ['Selection', '#def359']
      ].forEach((row, i) => {
        const yy = y + 18 + i * 18;
        svg.appendChild(el('rect', { x, y:yy - 9, width:18, height:10, fill:row[1], opacity: row[0] === 'Cement' ? .4 : 1, stroke:'currentColor', 'stroke-width':.5 }));
        svg.appendChild(el('text', { x:x + 25, y:yy, fill:'currentColor', 'font-size':10 }, row[0]));
      });
    }

    function exportJson() {
      downloadBlob(JSON.stringify(schematic, null, 2), filenameBase() + '_well_schematic.json', 'application/json');
      markSavedChanges();
    }

    function importJson(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      file.text().then(text => {
        try {
          const parsed = JSON.parse(text);
          if (!parsed || parsed.schemaVersion !== '1.0') throw new Error('Expected schemaVersion "1.0".');
          parsed.wellInfo = parsed.wellInfo || {};
          parsed.plotSettings = { ...defaultSchematic().plotSettings, ...(parsed.plotSettings || {}) };
          parsed.notes = parsed.notes || '';
          schematic = normalizeSchematic(parsed);
          selected = null;
          renderAll(false);
          markSavedChanges();
        } catch (err) {
          alert(`Schematic JSON import failed: ${err.message || err}`);
        } finally {
          event.target.value = '';
        }
      });
    }

    async function exportSvg() {
      const source = await getSerializedSvg(true);
      downloadBlob(source, filenameBase() + '_well_schematic.svg', 'image/svg+xml');
      markSavedChanges();
    }

    async function exportPng() {
      const source = await getSerializedSvg(true);
      const svg = document.getElementById('schematicSvg');
      const viewBox = svg.viewBox.baseVal;
      const img = new Image();
      const url = URL.createObjectURL(new Blob([source], { type:'image/svg+xml' }));
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = Math.ceil(viewBox.width * 2);
          canvas.height = Math.ceil(viewBox.height * 2);
          const ctx = canvas.getContext('2d');
          if (!ctx) throw new Error('Canvas context unavailable');
          ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--plot-bg').trim() || '#fff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob(blob => {
            if (blob) downloadBlob(blob, filenameBase() + '_well_schematic.png', 'image/png');
            else alert('PNG export failed: browser could not encode canvas. Try SVG export.');
            markSavedChanges();
          }, 'image/png');
        } catch (err) {
          URL.revokeObjectURL(url);
          alert(`PNG export failed: ${err?.message || err}`);
        }
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        alert('PNG export failed in this browser. SVG export is still available.');
      };
      img.src = url;
    }

    async function exportPdf() {
      try {
        const source = await getSerializedSvg(true);
        const svg = document.getElementById('schematicSvg');
        const viewBox = svg.viewBox.baseVal;
        const title = `${filenameBase()}_well_schematic`;
        const html = `<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>${esc(title)}</title>
  <style>
    @page { size: ${Math.max(1, Math.floor(viewBox.width))}px ${Math.max(1, Math.floor(viewBox.height))}px; margin: 0; }
    html, body {
      margin: 0;
      padding: 0;
      width: ${Math.max(1, Math.floor(viewBox.width))}px;
      height: ${Math.max(1, Math.floor(viewBox.height))}px;
      background: #fff;
      overflow: hidden;
    }
    .sheet {
      width: ${Math.max(1, Math.floor(viewBox.width))}px;
      height: ${Math.max(1, Math.floor(viewBox.height))}px;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .sheet svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div class="sheet">${source}</div>
</body>
 </html>`;
        const frame = document.createElement('iframe');
        frame.style.position = 'fixed';
        frame.style.right = '0';
        frame.style.bottom = '0';
        frame.style.width = '0';
        frame.style.height = '0';
        frame.style.border = '0';
        frame.setAttribute('aria-hidden', 'true');
        document.body.appendChild(frame);
        const frameWin = frame.contentWindow;
        const doc = frame.contentDocument || frameWin?.document;
        if (!frameWin || !doc) throw new Error('Unable to initialize print frame.');
        doc.open();
        doc.write(html);
        doc.close();
        frameWin.addEventListener('afterprint', () => {
          frame.remove();
        }, { once: true });
        frameWin.addEventListener('load', () => {
          setTimeout(() => {
            frameWin.focus();
            frameWin.print();
          }, 50);
        }, { once: true });
        markSavedChanges();
      } catch (err) {
        alert(`PDF export failed: ${err.message || err}`);
      }
    }

    async function getSerializedSvg(inlineExternalImages = false) {
      const svg = document.getElementById('schematicSvg').cloneNode(true);
      svg.setAttribute('xmlns', SVG_NS);
      if (inlineExternalImages) await inlineSvgImages(svg);
      const style = document.createElementNS(SVG_NS, 'style');
      const isNight = isNightModeEnabled();
      const bg = currentPlotBackground();
      style.textContent = `svg{font-family:Arial,sans-serif;background:${bg};color:${isNight ? '#f2eaf8' : '#210d2a'};--plot-bg:${bg}}`;
      svg.insertBefore(style, svg.firstChild);
      return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
    }

    async function inlineSvgImages(svgNode) {
      const images = Array.from(svgNode.querySelectorAll('image'));
      for (const img of images) {
        const href = img.getAttribute('href') || img.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
        if (!href || href.startsWith('data:')) continue;
        try {
          const response = await fetch(href, { mode: 'cors' });
          if (!response.ok) continue;
          const blob = await response.blob();
          const dataUrl = await blobToDataUrl(blob);
          img.setAttribute('href', dataUrl);
          img.removeAttributeNS('http://www.w3.org/1999/xlink', 'href');
        } catch (_) {
          // Keep original href on failure; browser may still render it.
        }
      }
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(String(fr.result || ''));
        fr.onerror = () => reject(fr.error || new Error('FileReader failed'));
        fr.readAsDataURL(blob);
      });
    }

    function downloadBlob(content, filename, type) {
      const blob = content instanceof Blob ? content : new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 300);
    }

    function filenameBase() {
      return String(schematic.wellInfo.wellName || 'well_schematic').replace(/[^a-z0-9_-]+/gi, '_').replace(/^_+|_+$/g, '') || 'well_schematic';
    }

    function isNightByTime() {
      const h = new Date().getHours();
      return h >= 19 || h < 6;
    }
    function getNextThemeBoundary(fromDate = new Date()) {
      const six = new Date(fromDate); six.setHours(6,0,0,0);
      const nineteen = new Date(fromDate); nineteen.setHours(19,0,0,0);
      if (fromDate < six) return six.getTime();
      if (fromDate < nineteen) return nineteen.getTime();
      six.setDate(six.getDate() + 1);
      return six.getTime();
    }
    function readThemeOverride() {
      try {
        const parsed = JSON.parse(localStorage.getItem(THEME_OVERRIDE_KEY) || 'null');
        if (!parsed || typeof parsed.enabled !== 'boolean' || !Number.isFinite(parsed.expiresAt)) return null;
        return parsed;
      } catch (err) { return null; }
    }
    function resolveNightModePreference() {
      const override = readThemeOverride();
      if (override && override.expiresAt > Date.now()) return override.enabled;
      try { localStorage.removeItem(THEME_OVERRIDE_KEY); } catch (err) {}
      return isNightByTime();
    }
    function setNightModeOverride(enabled) {
      try { localStorage.setItem(THEME_OVERRIDE_KEY, JSON.stringify({ enabled:Boolean(enabled), expiresAt:getNextThemeBoundary(new Date()) })); } catch (err) {}
    }
    function scheduleThemeBoundarySync() {
      if (themeBoundaryTimerId) clearTimeout(themeBoundaryTimerId);
      const delay = Math.max(500, getNextThemeBoundary(new Date()) - Date.now() + 50);
      themeBoundaryTimerId = setTimeout(() => {
        try { localStorage.removeItem(THEME_OVERRIDE_KEY); } catch (err) {}
        setNightMode(resolveNightModePreference());
        scheduleThemeBoundarySync();
      }, delay);
    }
    function setNightMode(enabled) {
      document.getElementById('nightMode').checked = enabled;
      document.body.classList.toggle('night-mode', enabled);
      schematic.plotSettings.theme = enabled ? 'night' : 'day';
      renderSchematic();
      saveLocal();
    }

    initialise();
  </script>
  <script src="search-ui.js" defer></script>
</body>
</html>
