<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interwell Time Converter</title>
  <link rel="stylesheet" href="brand/brand-tokens.css">
  <link rel="stylesheet" href="search-ui.css">
  <link rel="stylesheet" href="night-toggle.css">
  <style>
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-regular-eAm2gA_L.otf");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-medium-Ddm9_fCE.otf");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "formular-interwell";
      src: url("https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/builds/a19def66-5676-4784-9eec-7904ef2cc995/artifacts/build/assets/Formular_Interwell-bold-CntqEvi7.otf");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f4f0f7;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-alt: rgba(255, 255, 255, 0.72);
      --border: rgba(33, 13, 42, 0.16);
      --text: #22122d;
      --muted: #685774;
      --primary: #210d2a;
      --primary-strong: #13081a;
      --shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius: 4px;
      --panel-radius: 6px;
      --app-pad: 6px;
      --space-sm: 2px;
      --space-md: 4px;
      --space-lg: 6px;
      --space-xl: 8px;
      --control-height: 22px;
      --control-font: 10px;
      --control-px: 6px;
      --control-py: 2px;
      --field-border: #cbd5e1;
    }

    body.night-mode {
      --bg: #110b16;
      --surface: rgba(30, 20, 40, 0.92);
      --surface-alt: rgba(25, 17, 34, 0.9);
      --border: rgba(208, 191, 222, 0.22);
      --text: #f2eaf8;
      --muted: #b8a6c4;
      --primary: #f2eaf8;
      --primary-strong: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
      --field-border: #30363d;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: "formular-interwell", "Segoe UI", sans-serif;
      font-size: 11px;
      background:
        radial-gradient(1200px 420px at 15% -5%, rgba(119, 74, 160, 0.2), transparent 55%),
        radial-gradient(900px 360px at 88% -10%, rgba(33, 13, 42, 0.16), transparent 60%),
        linear-gradient(180deg, #f8f4fb 0%, var(--bg) 100%);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    .wrap.app-shell {
      min-height: 100vh;
      padding: var(--app-pad);
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .app-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      flex-shrink: 0;
    }
    .app-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .app-brand {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .app-logo {
      height: 22px;
      width: auto;
      flex-shrink: 0;
    }
    body.night-mode .app-logo {
      filter: brightness(0) invert(1) saturate(0);
    }
.nav-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: transparent;
      color: var(--brand-dark-purple);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .nav-icon-btn:hover {
      transform: translateY(-2px);
      background: color-mix(in srgb, var(--brand-mid-lavender) 18%, transparent);
    }
    .nav-icon-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }    body.night-mode .nav-icon-btn {
      color: #f2eaf8;
    }
    
    .app-brand {
      gap: 0;
    }
    .app-logo {
      margin-right: 6px;
    }
    .app-brand .nav-icon-btn {
      flex-shrink: 0;
    }
    .app-brand .nav-icon-btn + .nav-icon-btn {
      margin-left: 6px;
    }
.app-header h1 {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    .app-header p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 10px;
    }
    .app-header p a {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
    }
    .app-header p a:hover {
      color: var(--primary);
      text-decoration: underline;
    }
    .app-meta {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      line-height: 1.4;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding-top: 4px;
      border-top: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
    }
    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: var(--control-py) var(--control-px);
      min-height: var(--control-height);
      border: 1px solid color-mix(in srgb, var(--border) 78%, #d8dbe5 22%);
      border-radius: var(--radius);
      background: var(--surface-alt);
      color: var(--text);
      font-size: var(--control-font);
      user-select: none;
    }
    .theme-switch input[type="checkbox"] {
      margin: 0;
      accent-color: var(--primary);
      inline-size: 13px;
      block-size: 13px;
    }

    .tool-main {
      display: grid;
      gap: var(--space-lg);
    }
    .tool-panel {
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 8px;
      display: grid;
      gap: 8px;
    }
    .sidebar-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      margin-bottom: 6px;
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent 22%);
      border-radius: 6px;
      padding: 3px;
      box-sizing: border-box;
      width: fit-content;
      max-width: 100%;
      align-self: start;
    }
    .sidebar-tab-option {
      display: flex;
      align-items: stretch;
    }
    .sidebar-tab-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-tab-btn {
      min-height: 24px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 5px;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .sidebar-tab-btn.is-active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 8px 18px rgba(33, 13, 42, 0.2);
    }
    body.night-mode .sidebar-tab-btn.is-active {
      background: #d3ef54;
      color: #210d2a;
      border-color: color-mix(in srgb, #d3ef54 84%, #95ab2f 16%);
    }
    .tab-panel { display: none; }
    .tab-panel.is-active { display: block; }
    .panel-title {
      margin: 0;
      font-size: 0.9rem;
    }
    .panel-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
    }

    .controls-row,
    .meeting-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      align-items: end;
    }
    .controls-row {
      margin-bottom: 14px;
    }
    .controls-row label,
    .meeting-row label {
      display: grid;
      gap: 3px;
      font-size: 10px;
      color: var(--muted);
    }

    select,
    input,
    button {
      font: inherit;
      color: inherit;
      border: 1px solid var(--field-border);
      border-radius: var(--radius);
      min-height: var(--control-height);
      padding: var(--control-py) var(--control-px);
      background: color-mix(in srgb, var(--surface-alt) 84%, #ffffff 16%);
      font-size: 10px;
    }
    body.night-mode input[type="date"]::-webkit-calendar-picker-indicator,
    body.night-mode input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(1.35) contrast(1.05);
      opacity: 1;
    }
    button {
      cursor: pointer;
      font-weight: 600;
      border-color: color-mix(in srgb, var(--primary) 28%, var(--field-border));
      color: var(--primary);
    }
    button:hover {
      border-color: color-mix(in srgb, var(--primary) 45%, var(--field-border));
      background: color-mix(in srgb, var(--surface-alt) 68%, #ffffff 32%);
    }
    button.remove-btn {
      color: currentColor;
      border-color: color-mix(in srgb, currentColor 30%, var(--field-border));
      background: transparent;
      width: 24px;
      min-width: 24px;
      min-height: 24px;
      height: 24px;
      padding: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: end;
    }
    .remove-btn svg {
      width: 13px;
      height: 13px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: square;
    }
    #addClockButton {
      justify-self: start;
      width: fit-content;
      min-width: 96px;
      padding-inline: 14px;
    }

    .clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 8px;
    }
    .clock-card {
      position: relative;
      border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
      border-radius: 15px;
      min-height: 150px;
      padding: 10px 12px;
      display: grid;
      gap: 3px;
      overflow: hidden;
      cursor: default;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .clock-card[draggable="true"] {
      cursor: -webkit-grab;
      cursor: grab;
    }
    .clock-card.dragging {
      opacity: 0.45;
      transform: scale(0.99);
      cursor: -webkit-grabbing;
      cursor: grabbing;
    }
    .clock-card.drag-over {
      outline: 2px dashed color-mix(in srgb, var(--brand-mid-lavender) 70%, var(--brand-accent-lime) 30%);
      outline-offset: -4px;
    }
    .clock-card:hover {
      transform: translateY(-1px);
    }
    .clock-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 4px;
    }
    .clock-actions {
      display: grid;
      justify-items: end;
      gap: 6px;
    }
    .clock-name {
      margin: 0;
      font-size: 0.93rem;
      line-height: 1.2;
    }
    .clock-zone {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.3;
    }
    .clock-time {
      margin: 2px 0 0;
      font-size: clamp(2.25rem, 4.8vw, 3rem);
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .clock-time .clock-offset {
      font-size: 0.5em;
      font-weight: 500;
      opacity: 0.88;
      margin-left: 0.35em;
      vertical-align: middle;
    }
    .clock-day-text {
      margin: 0;
      font-size: 0.94rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: 0.01em;
    }
    .clock-icon {
      font-size: 1.2rem;
      line-height: 1;
      align-self: start;
      transition: transform 0.25s ease;
    }
    .clock-card:hover .clock-icon {
      transform: scale(1.08);
    }

    body:not(.night-mode) .clock-card.clock-card--day {
      color: var(--text);
      background: linear-gradient(
        to right,
        color-mix(in srgb, #dff4ff 86%, #ffffff 14%),
        color-mix(in srgb, #c9edff 82%, #ffffff 18%)
      );
      border-color: color-mix(in srgb, var(--border) 80%, transparent);
      box-shadow: 0 7px 18px rgba(33, 13, 42, 0.09), 0 1px 0 rgba(255, 255, 255, 0.5) inset;
    }
    body:not(.night-mode) .clock-card.clock-card--night {
      color: var(--brand-accent-lime);
      background: linear-gradient(to right, #1a1024, #2a1a3b 60%, #38244a);
      border-color: color-mix(in srgb, var(--brand-mid-lavender) 46%, transparent);
      box-shadow: rgba(0, 0, 0, 0.62) 5px 10px 44px, rgba(0, 0, 0, 0.6) -5px 0 170px;
    }
    body.night-mode .clock-card.clock-card--day {
      color: #f6f1fb;
      background: linear-gradient(
        to right,
        color-mix(in srgb, #d8f2ff 52%, #3a4b63 48%),
        color-mix(in srgb, #bfe8ff 48%, #344862 52%)
      );
      border-color: color-mix(in srgb, var(--brand-mid-lavender) 54%, transparent);
      box-shadow: rgba(6, 4, 12, 0.5) 5px 10px 40px, rgba(6, 4, 12, 0.5) -5px 0 140px;
    }
    body.night-mode .clock-card.clock-card--night {
      color: var(--brand-accent-lime);
      background: linear-gradient(to right, #170d22, #271537 58%, #362047);
      border-color: color-mix(in srgb, var(--brand-mid-lavender) 50%, transparent);
      box-shadow: rgba(0, 0, 0, 0.72) 5px 10px 50px, rgba(0, 0, 0, 0.68) -5px 0 220px;
    }
    .clock-card.clock-card--night .clock-zone,
    body.night-mode .clock-card.clock-card--day .clock-zone {
      color: color-mix(in srgb, currentColor 74%, #ffffff 26%);
    }
    .clock-card .remove-btn:hover {
      background: color-mix(in srgb, currentColor 10%, transparent);
      border-color: color-mix(in srgb, currentColor 60%, transparent);
    }

    .conversion-summary {
      margin: 8px 0;
      color: var(--muted);
      font-size: 10px;
    }
    .conversion-table-wrap {
      overflow-x: auto;
      border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
      border-radius: var(--panel-radius);
      background: color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
    }
    .conversion-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }
    .conversion-table th,
    .conversion-table td {
      padding: 7px 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      text-align: left;
      white-space: nowrap;
    }
    .conversion-table thead th {
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface-alt) 78%, #ffffff 22%);
    }
    .conversion-table tbody tr:last-child td {
      border-bottom: 0;
    }
    .conversion-table .source-row td {
      background: color-mix(in srgb, var(--surface-alt) 70%, #ffffff 30%);
      font-weight: 600;
    }
    .conversion-time {
      font-size: 1.08rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .conversion-location {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .conversion-zone {
      color: var(--muted);
      font-size: 9px;
    }

    .empty-note {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
    }

    @media (max-width: 980px) {
      .app-header-top {
        align-items: flex-start;
        flex-direction: column;
      }
      .app-meta {
        text-align: left;
        white-space: normal;
      }
      .header-actions {
        justify-content: flex-start;
      }
      .controls-row,
      .meeting-row {
        grid-template-columns: 1fr;
      }
      .sidebar-tabs {
        grid-template-columns: repeat(2, auto);
      }
    }
  
/* Prevent iOS Safari input zoom-on-focus */
@supports (-webkit-touch-callout: none) {
  @media (hover: none) and (pointer: coarse) {
    input,
    select,
    textarea {
      font-size: 16px !important;
    }
  }
}
</style>
</head>
<body>
  <div class="wrap app-shell">
    <header class="app-header">
      <div class="app-header-top">
        <div class="app-brand">
          <img class="app-logo" src="https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/assets/assets/Interwell_Logo_Symbol_Dark_Purple-2.png" alt="Interwell Logo">
                    <a class="nav-icon-btn" href="index.html" aria-label="Home" title="Home">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2L3 10.6v10.2h6.1v-6.3h5.8v6.3H21V10.6L12 3.2z"/></svg>
            </a>
            <button class="nav-icon-btn" type="button" aria-label="Back" title="Back" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = 'index.html'; }">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.2 4.4L3.6 12l7.6 7.6 1.6-1.6-4.9-4.9H20v-2.2H7.9l4.9-4.9-1.6-1.6z"/></svg>
            </button>
            <button class="nav-icon-btn" type="button" aria-label="Forward" title="Forward" onclick="if (window.history.length > 1) { window.history.forward(); } else { window.location.href = 'index.html'; }">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.8 4.4l7.6 7.6-7.6 7.6-1.6-1.6 4.9-4.9H4v-2.2h12.1l-4.9-4.9 1.6-1.6z"/></svg>
            </button>
        </div>
        <div class="app-meta">
          <div>By Darren Wilkinson</div>
          <div>Updated: 14.05.2026</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="toggle-switch" title="Night Mode">
          <label class="switch-label" for="nightMode">
            <input id="nightMode" class="checkbox" type="checkbox">
            <span class="slider"></span>
            <span class="toggle-text">Night Mode</span>
          </label>
        </div>
      </div>
    </header>

    <main class="tool-main">
      <section class="tool-panel" aria-label="Time tools">
        <div class="sidebar-tabs" role="tablist" aria-label="Time tools tabs">
          <div class="sidebar-tab-option">
            <input type="radio" id="timeTabClockBtn" class="sidebar-tab-input" name="timeTab" checked onchange="setTimeTab('clock')">
            <label for="timeTabClockBtn" id="timeTabClockLabel" class="sidebar-tab-btn is-active" role="tab" aria-selected="true" aria-controls="timeTabPanelClock">World Clock</label>
          </div>
          <div class="sidebar-tab-option">
            <input type="radio" id="timeTabConvertBtn" class="sidebar-tab-input" name="timeTab" onchange="setTimeTab('convert')">
            <label for="timeTabConvertBtn" id="timeTabConvertLabel" class="sidebar-tab-btn" role="tab" aria-selected="false" aria-controls="timeTabPanelConvert">Time Converter</label>
          </div>
        </div>

        <div id="timeTabPanelClock" class="tab-panel is-active" role="tabpanel" aria-labelledby="timeTabClockLabel">
          <div class="controls-row">
            <label for="clockAddSelect">
              <select id="clockAddSelect"></select>
            </label>
            <button id="addClockButton" type="button">Add Clock</button>
          </div>
          <div id="clockGrid" class="clock-grid"></div>
        </div>

        <div id="timeTabPanelConvert" class="tab-panel" role="tabpanel" aria-labelledby="timeTabConvertLabel">
          <div class="meeting-row">
            <label for="meetingSource">
              Source
              <select id="meetingSource"></select>
            </label>
            <label for="meetingDate">
              Date
              <input id="meetingDate" type="date">
            </label>
            <label for="meetingTime">
              Time (24h)
              <input id="meetingTime" type="time" step="60">
            </label>
          </div>
          <p id="conversionSummary" class="conversion-summary"></p>
          <div id="conversionGrid" class="conversion-table-wrap"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var THEME_OVERRIDE_KEY = 'rstools-theme-override-v1';
      var CLOCK_STORAGE_KEY = 'rstools-time-converter-clocks-v1';
      var CLOCK_COOKIE_KEY = 'rstoolsTimeConverterClocks';
      var CLOCK_ORDER_STORAGE_KEY = 'rstools-time-converter-clock-order-v1';
      var CLOCK_ORDER_COOKIE_KEY = 'rstoolsTimeConverterClockOrder';
      var DEFAULT_EXTRA_CLOCKS = ['calgary', 'dubai'];
      var CATALOG = [
        { key: 'calgary', label: 'Calgary', zone: 'America/Edmonton', cityLabel: 'Calgary, Canada' },
        { key: 'houston', label: 'Houston', zone: 'America/Chicago', cityLabel: 'Houston, USA' },
        { key: 'dubai', label: 'Dubai', zone: 'Asia/Dubai', cityLabel: 'Dubai, UAE' },
        { key: 'malaysia', label: 'Malaysia', zone: 'Asia/Kuala_Lumpur', cityLabel: 'Kuala Lumpur, Malaysia' },
        { key: 'perth', label: 'Perth', zone: 'Australia/Perth', cityLabel: 'Perth, Australia' },
        { key: 'london', label: 'London', zone: 'Europe/London', cityLabel: 'London, UK' },
        { key: 'new-york', label: 'New York', zone: 'America/New_York', cityLabel: 'New York, USA' },
        { key: 'los-angeles', label: 'Los Angeles', zone: 'America/Los_Angeles', cityLabel: 'Los Angeles, USA' },
        { key: 'singapore', label: 'Singapore', zone: 'Asia/Singapore', cityLabel: 'Singapore' },
        { key: 'tokyo', label: 'Tokyo', zone: 'Asia/Tokyo', cityLabel: 'Tokyo, Japan' },
        { key: 'sydney', label: 'Sydney', zone: 'Australia/Sydney', cityLabel: 'Sydney, Australia' }
      ];

      var catalogByKey = new Map();
      CATALOG.forEach(function (clock) {
        catalogByKey.set(clock.key, clock);
      });

      var clockGrid = document.getElementById('clockGrid');
      var conversionGrid = document.getElementById('conversionGrid');
      var clockAddSelect = document.getElementById('clockAddSelect');
      var addClockButton = document.getElementById('addClockButton');
      var meetingSource = document.getElementById('meetingSource');
      var meetingDate = document.getElementById('meetingDate');
      var meetingTime = document.getElementById('meetingTime');
      var conversionSummary = document.getElementById('conversionSummary');

      var extraClockKeys = [];
      var clockOrderKeys = [];
      var refreshTimerId = null;
      var themeBoundaryTimerId = null;
      var dragSourceKey = null;

      window.setTimeTab = function (tabName) {
        var map = {
          clock: { input: 'timeTabClockBtn', label: 'timeTabClockLabel', panel: 'timeTabPanelClock' },
          convert: { input: 'timeTabConvertBtn', label: 'timeTabConvertLabel', panel: 'timeTabPanelConvert' }
        };
        Object.keys(map).forEach(function (key) {
          var isActive = key === tabName;
          var inputEl = document.getElementById(map[key].input);
          var labelEl = document.getElementById(map[key].label);
          var panelEl = document.getElementById(map[key].panel);
          if (inputEl) inputEl.checked = isActive;
          if (labelEl) {
            labelEl.classList.toggle('is-active', isActive);
            labelEl.setAttribute('aria-selected', isActive ? 'true' : 'false');
          }
          if (panelEl) panelEl.classList.toggle('is-active', isActive);
        });
      };

      function updateAppLogoForTheme() {
        var isNight = document.body.classList.contains('night-mode');
        document.querySelectorAll('.app-logo').forEach(function (img) {
          var day = img.dataset.dayLogo || img.getAttribute('src');
          if (!img.dataset.dayLogo) img.dataset.dayLogo = day;
          var night = img.dataset.nightLogo;
          if (night) img.src = isNight ? night : img.dataset.dayLogo;
        });
      }

      function isNightByTime() {
        var h = new Date().getHours();
        return h >= 19 || h < 6;
      }

      function getNextThemeBoundary(fromDate) {
        var now = fromDate || new Date();
        var six = new Date(now);
        six.setHours(6, 0, 0, 0);
        var nineteen = new Date(now);
        nineteen.setHours(19, 0, 0, 0);
        if (now < six) return six.getTime();
        if (now < nineteen) return nineteen.getTime();
        six.setDate(six.getDate() + 1);
        return six.getTime();
      }

      function readThemeOverride() {
        try {
          var raw = localStorage.getItem(THEME_OVERRIDE_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (typeof parsed !== 'object' || parsed === null) return null;
          if (typeof parsed.enabled !== 'boolean') return null;
          if (!Number.isFinite(parsed.expiresAt)) return null;
          return parsed;
        } catch (err) {
          return null;
        }
      }

      function clearThemeOverride() {
        try {
          localStorage.removeItem(THEME_OVERRIDE_KEY);
        } catch (err) {
          // Ignore storage failures.
        }
      }

      function resolveNightModePreference() {
        var override = readThemeOverride();
        var nowMs = Date.now();
        if (override && override.expiresAt > nowMs) return override.enabled;
        if (override) clearThemeOverride();
        return isNightByTime();
      }

      function setNightModeOverride(enabled) {
        try {
          localStorage.setItem(
            THEME_OVERRIDE_KEY,
            JSON.stringify({
              enabled: Boolean(enabled),
              expiresAt: getNextThemeBoundary(new Date())
            })
          );
        } catch (err) {
          // Ignore storage failures.
        }
      }

      function setNightMode(enabled) {
        var checkbox = document.getElementById('nightMode');
        if (checkbox) checkbox.checked = enabled;
        document.body.classList.toggle('night-mode', enabled);
        updateAppLogoForTheme();
      }

      function scheduleThemeBoundarySync() {
        if (themeBoundaryTimerId) window.clearTimeout(themeBoundaryTimerId);
        var delay = Math.max(500, getNextThemeBoundary(new Date()) - Date.now() + 50);
        themeBoundaryTimerId = window.setTimeout(function () {
          clearThemeOverride();
          setNightMode(resolveNightModePreference());
          scheduleThemeBoundarySync();
        }, delay);
      }

      function getLocalZone() {
        try {
          return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
        } catch (err) {
          return 'UTC';
        }
      }

      function sanitizeExtraClocks(rawKeys) {
        var seen = new Set();
        var out = [];
        if (!Array.isArray(rawKeys)) return out;
        rawKeys.forEach(function (key) {
          if (!catalogByKey.has(key)) return;
          if (seen.has(key)) return;
          seen.add(key);
          out.push(key);
        });
        return out;
      }

      function readCookie(name) {
        var parts = document.cookie ? document.cookie.split(';') : [];
        for (var i = 0; i < parts.length; i += 1) {
          var piece = parts[i].trim();
          if (piece.indexOf(name + '=') === 0) {
            return piece.slice(name.length + 1);
          }
        }
        return '';
      }

      function loadExtraClockKeys() {
        try {
          var fromStorage = localStorage.getItem(CLOCK_STORAGE_KEY);
          if (fromStorage) {
            return sanitizeExtraClocks(JSON.parse(fromStorage));
          }
        } catch (err) {
          // Ignore storage errors and continue with cookie/defaults.
        }

        var fromCookie = readCookie(CLOCK_COOKIE_KEY);
        if (fromCookie) {
          try {
            return sanitizeExtraClocks(JSON.parse(decodeURIComponent(fromCookie)));
          } catch (err2) {
            // Ignore cookie parse failures.
          }
        }

        return DEFAULT_EXTRA_CLOCKS.slice();
      }

      function loadClockOrderKeys() {
        try {
          var fromStorage = localStorage.getItem(CLOCK_ORDER_STORAGE_KEY);
          if (fromStorage) return JSON.parse(fromStorage);
        } catch (err) {
          // Ignore storage errors and continue with cookie/defaults.
        }

        var fromCookie = readCookie(CLOCK_ORDER_COOKIE_KEY);
        if (fromCookie) {
          try {
            return JSON.parse(decodeURIComponent(fromCookie));
          } catch (err2) {
            // Ignore cookie parse failures.
          }
        }

        return [];
      }

      function persistExtraClockKeys(keys) {
        var payload = JSON.stringify(keys);
        try {
          localStorage.setItem(CLOCK_STORAGE_KEY, payload);
        } catch (err) {
          // Ignore storage failures.
        }
        document.cookie = CLOCK_COOKIE_KEY + '=' + encodeURIComponent(payload) + '; Max-Age=31536000; Path=/; SameSite=Lax';
      }

      function persistClockOrderKeys(keys) {
        var payload = JSON.stringify(keys);
        try {
          localStorage.setItem(CLOCK_ORDER_STORAGE_KEY, payload);
        } catch (err) {
          // Ignore storage failures.
        }
        document.cookie = CLOCK_ORDER_COOKIE_KEY + '=' + encodeURIComponent(payload) + '; Max-Age=31536000; Path=/; SameSite=Lax';
      }

      function normalizeClockOrder(orderKeys, extraKeys) {
        var allowed = ['local'];
        extraKeys.forEach(function (key) {
          if (!catalogByKey.has(key)) return;
          allowed.push(key);
        });

        var used = new Set();
        var out = [];
        if (Array.isArray(orderKeys)) {
          orderKeys.forEach(function (key) {
            if (allowed.indexOf(key) < 0) return;
            if (used.has(key)) return;
            used.add(key);
            out.push(key);
          });
        }
        allowed.forEach(function (key) {
          if (used.has(key)) return;
          used.add(key);
          out.push(key);
        });
        return out;
      }

      function getActiveClocks() {
        var localZone = getLocalZone();
        var byKey = new Map();
        byKey.set('local', {
          key: 'local',
          label: 'Local',
          zone: localZone,
          cityLabel: 'Local Browser Time'
        });

        extraClockKeys.forEach(function (key) {
          var match = catalogByKey.get(key);
          if (match) byKey.set(match.key, match);
        });

        var active = [];
        normalizeClockOrder(clockOrderKeys, extraClockKeys).forEach(function (key) {
          var clock = byKey.get(key);
          if (clock) active.push(clock);
        });
        return active;
      }

      function getClockByKey(key) {
        if (key === 'local') {
          return {
            key: 'local',
            label: 'Local',
            zone: getLocalZone(),
            cityLabel: 'Local Browser Time'
          };
        }
        return catalogByKey.get(key) || null;
      }

      function createOption(value, label) {
        var option = document.createElement('option');
        option.value = value;
        option.textContent = label;
        return option;
      }

      function renderAddClockOptions() {
        var selected = new Set(extraClockKeys);
        clockAddSelect.innerHTML = '';

        CATALOG.forEach(function (clock) {
          if (selected.has(clock.key)) return;
          clockAddSelect.appendChild(createOption(clock.key, clock.label + ' - ' + clock.cityLabel));
        });

        if (!clockAddSelect.options.length) {
          clockAddSelect.appendChild(createOption('', 'All available clocks are already added'));
          clockAddSelect.disabled = true;
          addClockButton.disabled = true;
        } else {
          clockAddSelect.disabled = false;
          addClockButton.disabled = false;
        }
      }

      function renderMeetingSourceOptions() {
        var active = getActiveClocks();
        var previous = meetingSource.value || 'local';
        meetingSource.innerHTML = '';
        active.forEach(function (clock) {
          meetingSource.appendChild(createOption(clock.key, clock.label));
        });
        if (active.some(function (clock) { return clock.key === previous; })) {
          meetingSource.value = previous;
        } else {
          meetingSource.value = 'local';
        }
      }

      function formatTime(ts, zone) {
        return new Intl.DateTimeFormat('en-GB', {
          timeZone: zone,
          hour: '2-digit',
          minute: '2-digit',
          hour12: false,
          hourCycle: 'h23'
        }).format(new Date(ts));
      }

      function formatDate(ts, zone) {
        return new Intl.DateTimeFormat('en-GB', {
          timeZone: zone,
          weekday: 'short',
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        }).format(new Date(ts));
      }

      function getZoneHour(ts, zone) {
        var parts = new Intl.DateTimeFormat('en-GB', {
          timeZone: zone,
          hour: '2-digit',
          hour12: false,
          hourCycle: 'h23'
        }).formatToParts(new Date(ts));
        for (var i = 0; i < parts.length; i += 1) {
          if (parts[i].type === 'hour') return Number(parts[i].value);
        }
        return 12;
      }

      function isClockDay(ts, zone) {
        var hour = getZoneHour(ts, zone);
        return hour >= 6 && hour < 19;
      }

      function getOffsetMinutesAtUtc(utcMs, zone) {
        var parts = zonePartsFromUtcMs(utcMs, zone);
        var asUtcMs = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, 0, 0);
        return Math.round((asUtcMs - utcMs) / 60000);
      }

      function formatRelativeHoursLabel(diffMinutes) {
        var hours = diffMinutes / 60;
        var roundedHours = Math.round(hours * 10) / 10;
        var absHours = Math.abs(roundedHours);
        var sign = roundedHours >= 0 ? '+' : '-';
        var hourText = Number.isInteger(absHours) ? String(absHours) : absHours.toFixed(1);
        return '(' + sign + hourText + 'h)';
      }

      function getRelativeToLocalLabel(utcMs, zone) {
        var localZone = getLocalZone();
        var zoneOffset = getOffsetMinutesAtUtc(utcMs, zone);
        var localOffset = getOffsetMinutesAtUtc(utcMs, localZone);
        return formatRelativeHoursLabel(zoneOffset - localOffset);
      }

      function renderClockCards() {
        var nowMs = Date.now();
        var active = getActiveClocks();
        clockGrid.innerHTML = '';

        active.forEach(function (clock) {
          var dayAtClock = isClockDay(nowMs, clock.zone);
          var card = document.createElement('article');
          card.className = 'clock-card ' + (dayAtClock ? 'clock-card--day' : 'clock-card--night');
          card.dataset.key = clock.key;
          card.setAttribute('draggable', 'true');

          var head = document.createElement('div');
          head.className = 'clock-head';

          var titleBlock = document.createElement('div');
          var name = document.createElement('h3');
          name.className = 'clock-name';
          name.textContent = clock.label;
          var zone = document.createElement('p');
          zone.className = 'clock-zone';
          zone.textContent = clock.cityLabel + ' - ' + clock.zone;
          titleBlock.appendChild(name);
          titleBlock.appendChild(zone);
          head.appendChild(titleBlock);

          var actions = document.createElement('div');
          actions.className = 'clock-actions';

          var icon = document.createElement('div');
          icon.className = 'clock-icon';
          icon.textContent = dayAtClock ? '\u2600' : '\uD83C\uDF19';
          actions.appendChild(icon);

          if (clock.key !== 'local') {
            var remove = document.createElement('button');
            remove.type = 'button';
            remove.className = 'remove-btn';
            remove.setAttribute('aria-label', 'Remove clock');
            remove.innerHTML = '<svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="8"></circle><path d="M7 7L13 13M13 7L7 13"></path></svg>';
            remove.dataset.key = clock.key;
            actions.appendChild(remove);
          }
          head.appendChild(actions);

          var time = document.createElement('p');
          time.className = 'clock-time';
          time.innerHTML = formatTime(nowMs, clock.zone) + '<span class="clock-offset"> ' + getRelativeToLocalLabel(nowMs, clock.zone) + '</span>';

          var dayText = document.createElement('p');
          dayText.className = 'clock-day-text';
          dayText.textContent = '';
          card.appendChild(head);
          card.appendChild(time);
          card.appendChild(dayText);
          clockGrid.appendChild(card);
        });
      }

      function parseCivilInput(dateValue, timeValue) {
        if (!dateValue || !timeValue) return null;
        var dateParts = dateValue.split('-');
        var timeParts = timeValue.split(':');
        if (dateParts.length !== 3 || timeParts.length < 2) return null;
        var year = Number(dateParts[0]);
        var month = Number(dateParts[1]);
        var day = Number(dateParts[2]);
        var hour = Number(timeParts[0]);
        var minute = Number(timeParts[1]);
        if (!Number.isFinite(year) || !Number.isFinite(month) || !Number.isFinite(day) || !Number.isFinite(hour) || !Number.isFinite(minute)) return null;
        return { year: year, month: month, day: day, hour: hour, minute: minute };
      }

      function civilToUtcMs(civil) {
        return Date.UTC(civil.year, civil.month - 1, civil.day, civil.hour, civil.minute, 0, 0);
      }

      function zonePartsFromUtcMs(utcMs, zone) {
        var parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: zone,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false,
          hourCycle: 'h23'
        }).formatToParts(new Date(utcMs));

        var out = {};
        parts.forEach(function (part) {
          if (part.type === 'year') out.year = Number(part.value);
          if (part.type === 'month') out.month = Number(part.value);
          if (part.type === 'day') out.day = Number(part.value);
          if (part.type === 'hour') out.hour = Number(part.value);
          if (part.type === 'minute') out.minute = Number(part.value);
        });
        return out;
      }

      function civilEquals(a, b) {
        return a.year === b.year &&
          a.month === b.month &&
          a.day === b.day &&
          a.hour === b.hour &&
          a.minute === b.minute;
      }

      function zonedCivilToUtcMs(civil, zone) {
        var guess = civilToUtcMs(civil);

        for (var i = 0; i < 8; i += 1) {
          var observed = zonePartsFromUtcMs(guess, zone);
          if (civilEquals(observed, civil)) return guess;

          var diff = civilToUtcMs(civil) - civilToUtcMs(observed);
          if (diff === 0) break;
          guess += diff;
        }

        var finalObserved = zonePartsFromUtcMs(guess, zone);
        if (civilEquals(finalObserved, civil)) return guess;
        return null;
      }

      function localCivilToUtcMs(civil) {
        var local = new Date(civil.year, civil.month - 1, civil.day, civil.hour, civil.minute, 0, 0);
        return local.getTime();
      }

      function formatCivilLabel(civil) {
        return String(civil.year).padStart(4, '0') + '-' +
          String(civil.month).padStart(2, '0') + '-' +
          String(civil.day).padStart(2, '0');
      }

      function renderConversionResults() {
        var sourceKey = meetingSource.value || 'local';
        var sourceClock = getClockByKey(sourceKey);
        var civil = parseCivilInput(meetingDate.value, meetingTime.value);

        conversionGrid.innerHTML = '';
        if (!sourceClock || !civil) {
          conversionSummary.textContent = 'Enter a date and a 24-hour time to calculate meeting times.';
          return;
        }

        var sourceUtcMs = sourceKey === 'local'
          ? localCivilToUtcMs(civil)
          : zonedCivilToUtcMs(civil, sourceClock.zone);

        if (sourceUtcMs === null) {
          conversionSummary.textContent = 'That local clock time does not exist in the selected source zone on this date (DST transition).';
          return;
        }

        conversionSummary.textContent = meetingTime.value + ' in ' + sourceClock.label + ' on ' + formatCivilLabel(civil) + ' equals:';

        var table = document.createElement('table');
        table.className = 'conversion-table';

        var thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>Location</th><th>Time</th><th>Date</th><th>Timezone</th></tr>';
        table.appendChild(thead);

        var tbody = document.createElement('tbody');
        getActiveClocks().forEach(function (clock) {
          var row = document.createElement('tr');
          if (clock.key === sourceKey) row.className = 'source-row';

          var locationCell = document.createElement('td');
          locationCell.innerHTML = '<div class="conversion-location">' +
            clock.label + (clock.key === sourceKey ? ' (source)' : '') +
            '</div><div class="conversion-zone">' + clock.cityLabel + '</div>';

          var timeCell = document.createElement('td');
          timeCell.className = 'conversion-time';
          timeCell.textContent = formatTime(sourceUtcMs, clock.zone) + ' ' + getRelativeToLocalLabel(sourceUtcMs, clock.zone);

          var dateCell = document.createElement('td');
          dateCell.textContent = formatDate(sourceUtcMs, clock.zone);

          var zoneCell = document.createElement('td');
          zoneCell.textContent = clock.zone;

          row.appendChild(locationCell);
          row.appendChild(timeCell);
          row.appendChild(dateCell);
          row.appendChild(zoneCell);
          tbody.appendChild(row);
        });
        table.appendChild(tbody);
        conversionGrid.appendChild(table);
      }

      function refreshAllViews() {
        renderAddClockOptions();
        renderMeetingSourceOptions();
        renderClockCards();
        renderConversionResults();
      }

      function addClock(clockKey) {
        if (!clockKey || !catalogByKey.has(clockKey)) return;
        if (extraClockKeys.indexOf(clockKey) >= 0) return;
        extraClockKeys.push(clockKey);
        clockOrderKeys = normalizeClockOrder(clockOrderKeys.concat(clockKey), extraClockKeys);
        persistExtraClockKeys(extraClockKeys);
        persistClockOrderKeys(clockOrderKeys);
        refreshAllViews();
      }

      function removeClock(clockKey) {
        extraClockKeys = extraClockKeys.filter(function (key) { return key !== clockKey; });
        clockOrderKeys = normalizeClockOrder(clockOrderKeys.filter(function (key) { return key !== clockKey; }), extraClockKeys);
        persistExtraClockKeys(extraClockKeys);
        persistClockOrderKeys(clockOrderKeys);
        refreshAllViews();
      }

      function moveClockBefore(sourceKey, targetKey) {
        if (!sourceKey || !targetKey || sourceKey === targetKey) return;
        var sourceIndex = clockOrderKeys.indexOf(sourceKey);
        var targetIndex = clockOrderKeys.indexOf(targetKey);
        if (sourceIndex < 0 || targetIndex < 0) return;

        var next = clockOrderKeys.slice();
        var moved = next.splice(sourceIndex, 1)[0];
        var insertAt = next.indexOf(targetKey);
        next.splice(insertAt, 0, moved);
        clockOrderKeys = normalizeClockOrder(next, extraClockKeys);
        persistClockOrderKeys(clockOrderKeys);
        refreshAllViews();
      }

      function startClockRefreshLoop() {
        if (refreshTimerId) window.clearInterval(refreshTimerId);
        refreshTimerId = window.setInterval(function () {
          if (!dragSourceKey) renderClockCards();
          renderConversionResults();
        }, 1000);
      }

      function setDefaultMeetingInputs() {
        var now = new Date();
        var year = now.getFullYear();
        var month = String(now.getMonth() + 1).padStart(2, '0');
        var day = String(now.getDate()).padStart(2, '0');
        var hour = String(now.getHours()).padStart(2, '0');
        var minute = String(now.getMinutes()).padStart(2, '0');
        meetingDate.value = year + '-' + month + '-' + day;
        meetingTime.value = hour + ':' + minute;
      }

      function bindEvents() {
        addClockButton.addEventListener('click', function () {
          addClock(clockAddSelect.value);
        });

        clockGrid.addEventListener('click', function (event) {
          var btn = event.target.closest('button.remove-btn');
          if (!btn) return;
          var key = btn.dataset.key;
          if (key) removeClock(key);
        });

        clockGrid.addEventListener('dragstart', function (event) {
          var card = event.target.closest('.clock-card');
          if (!card) return;
          dragSourceKey = card.dataset.key || null;
          if (!dragSourceKey) return;
          card.classList.add('dragging');
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', dragSourceKey);
          }
        });

        clockGrid.addEventListener('dragover', function (event) {
          var targetCard = event.target.closest('.clock-card');
          if (!targetCard || !dragSourceKey) return;
          var targetKey = targetCard.dataset.key;
          if (!targetKey || targetKey === dragSourceKey) return;
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
          clockGrid.querySelectorAll('.clock-card.drag-over').forEach(function (card) {
            if (card !== targetCard) card.classList.remove('drag-over');
          });
          targetCard.classList.add('drag-over');
        });

        clockGrid.addEventListener('dragleave', function (event) {
          var targetCard = event.target.closest('.clock-card');
          if (!targetCard) return;
          targetCard.classList.remove('drag-over');
        });

        clockGrid.addEventListener('drop', function (event) {
          var targetCard = event.target.closest('.clock-card');
          if (!targetCard || !dragSourceKey) return;
          event.preventDefault();
          var targetKey = targetCard.dataset.key;
          targetCard.classList.remove('drag-over');
          moveClockBefore(dragSourceKey, targetKey);
          dragSourceKey = null;
        });

        clockGrid.addEventListener('dragend', function () {
          dragSourceKey = null;
          clockGrid.querySelectorAll('.clock-card').forEach(function (card) {
            card.classList.remove('dragging');
            card.classList.remove('drag-over');
          });
        });

        meetingSource.addEventListener('change', renderConversionResults);
        meetingDate.addEventListener('change', renderConversionResults);
        meetingTime.addEventListener('change', renderConversionResults);
        meetingTime.addEventListener('input', renderConversionResults);

        var nightToggle = document.getElementById('nightMode');
        if (nightToggle) {
          nightToggle.addEventListener('change', function () {
            setNightMode(nightToggle.checked);
            setNightModeOverride(nightToggle.checked);
            scheduleThemeBoundarySync();
          });
        }
      }

      function init() {
        setNightMode(resolveNightModePreference());
        scheduleThemeBoundarySync();
        window.setTimeTab('clock');

        extraClockKeys = loadExtraClockKeys();
        if (!extraClockKeys.length) {
          extraClockKeys = DEFAULT_EXTRA_CLOCKS.slice();
          persistExtraClockKeys(extraClockKeys);
        }
        clockOrderKeys = normalizeClockOrder(loadClockOrderKeys(), extraClockKeys);
        persistClockOrderKeys(clockOrderKeys);

        setDefaultMeetingInputs();
        bindEvents();
        refreshAllViews();
        startClockRefreshLoop();
      }

      init();
    })();
  </script>
  <script src="search-ui.js" defer></script>
</body>
</html>
