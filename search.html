<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interwell Search</title>
  <link rel="stylesheet" href="brand/brand-tokens.css">
  <link rel="stylesheet" href="search-ui.css">
  <link rel="stylesheet" href="night-toggle.css">
  <style>
    :root {
      --bg: #f4f0f7;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-alt: rgba(255, 255, 255, 0.72);
      --border: rgba(33, 13, 42, 0.16);
      --text: #22122d;
      --muted: #685774;
      --primary: #210d2a;
      --shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius: 4px;
      --panel-radius: 6px;
      --app-pad: 6px;
      --control-height: 22px;
      --control-font: 10px;
      --control-px: 6px;
      --control-py: 2px;
    }

    body.night-mode {
      --bg: #110b16;
      --surface: rgba(30, 20, 40, 0.92);
      --surface-alt: rgba(25, 17, 34, 0.9);
      --border: rgba(208, 191, 222, 0.22);
      --text: #f2eaf8;
      --muted: #b8a6c4;
      --primary: #f2eaf8;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "formular-interwell", "Segoe UI", sans-serif;
      font-size: 11px;
      background: linear-gradient(180deg, #f8f4fb 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap.app-shell {
      min-height: 100vh;
      padding: var(--app-pad);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .app-header {
      display: grid;
      gap: 4px;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
    }
    .app-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .app-brand { display: flex; align-items: center; min-width: 0; }
    .app-logo { height: 18px; margin-right: 6px; }
    .app-brand .nav-icon-btn + .nav-icon-btn { margin-left: 6px; }
    .nav-icon-btn { width: 34px; height: 34px; border-radius: 50%; border: 0; padding: 0; display: inline-flex; align-items: center; justify-content: center; background: transparent; color: var(--brand-dark-purple); cursor: pointer; }
    .nav-icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
    body.night-mode .nav-icon-btn { color: #f2eaf8; }

    .app-meta { text-align: right; }
    .header-actions { display: flex; justify-content: flex-end; padding-top: 4px; border-top: 1px solid var(--border); }
    .theme-switch { display: inline-flex; align-items: center; gap: 6px; padding: var(--control-py) var(--control-px); min-height: var(--control-height); border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-alt); color: var(--text); font-size: var(--control-font); }

    .search-main {
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .search-summary { margin: 0; color: var(--muted); font-size: 11px; }
    #search-results { display: grid; gap: 8px; }
    .search-result { border: 1px solid color-mix(in srgb, var(--border) 80%, transparent); border-radius: 6px; padding: 8px; background: color-mix(in srgb, var(--surface-alt) 84%, transparent); }
    .search-result-url { font-size: 10px; color: var(--muted); text-decoration: none; }
    .search-result-title { margin: 4px 0; font-size: 0.95rem; }
    .search-result-title a { color: var(--primary); text-decoration: none; }
    .search-result-snippet { margin: 0; color: var(--text); line-height: 1.45; }
    .search-empty { color: var(--muted); }

    @media (max-width: 980px) {
      .app-header-top { flex-direction: column; align-items: flex-start; }
      .app-meta { text-align: left; width: 100%; }
      .header-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap app-shell">
    <header class="app-header">
      <div class="app-header-top">
        <div class="app-brand">
          <img class="app-logo" src="https://cdn.craft.cloud/eefb662a-81d2-4c81-a4e3-3430f73d17d0/assets/assets/Interwell_Logo_Symbol_Dark_Purple-2.png" alt="Interwell Logo">
          <a class="nav-icon-btn" href="index.html" aria-label="Home" title="Home"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2L3 10.6v10.2h6.1v-6.3h5.8v6.3H21V10.6L12 3.2z"/></svg></a>
          <button class="nav-icon-btn" type="button" aria-label="Back" title="Back" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href = 'index.html'; }"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.2 4.4L3.6 12l7.6 7.6 1.6-1.6-4.9-4.9H20v-2.2H7.9l4.9-4.9-1.6-1.6z"/></svg></button>
          <button class="nav-icon-btn" type="button" aria-label="Forward" title="Forward" onclick="if (window.history.length > 1) { window.history.forward(); } else { window.location.href = 'index.html'; }"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.8 4.4l7.6 7.6-7.6 7.6-1.6-1.6 4.9-4.9H4v-2.2h12.1l-4.9-4.9 1.6-1.6z"/></svg></button>
        </div>
        <div class="app-meta"></div>
      </div>
      <div class="header-actions">
        <div class="toggle-switch" title="Night Mode">
          <label class="switch-label" for="nightMode">
            <input id="nightMode" class="checkbox" type="checkbox">
            <span class="slider"></span>
            <span class="toggle-text">Night Mode</span>
          </label>
        </div>
      </div>
    </header>

    <main class="search-main">
      <p id="search-summary" class="search-summary">Type a search term and press Enter.</p>
      <div id="search-results"></div>
    </main>
  </div>

  <script>
    (function () {
      var THEME_OVERRIDE_KEY = 'rstools-theme-override-v1';
      function isNightByTime() { var h = new Date().getHours(); return h >= 19 || h < 6; }
      function getNextThemeBoundary(fromDate) { var now = fromDate || new Date(); var six = new Date(now); six.setHours(6,0,0,0); var nineteen = new Date(now); nineteen.setHours(19,0,0,0); if (now < six) return six.getTime(); if (now < nineteen) return nineteen.getTime(); six.setDate(six.getDate()+1); return six.getTime(); }
      function readThemeOverride() { try { var raw = localStorage.getItem(THEME_OVERRIDE_KEY); if (!raw) return null; var parsed = JSON.parse(raw); if (!parsed || typeof parsed.enabled !== 'boolean' || !Number.isFinite(parsed.expiresAt)) return null; return parsed; } catch (e) { return null; } }
      function clearThemeOverride() { try { localStorage.removeItem(THEME_OVERRIDE_KEY); } catch (e) {} }
      function resolveNightModePreference() { var override = readThemeOverride(); var nowMs = Date.now(); if (override && override.expiresAt > nowMs) return override.enabled; if (override) clearThemeOverride(); return isNightByTime(); }
      function setNightModeOverride(enabled) { try { localStorage.setItem(THEME_OVERRIDE_KEY, JSON.stringify({ enabled: Boolean(enabled), expiresAt: getNextThemeBoundary(new Date()) })); } catch (e) {} }
      function setNightMode(enabled) {
        var checkbox = document.getElementById('nightMode');
        if (checkbox) checkbox.checked = enabled;
        document.body.classList.toggle('night-mode', enabled);
        var logos = document.querySelectorAll('.app-logo');
        logos.forEach(function (img) {
          img.style.filter = enabled ? 'brightness(0) invert(1)' : '';
        });
      }
      function scheduleThemeBoundarySync() { var delay = Math.max(500, getNextThemeBoundary(new Date()) - Date.now() + 50); window.setTimeout(function () { clearThemeOverride(); setNightMode(resolveNightModePreference()); scheduleThemeBoundarySync(); }, delay); }
      var nightModeCheckbox = document.getElementById('nightMode');
      setNightMode(resolveNightModePreference());
      scheduleThemeBoundarySync();
      if (nightModeCheckbox) nightModeCheckbox.addEventListener('change', function (e) { var enabled = Boolean(e.target.checked); setNightModeOverride(enabled); setNightMode(enabled); });
    })();
  </script>
  <script src="wiki/data/wiki-fallback.js"></script>
  <script src="search-ui.js" defer></script>
  <script src="search-page.js" defer></script>
</body>
</html>
